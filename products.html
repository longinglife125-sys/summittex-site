<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Products | SummitTex</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>SummitTex Fabrics</h1>

<div id="productGrid"></div>

<script src="data/products.js"></script>

<script>
const grid = document.getElementById("productGrid");

products.forEach(p => {
  grid.innerHTML += `
    <div class="card">
      <img src="${p.image}" style="width:100%;height:160px;object-fit:cover;">
      <h3>${p.name}</h3>
      <p>${p.category}</p>
      <p>${p.gsm} | MOQ ${p.moq}</p>
      <p>${p.feature}</p>
      <a href="product.html?id=${p.id}">View Details</a>
    </div>
  `;
});
</script>

</body>
</html>
