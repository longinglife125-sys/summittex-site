<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Textile Fabric Products | SummitTex
</title>

<style>

/* ===================== */
/* GLOBAL */
/* ===================== */

body{
    margin:0;
    font-family:Arial;
    background:#f5f7fa;
    color:#111827;
}

.container{
    width:92%;
    max-width:1400px;
    margin:auto;
}

/* ===================== */
/* HERO */
/* ===================== */

.hero{
    background:
    linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
    url('https://images.unsplash.com/photo-1521572267360-ee0c2909d518?q=80&w=1600&auto=format&fit=crop');
    background-size:cover;
    background-position:center;
    color:white;
    padding:100px 20px;
    text-align:center;
}

.hero h1{
    font-size:52px;
    margin-bottom:15px;
}

.hero p{
    font-size:20px;
    color:#e5e7eb;
}

/* ===================== */
/* FILTER */
/* ===================== */

.filters{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    margin:40px 0;
    justify-content:center;
}

.filters button{
    border:none;
    background:white;
    padding:12px 18px;
    border-radius:999px;
    cursor:pointer;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    transition:.3s;
}

.filters button:hover{
    background:#2563eb;
    color:white;
}

/* ===================== */
/* SEARCH */
/* ===================== */

.search{
    text-align:center;
    margin-bottom:40px;
}

.search input{
    width:100%;
    max-width:500px;
    padding:16px;
    border:none;
    border-radius:12px;
    box-shadow:0 4px 16px rgba(0,0,0,.08);
    font-size:16px;
}

/* ===================== */
/* GRID */
/* ===================== */

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:28px;
    padding-bottom:80px;
}

/* ===================== */
/* CARD */
/* ===================== */

.card{
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:260px;
    object-fit:cover;
}

.card-body{
    padding:22px;
}

.card h3{
    margin:0 0 10px;
}

.category{
    display:inline-block;
    background:#e0edff;
    color:#2563eb;
    padding:6px 12px;
    border-radius:999px;
    font-size:13px;
    margin-bottom:12px;
}

.spec{
    color:#6b7280;
    margin-top:6px;
    font-size:14px;
}

.btn{
    display:inline-block;
    margin-top:18px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    padding:12px 18px;
    border-radius:10px;
    font-weight:bold;
}

/* ===================== */
/* PAGINATION */
/* ===================== */

.pagination{
    text-align:center;
    padding-bottom:80px;
}

.pagination button{
    border:none;
    padding:12px 18px;
    margin:5px;
    border-radius:10px;
    cursor:pointer;
    background:white;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

/* ===================== */
/* WHATSAPP */
/* ===================== */

.wa{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:14px 18px;
    border-radius:50px;
    text-decoration:none;
    font-weight:bold;
    z-index:999;
}

/* ===================== */
/* MOBILE */
/* ===================== */

@media(max-width:768px){

.hero h1{
    font-size:36px;
}

}

</style>

</head>

<body>

<!-- HERO -->

<div class="hero">

<h1>Textile Fabric Products</h1>

<p>
Professional fabrics for apparel, outdoor, sportswear and industrial applications
</p>

</div>

<div class="container">

<!-- FILTER -->

<div class="filters">

<button onclick="filterProducts('All')">All</button>

<button onclick="filterProducts('Top Selling')">
Top Selling
</button>

<button onclick="filterProducts('Functional')">
Functional
</button>

<button onclick="filterProducts('Outdoor')">
Outdoor
</button>

<button onclick="filterProducts('Swimwear')">
Swimwear
</button>

<button onclick="filterProducts('Fashion')">
Fashion
</button>

<button onclick="filterProducts('Recycled')">
Recycled
</button>

<button onclick="filterProducts('Technical')">
Technical
</button>

</div>

<!-- SEARCH -->

<div class="search">
<input
id="search"
placeholder="Search fabrics..."
onkeyup="renderProducts()">
</div>

<!-- PRODUCT GRID -->

<div class="grid" id="grid"></div>

<!-- PAGINATION -->

<div class="pagination" id="pagination"></div>

</div>

<!-- WHATSAPP -->

<a
class="wa"
href="https://wa.me/8613800000000?text=Hello, I am interested in your textile fabrics"
target="_blank">
💬 WhatsApp
</a>

<!-- SUPABASE -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

/* ===================== */
/* SUPABASE */
/* ===================== */

const SUPABASE_URL =
"https://tpcxaelljrudshchuzia.supabase.co";

const SUPABASE_KEY =
"你的publishable key";

const sb = supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

/* ===================== */
/* STATE */
/* ===================== */

let products = [];

let currentFilter = "All";

let currentPage = 1;

const perPage = 8;

/* ===================== */
/* LOAD */
/* ===================== */

async function loadProducts(){

let { data } =
await sb.from("products").select("*");

products = data || [];

renderProducts();

}

loadProducts();

/* ===================== */
/* FILTER */
/* ===================== */

function filterProducts(type){

currentFilter = type;

currentPage = 1;

renderProducts();

}

/* ===================== */
/* RENDER */
/* ===================== */

function renderProducts(){

let keyword =
document.getElementById("search")
.value.toLowerCase();

let filtered = products.filter(p => {

let matchCategory =
currentFilter === "All" ||
p.category === currentFilter;

let matchSearch =
p.name.toLowerCase().includes(keyword);

return matchCategory && matchSearch;

});

/* PAGINATION */

let start =
(currentPage - 1) * perPage;

let end =
start + perPage;

let pageItems =
filtered.slice(start, end);

/* GRID */

let html = "";

pageItems.forEach(p=>{

html += `

<div class="card">

<img src="${p.image}">

<div class="card-body">

<span class="category">
${p.category}
</span>

<h3>${p.name}</h3>

<div class="spec">
GSM: ${p.gsm || "-"}
</div>

<div class="spec">
MOQ: ${p.moq || "-"}
</div>

<a
class="btn"
href="product.html?id=${p.id}">
View Details
</a>

</div>

</div>

`;

});

document.getElementById("grid").innerHTML =
html;

/* PAGE BUTTONS */

let totalPages =
Math.ceil(filtered.length / perPage);

let pageHtml = "";

for(let i=1;i<=totalPages;i++){

pageHtml += `
<button onclick="goPage(${i})">
${i}
</button>
`;

}

document.getElementById("pagination")
.innerHTML = pageHtml;

}

/* ===================== */
/* PAGE */
/* ===================== */

function goPage(page){

currentPage = page;

renderProducts();

}

</script>

</body>
</html>
