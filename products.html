<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Textile Fabrics | SummitTex</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f5f7fa;
    color:#111827;
}

.container{
    width:92%;
    max-width:1200px;
    margin:auto;
}

/* HEADER */

header{
    background:white;
    padding:18px 0;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.nav{
    display:flex;
    justify-content:space-between;
}

/* FILTERS */

.filters{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin:25px 0;
}

.filter{
    padding:8px 14px;
    border-radius:999px;
    background:white;
    border:1px solid #e5e7eb;
    cursor:pointer;
    font-size:13px;
}

.filter.active{
    background:#2563eb;
    color:white;
}

/* GRID */

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:20px;
}

/* CARD */

.card{
    background:white;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,.06);
    cursor:pointer;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card .box{
    padding:14px;
}

.tag{
    font-size:12px;
    color:#2563eb;
    background:#e0edff;
    display:inline-block;
    padding:4px 10px;
    border-radius:999px;
    margin-bottom:8px;
}

/* SEARCH */

input{
    width:100%;
    padding:12px;
    margin-top:18px;
    border-radius:10px;
    border:1px solid #e5e7eb;
}

</style>

</head>

<body>

<header>
<div class="container nav">
<b>SummitTex Products</b>
<a href="index.html">Home</a>
</div>
</header>

<div class="container">

<h1>Fabric Collections</h1>

<input id="search" placeholder="Search fabrics...">

<div class="filters" id="filters"></div>

<div class="grid" id="grid"></div>

</div>

<script>

const SUPABASE_URL = "https://tpcxaelljrudshchuzia.supabase.co";
const SUPABASE_KEY = "你的publishable key";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let products = [];
let current = "All";

/* 分类（统一源） */
const categories = [
"All",
"Top Sell",
"Outdoor Functional Fabrics",
"Sports & Activewear Fabrics",
"Recycled & Sustainable Fabrics",
"Stretch Fabrics",
"Nylon & Polyester Fabrics",
"Jacquard & Textured Fabrics",
"Printed Fabrics",
"Swimwear Fabrics",
"Underwear & Lingerie Fabrics",
"Workwear Fabrics",
"Fashion Fabrics",
"Others"
];

/* INIT */

load();
renderFilters();

async function load(){
let { data } = await sb.from("products").select("*");
products = data || [];
render();
}

/* FILTER UI */

function renderFilters(){

let html = "";

categories.forEach(c=>{
html += `<div class="filter ${c==="All"?"active":""}" onclick="setFilter('${c}')">${c}</div>`;
});

document.getElementById("filters").innerHTML = html;
}

/* SET FILTER */

function setFilter(c){
current = c;

document.querySelectorAll(".filter").forEach(el=>{
el.classList.remove("active");
});

event.target.classList.add("active");

render();
}

/* SEARCH */

document.getElementById("search").addEventListener("input", render);

/* RENDER */

function render(){

let key = document.getElementById("search").value.toLowerCase();

let list = products.filter(p=>{

let matchCat = current==="All" || p.category===current;
let matchSearch = p.name.toLowerCase().includes(key);

return matchCat && matchSearch;

});

let html = "";

list.forEach(p=>{

html += `
<div class="card" onclick="openP(${p.id})">

<img src="${p.image}">

<div class="box">

<div class="tag">${p.category}</div>

<b>${p.name}</b>

<p style="font-size:13px;color:#6b7280;">
GSM: ${p.gsm || "-"} | MOQ: ${p.moq || "-"}
</p>

</div>

</div>
`;

});

document.getElementById("grid").innerHTML = html;
}

function openP(id){
window.location.href = "product.html?id=" + id;
}

</script>

</body>
</html>
