<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SummitTex Products</title>

    <style>
        body{
            font-family:Arial;
            background:#0b0f14;
            color:white;
            margin:0;
            padding:20px;
        }

        h1{
            margin-bottom:20px;
        }

        #filters{
            margin-bottom:20px;
        }

        button{
            margin-right:10px;
            padding:10px 16px;
            background:#1f2937;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        input{
            width:300px;
            padding:10px;
            margin-bottom:20px;
            border-radius:8px;
            border:none;
        }

        #grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
            gap:20px;
        }

        .card{
            background:#111827;
            border-radius:12px;
            padding:15px;
        }

        .card img{
            width:100%;
            height:220px;
            object-fit:cover;
            border-radius:10px;
        }

        .card h3{
            margin-top:10px;
        }

        .card a{
            display:inline-block;
            margin-top:10px;
            color:#60a5fa;
            text-decoration:none;
        }
    </style>
</head>

<body>

<h1>SummitTex Functional Fabrics</h1>

<div id="filters">
    <button onclick="filterProducts('All')">All</button>
    <button onclick="filterProducts('Waterproof')">Waterproof</button>
    <button onclick="filterProducts('Softshell')">Softshell</button>
    <button onclick="filterProducts('TPU')">TPU</button>
</div>

<input id="search" placeholder="Search fabrics...">

<div id="grid"></div>

<!-- 产品数据库 -->
<script src="data/products.js"></script>

<!-- 你的 app.js（因为你放进了 css/js） -->
<script src="css/js/app.js"></script>

</body>
</html>
