<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Textile Fabrics | SummitTex</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f5f7fa;
    color:#111827;
}

.container{
    width:92%;
    max-width:1200px;
    margin:auto;
}

/* HEADER */
header{
    background:white;
    padding:18px 0;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.nav{
    display:flex;
    justify-content:space-between;
}

/* FILTERS */
.filters{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin:25px 0;
}

.filter{
    padding:8px 14px;
    border-radius:999px;
    background:white;
    border:1px solid #e5e7eb;
    cursor:pointer;
    font-size:13px;
}

.filter.active{
    background:#2563eb;
    color:white;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:20px;
}

/* PRODUCT CARD */
.product-card{
    background:white;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,.06);
    cursor:pointer;
    transition:.3s;
}

.product-card:hover{
    transform:translateY(-6px);
}

/* IMAGE */
.img-box{
    position:relative;
    height:200px;
    overflow:hidden;
}

.img-box img{
    width:100%;
    height:100%;
    object-fit:cover;
    position:absolute;
    top:0;
    left:0;
    transition:.4s;
}

/* hover image */
.hover-img{
    opacity:0;
}

/* hover effect */
.img-box:hover .hover-img{
    opacity:1;
}

/* INFO */
.info{
    padding:14px;
}

.tag{
    font-size:12px;
    color:#2563eb;
    background:#e0edff;
    display:inline-block;
    padding:4px 10px;
    border-radius:999px;
    margin-bottom:8px;
}

.meta{
    font-size:13px;
    color:#6b7280;
}

.feature{
    font-size:12px;
    color:#9ca3af;
    margin-top:6px;
}

/* BUTTON */
button{
    width:100%;
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

/* SEARCH */
input{
    width:100%;
    padding:12px;
    margin-top:18px;
    border-radius:10px;
    border:1px solid #e5e7eb;
}

</style>

</head>

<body>

<header>
<div class="container nav">
<b>SummitTex Products</b>
<a href="index.html">Home</a>
</div>
</header>

<div class="container">

<h1>Fabric Collections</h1>

<input id="search" placeholder="Search fabrics...">

<div class="filters" id="filters"></div>

<div class="grid" id="grid"></div>

</div>

<script>

const SUPABASE_URL = "https://tpcxaelljrudshchuzia.supabase.co/rest/v1/";
const SUPABASE_KEY = "sb_publishable_c0xeymh6AnE-Ld7StbxpgA_YN3ig8qt";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let products = [];
let current = "All";

/* 分类 */
const categories = [
"All",
"Top Sell",
"Outdoor Functional Fabrics",
"Sports & Activewear Fabrics",
"Recycled & Sustainable Fabrics",
"Stretch Fabrics",
"Nylon & Polyester Fabrics",
"Jacquard & Textured Fabrics",
"Printed Fabrics",
"Swimwear Fabrics",
"Underwear & Lingerie Fabrics",
"Workwear Fabrics",
"Fashion Fabrics",
"Others"
];

/* INIT */
load();
renderFilters();

/* LOAD DATA */
let products = [];

/* 🟢 先给你测试数据（确保页面一定有东西） */
const demoProducts = [
{
id: 1,
name: "Waterproof Nylon Fabric",
category: "Outdoor Functional Fabrics",
gsm: "120",
moq: "1000",
image: "https://images.unsplash.com/photo-1520975916090-3105956dac38",
feature: "Waterproof breathable outdoor fabric"
},
{
id: 2,
name: "4-Way Stretch Fabric",
category: "Sports & Activewear Fabrics",
gsm: "160",
moq: "800",
image: "https://images.unsplash.com/photo-1517836357463-d25dfeac3438",
feature: "High elasticity sports fabric"
},
{
id: 3,
name: "Recycled Polyester Fabric",
category: "Recycled & Sustainable Fabrics",
gsm: "140",
moq: "1000",
image: "https://images.unsplash.com/photo-1523381294911-8d3cead13475",
feature: "Eco-friendly recycled fabric"
}
];

/* 🟢 核心加载函数 */
async function load(){

try{

let { data, error } = await sb.from("products").select("*");

/* 👉 如果数据库有数据，用数据库 */
if(data && data.length > 0){
    products = data;
    console.log("Using DB data:", data);
}else{
    /* 👉 如果数据库为空，用假数据 */
    products = demoProducts;
    console.log("Using demo data");
}

render();

}catch(err){

console.log("DB failed, fallback demo");
products = demoProducts;
render();

}

}

/* FILTER UI */
function renderFilters(){

let html = "";

categories.forEach(c=>{
html += `<div class="filter ${c==="All"?"active":""}" onclick="setFilter(event,'${c}')">${c}</div>`;
});

document.getElementById("filters").innerHTML = html;
}

/* FILTER */
function setFilter(e,c){

current = c;

document.querySelectorAll(".filter").forEach(el=>{
el.classList.remove("active");
});

e.target.classList.add("active");

render();
}

/* SEARCH */
document.getElementById("search").addEventListener("input", render);

/* CLICK DETAIL */
function goDetail(id){
    window.location.href = "product.html?id=" + id;
}

/* RENDER */
function render(){

let key = document.getElementById("search").value.toLowerCase();

let list = products.filter(p=>{

let matchCat = current === "All" || p.category === current;

let matchSearch =
    (p.name || "").toLowerCase().includes(key) ||
    (p.feature || "").toLowerCase().includes(key);

return matchCat && matchSearch;
});

let html = "";

list.forEach(p=>{

let img = p.image || "";
let hoverImg = (p.images && p.images.length > 1) ? p.images[1] : img;

html += `
<div class="product-card" onclick="goDetail('${p.id}')">

    <div class="img-box">

        <img src="${img}" class="main-img">

        <img src="${hoverImg}" class="hover-img">

    </div>

    <div class="info">

        <div class="tag">${p.category || "Fabric"}</div>

        <h3>${p.name || ""}</h3>

        <p class="meta">
            GSM: ${p.gsm || "-"} | MOQ: ${p.moq || "-"}
        </p>

        <p class="feature">
            ${(p.feature || "").substring(0,80)}
        </p>

        <button>View Details</button>

    </div>

</div>
`;
});

document.getElementById("grid").innerHTML = html;

}

</script>

</body>
</html>
