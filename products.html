<div id="filters">
  <button onclick="filter('All')">All</button>
  <button onclick="filter('Waterproof')">Waterproof</button>
  <button onclick="filter('Softshell')">Softshell</button>
  <button onclick="filter('TPU')">TPU</button>
</div>

<input id="search" placeholder="Search fabrics...">

<div id="grid"></div>

<script src="data/products.js"></script>

<script>
const grid = document.getElementById("grid");

function render(list){
  grid.innerHTML = "";
  list.forEach(p=>{
    grid.innerHTML += `
      <div class="card">
        <img src="${p.image}" />
        <h3>${p.name}</h3>
        <p>${p.category} | ${p.gsm}gsm</p>
        <a href="product.html?id=${p.id}">View Details</a>
      </div>
    `;
  });
}

render(products);

function filter(cat){
  if(cat==="All") return render(products);
  render(products.filter(p=>p.category===cat));
}

document.getElementById("search").addEventListener("input", e=>{
  const v = e.target.value.toLowerCase();
  render(products.filter(p=>p.name.toLowerCase().includes(v)));
});
</script>
