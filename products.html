<div id="productGrid"></div>

<script src="data/products.js"></script>

<script>
const grid = document.getElementById("productGrid");

products.forEach(p => {
  grid.innerHTML += `
    <div class="card">
      <img src="${p.image}" />
      <h3>${p.name}</h3>
      <p>${p.category}</p>
      <p>${p.gsm} | MOQ ${p.moq}</p>
      <p>${p.feature}</p>
      <a href="product.html?id=${p.id}">View</a>
    </div>
  `;
});
</script>
