<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SummitTex Products</title>

<style>
body{
    font-family:Arial;
    background:#0b0f14;
    color:white;
    margin:0;
    padding:20px;
}

h1{
    margin-bottom:20px;
}

#filters{
    margin-bottom:20px;
}

button{
    margin-right:10px;
    padding:10px 16px;
    background:#1f2937;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

input{
    width:300px;
    padding:10px;
    margin-bottom:20px;
    border-radius:8px;
    border:none;
}

#grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:20px;
}

.card{
    background:#111827;
    border-radius:12px;
    padding:15px;
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:10px;
}

.card h3{
    margin-top:10px;
}

.card a{
    display:inline-block;
    margin-top:10px;
    color:#60a5fa;
    text-decoration:none;
}
</style>

</head>

<body>

<h1>SummitTex Functional Fabrics</h1>

<div id="filters">
    <button onclick="filterProducts('All')">All</button>
    <button onclick="filterProducts('Waterproof')">Waterproof</button>
    <button onclick="filterProducts('Softshell')">Softshell</button>
    <button onclick="filterProducts('TPU')">TPU</button>
</div>

<input id="search" placeholder="Search fabrics...">

<div id="grid"></div>

<!-- 产品数据 -->
<script src="data/products.js"></script>

<!-- 正确JS路径 -->
<script src="js/app.js"></script>

<script>
// 兜底防报错（如果 app.js 没写完整）
if(typeof render === "undefined"){

const grid = document.getElementById("grid");

function render(list){
    grid.innerHTML = "";
    list.forEach(p=>{
        grid.innerHTML += `
        <div class="card">
            <img src="${p.image}">
            <h3>${p.name}</h3>
            <p>${p.category} | ${p.gsm}gsm</p>
            <a href="product.html?id=${p.id}">View Details</a>
        </div>
        `;
    });
}

render(products);

// 搜索
document.getElementById("search").addEventListener("input", e=>{
    const v = e.target.value.toLowerCase();
    render(products.filter(p=>p.name.toLowerCase().includes(v)));
});

// filter
window.filterProducts = function(cat){
    if(cat==="All") return render(products);
    render(products.filter(p=>p.category===cat));
};

}

</script>

</body>
</html>
