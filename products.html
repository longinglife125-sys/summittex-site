<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Products | SummitTex</title>
    <style>
        body{
            font-family:Arial;
            background:#0b0f14;
            color:white;
            margin:0;
            padding:20px;
        }

        #productGrid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
            margin-top:20px;
        }

        .card{
            background:#111827;
            padding:15px;
            border-radius:12px;
            border:1px solid #333;
        }

        .card img{
            width:100%;
            border-radius:10px;
        }
    </style>
</head>

<body>

<h1>SummitTex Fabrics</h1>

<p>Functional Fabric Manufacturer</p>

<div id="productGrid"></div>

<script src="data/products.js"></script>

<script>
const grid = document.getElementById("productGrid");

products.forEach(p => {
    grid.innerHTML += `
        <div class="card">
            <img src="${p.image}">
            <h3>${p.name}</h3>
            <p>${p.category}</p>
            <p>${p.gsm} | MOQ ${p.moq}</p>
            <p>${p.feature}</p>
            <a href="product.html?id=${p.id}" style="color:#60a5fa;">View Details</a>
        </div>
    `;
});
</script>

</body>
</html>
