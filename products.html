<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Textile Fabrics | SummitTex</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f5f7fa;
    color:#111827;
}

.container{
    width:92%;
    max-width:1200px;
    margin:auto;
}

/* HEADER */
header{
    background:white;
    padding:18px 0;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.nav{
    display:flex;
    justify-content:space-between;
}

/* FILTERS */
.filters{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin:25px 0;
}

.filter{
    padding:8px 14px;
    border-radius:999px;
    background:white;
    border:1px solid #e5e7eb;
    cursor:pointer;
    font-size:13px;
}

.filter.active{
    background:#2563eb;
    color:white;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:20px;
}

/* PRODUCT CARD */
.product-card{
    background:white;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,.06);
    cursor:pointer;
    transition:.3s;
}

.product-card:hover{
    transform:translateY(-6px);
}

/* IMAGE */
.img-box{
    position:relative;
    height:200px;
    overflow:hidden;
    background:#f0f0f0;
    display:flex;
    align-items:center;
    justify-content:center;
}

.img-box img{
    width:100%;
    height:100%;
    object-fit:cover;
    position:absolute;
    top:0;
    left:0;
    transition:.4s;
}

.hover-img{
    opacity:0;
}

.img-box:hover .hover-img{
    opacity:1;
}

.no-img{
    color:#999;
    font-size:14px;
}

/* INFO */
.info{
    padding:14px;
}

.tag{
    font-size:12px;
    color:#2563eb;
    background:#e0edff;
    display:inline-block;
    padding:4px 10px;
    border-radius:999px;
    margin-bottom:8px;
}

.meta{
    font-size:13px;
    color:#6b7280;
}

.feature{
    font-size:12px;
    color:#9ca3af;
    margin-top:6px;
}

/* BUTTON */
button{
    width:100%;
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

/* SEARCH */
input{
    width:100%;
    padding:12px;
    margin-top:18px;
    border-radius:10px;
    border:1px solid #e5e7eb;
    box-sizing:border-box;
}

/* 加载提示 */
.loading{
    text-align:center;
    padding:40px;
    color:#666;
}

.error-msg{
    background:#fee2e2;
    color:#dc2626;
    padding:12px;
    border-radius:8px;
    margin:20px 0;
    text-align:center;
}

</style>

</head>

<body>

<header>
<div class="container nav">
<b>SummitTex Products</b>
<a href="index.html">Home</a>
</div>
</header>

<div class="container">

<h1>Fabric Collections</h1>

<input id="search" placeholder="Search fabrics...">

<div class="filters" id="filters"></div>

<div class="grid" id="grid">
    <div class="loading">加载产品中...</div>
</div>

</div>

<script>

/* ===================== */
/* SUPABASE CONFIG */
/* ===================== */

const SUPABASE_URL = "https://tpcxaelljrudshchuzia.supabase.co";
const SUPABASE_KEY = "sb_publishable_c0xeymh6AnE-Ld7StbxpgA_YN3ig8qt";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ===================== */
/* STATE */
/* ===================== */

let products = [];
let current = "All";
let isLoading = true;

/* ===================== */
/* CATEGORIES（从数据库动态获取） */
/* ===================== */

let categories = ["All"];

/* ===================== */
/* INIT */
/* ===================== */

load();

/* ===================== */
/* LOAD DATA（只从数据库读取，不使用演示数据） */
/* ===================== */

async function load(){

try{
    isLoading = true;
    document.getElementById("grid").innerHTML = '<div class="loading">加载产品中...</div>';
    
    console.log("正在连接Supabase...");
    
    let { data, error } = await sb
        .from("products")
        .select("*");
    
    if(error){
        console.error("数据库错误详情:", error);
        document.getElementById("grid").innerHTML = `<div class="error-msg">❌ 数据库连接失败: ${error.message}<br><br>请检查：<br>1. Supabase URL和KEY是否正确<br>2. 网络是否正常</div>`;
        return;
    }
    
    console.log("数据库返回数据:", data);
    
    if(data && data.length > 0){
        products = data;
        console.log(`✅ 成功加载 ${products.length} 个产品`);
        
        // 从产品中提取唯一的分类
        const uniqueCats = [...new Set(data.map(p => p.category).filter(c => c))];
        categories = ["All", ...uniqueCats];
        
    }else{
        products = [];
        console.log("数据库中没有产品，请在后台上传");
        document.getElementById("grid").innerHTML = '<div class="loading" style="color:#999;">📭 暂无产品，请在后台添加</div>';
    }
    
    renderFilters();
    render();

}catch(err){
    console.error("加载异常:", err);
    document.getElementById("grid").innerHTML = `<div class="error-msg">❌ 系统异常: ${err.message}</div>`;
}

}

/* ===================== */
/* FILTER UI */
/* ===================== */

function renderFilters(){

let html = "";

categories.forEach(c=>{
let activeClass = (c === current) ? "active" : "";
html += `<div class="filter ${activeClass}" data-cat="${c.replace(/'/g, "\\'")}" onclick="setFilter(event, '${c.replace(/'/g, "\\'")}')">${escapeHtml(c)}</div>`;
});

document.getElementById("filters").innerHTML = html;
}

/* ===================== */
/* FILTER */
/* ===================== */

function setFilter(e,c){

current = c;

document.querySelectorAll(".filter").forEach(el=>{
el.classList.remove("active");
});

e.target.classList.add("active");

render();
}

/* ===================== */
/* SEARCH */
/* ===================== */

document.getElementById("search").addEventListener("input", function(){
    render();
});

/* ===================== */
/* DETAIL PAGE */
/* ===================== */

function goDetail(id){
window.location.href = "product.html?id=" + id;
}

/* ===================== */
/* RENDER（核心展示） */
/* ===================== */

function render(){

if(!products || products.length === 0){
    document.getElementById("grid").innerHTML = '<div class="loading" style="color:#999;">📭 暂无产品，请在后台添加</div>';
    return;
}

let key = document.getElementById("search").value.toLowerCase();

let list = products.filter(p=>{

let matchCat = current === "All" || p.category === current;

let matchSearch = true;
if(key){
    matchSearch = 
        (p.name || "").toLowerCase().includes(key) ||
        (p.feature || "").toLowerCase().includes(key) ||
        (p.category || "").toLowerCase().includes(key);
}

return matchCat && matchSearch;
});

if(list.length === 0){
    document.getElementById("grid").innerHTML = '<div class="loading" style="color:#999;">🔍 没有找到匹配的产品</div>';
    return;
}

let html = "";

list.forEach(p=>{

let img = p.image || "";
let hoverImg = (p.images && p.images.length > 0) ? p.images[0] : img;

// 图片显示处理
let imgHtml = '';
if(img){
    imgHtml = `<img src="${img}" class="main-img" onerror="this.style.display='none';this.parentElement.innerHTML='<div class=\'no-img\'>📷 图片加载失败</div>'">`;
    if(hoverImg && hoverImg !== img){
        imgHtml += `<img src="${hoverImg}" class="hover-img" onerror="this.style.display='none'">`;
    }
}else{
    imgHtml = '<div class="no-img">📷 无图片</div>';
}

html += `
<div class="product-card" onclick="goDetail('${p.id}')">

    <div class="img-box">
        ${imgHtml}
    </div>

    <div class="info">

        <div class="tag">${escapeHtml(p.category || "Fabric")}</div>

        <h3>${escapeHtml(p.name || "")}</h3>

        <p class="meta">
            GSM: ${escapeHtml(p.gsm || "-")} | MOQ: ${escapeHtml(p.moq || "-")}
        </p>

        <p class="feature">
            ${escapeHtml((p.feature || "").substring(0,80))}
        </p>

        <button>View Details</button>

    </div>

</div>
`;
});

document.getElementById("grid").innerHTML = html;
}

/* ===================== */
/* 防XSS辅助函数 */
/* ===================== */
function escapeHtml(str){
    if(!str) return "";
    return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}

</script>

</body>
</html>
