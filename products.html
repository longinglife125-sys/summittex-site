<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neoprene & Technical Materials | Siyin</title>
<meta name="description" content="Wetsuit neoprene, sports, medical, outdoor & industrial foam materials. OEM/ODM manufacturer.">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family:Inter; margin:0; background:#fff; padding-top:80px; color:#1f2937; }

.container { max-width:1200px; margin:auto; padding:0 20px; }

.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:24px; }

.card {
  border:1px solid #eef2ff;
  border-radius:16px;
  overflow:hidden;
  transition:0.3s;
  cursor:pointer;
}
.card:hover { transform:translateY(-6px); box-shadow:0 20px 40px rgba(0,0,0,0.08); }

.card img { width:100%; height:200px; object-fit:cover; }

.content { padding:16px; }

.title { font-weight:600; font-size:16px; color:#0f3b5c; margin-bottom:6px; }

.category { font-size:12px; color:#00bfff; margin-bottom:8px; }

.tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }

.tag {
  font-size:11px;
  padding:3px 8px;
  border-radius:20px;
  background:#f1f5f9;
  color:#475569;
}

.business {
  background:#fff7ed;
  color:#c2410c;
}

.spec { font-size:12px; color:#6b7280; margin-top:8px; }

a { text-decoration:none; }

@media(max-width:900px){
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="container">
  <h1 style="margin-bottom:20px;">Products</h1>
  <div id="grid" class="grid"></div>
</div>

<script>
const sb = supabase.createClient(
  "https://tpcxaelljrudshchuzia.supabase.co",
  "sb_publishable_c0xeymh6AnE-Ld7StbxpgA_YN3ig8qt"
);

async function load(){
  const {data} = await sb.from("products").select("*").order("id",{ascending:false});

  const grid = document.getElementById("grid");

  grid.innerHTML = (data||[]).map(p=>`

    <a href="product.html?id=${p.id}">
    <div class="card">

      <img src="${p.image||''}" onerror="this.src='https://placehold.co/400x300'">

      <div class="content">

        <div class="category">🏷️ ${p.category||''}</div>

        <div class="title">${p.name}</div>

        <div class="spec">
          ${p.thickness||'Custom'} | MOQ: ${p.moq||'Contact'}
        </div>

        <div class="tags">
          ${(p.features||[]).slice(0,3).map(t=>`<span class="tag">${t}</span>`).join('')}
        </div>

        <div class="tags">
          ${(p.applications||[]).slice(0,2).map(t=>`<span class="tag business">${t}</span>`).join('')}
        </div>

      </div>

    </div>
    </a>

  `).join('');
}

load();
</script>

</body>
</html>
