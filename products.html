<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Products | Neoprene & Laminated Fabrics | Siyin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family: 'Inter', sans-serif;
    background: #f5f7fc;
    color: #1a2a3a;
    line-height: 1.5;
}
.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 32px;
}
/* 导航栏 */
.navbar {
    background: #0f2b3d;
    position: sticky;
    top: 0;
    z-index: 1000;
}
.nav-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 64px;
}
.logo {
    font-size: 22px;
    font-weight: 700;
    color: white;
}
.logo span {
    color: #00bfff;
}
.nav-links {
    display: flex;
    gap: 32px;
}
.nav-links a {
    color: white;
    text-decoration: none;
    font-weight: 500;
    font-size: 14px;
}
.nav-links a:hover, .nav-links a.active {
    color: #00bfff;
}
/* Banner */
.slim-banner {
    background: linear-gradient(135deg, #1a4a6a 0%, #0f2b3d 100%);
    color: white;
    padding: 48px 0 40px;
    text-align: center;
}
.slim-banner h1 {
    font-size: 32px;
    margin-bottom: 12px;
}
.slim-banner p {
    font-size: 16px;
    opacity: 0.9;
    margin-bottom: 24px;
}
.banner-buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
}
.btn-sample, .btn-quote {
    padding: 12px 32px;
    border-radius: 40px;
    font-weight: 600;
    font-size: 14px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
}
.btn-sample {
    background: transparent;
    color: white;
    border: 1px solid #00bfff;
}
.btn-sample:hover {
    background: #00bfff;
    color: #0f2b3d;
}
.btn-quote {
    background: #00bfff;
    color: #0f172a;
}
.btn-quote:hover {
    background: #0099cc;
}
/* 搜索栏 */
.search-bar {
    background: white;
    border-radius: 60px;
    padding: 6px 6px 6px 24px;
    display: flex;
    align-items: center;
    margin: 32px 0 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    border: 1px solid #e2e8f0;
}
.search-input {
    flex: 1;
    border: none;
    padding: 12px 0;
    font-size: 14px;
    outline: none;
}
/* 主布局 */
.main-content {
    display: flex;
    gap: 32px;
    margin: 20px 0 40px;
}
/* 左侧分类 */
.category-sidebar {
    width: 260px;
    flex-shrink: 0;
    background: white;
    border-radius: 20px;
    border: 1px solid #e2e8f0;
    position: sticky;
    top: 80px;
    height: fit-content;
}
.sidebar-header {
    padding: 18px 20px 12px;
    border-bottom: 1px solid #eef2ff;
}
.sidebar-header h3 {
    font-size: 16px;
    font-weight: 500;
}
.category-list {
    padding: 8px 0;
}
.category-item {
    padding: 12px 20px;
    cursor: pointer;
    transition: all 0.2s;
    border-left: 3px solid transparent;
    font-weight: 400;
    font-size: 14px;
    color: #334155;
}
.category-item:hover {
    background: #f8fafc;
    color: #00bfff;
}
.category-item.active {
    background: #eef2ff;
    border-left-color: #00bfff;
    color: #00bfff;
}
.subcategory-list {
    padding-left: 32px;
    display: none;
}
.subcategory-list.show {
    display: block;
}
.subcategory-item {
    padding: 8px 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 400;
    color: #64748b;
    transition: all 0.2s;
}
.subcategory-item:hover {
    color: #00bfff;
}
.subcategory-item.active {
    color: #00bfff;
}
/* 产品卡片 */
.products-area {
    flex: 1;
}
.products-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}
.products-count {
    font-size: 14px;
    color: #6b7280;
}
.products-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
}
.product-card {
    background: white;
    border: 1px solid #e2e8f0;
    border-radius: 20px;
    overflow: hidden;
    transition: all 0.3s;
    position: relative;
}
.product-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 24px -8px rgba(0,0,0,0.12);
    border-color: #00bfff;
}
.product-img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    background: #f1f5f9;
    cursor: pointer;
}
.product-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    display: flex;
    gap: 8px;
}
.badge-hot {
    background: #ff4757;
    color: white;
    padding: 4px 12px;
    border-radius: 30px;
    font-size: 10px;
    font-weight: 600;
}
.badge-oem {
    background: #f59e0b;
    color: white;
    padding: 4px 12px;
    border-radius: 30px;
    font-size: 10px;
    font-weight: 600;
}
.product-info {
    padding: 16px;
}
.product-title {
    font-size: 15px;
    font-weight: 400;
    margin-bottom: 8px;
    cursor: pointer;
    color: #1a2a3a;
    line-height: 1.4;
}
.product-title:hover {
    color: #00bfff;
}
.product-price {
    font-size: 24px;
    font-weight: 700;
    color: #00bfff;
    margin: 10px 0 8px;
}
.product-price small {
    font-size: 13px;
    font-weight: 400;
    color: #94a3b8;
}
.product-meta {
    font-size: 12px;
    color: #64748b;
    margin: 8px 0;
}
.cta-quote {
    width: 100%;
    background: #00bfff;
    border: none;
    padding: 10px 0;
    border-radius: 40px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: white;
    transition: all 0.2s;
    margin-top: 8px;
}
.cta-quote:hover {
    background: #0099cc;
}
/* 分页 */
.pagination {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin: 40px 0 50px;
}
.pagination button {
    min-width: 40px;
    height: 40px;
    padding: 0 12px;
    border: 1px solid #e2e8f0;
    background: white;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 400;
    cursor: pointer;
}
.pagination button.active {
    background: #00bfff;
    color: white;
    border-color: #00bfff;
}
.pagination button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
/* 移动端 */
.mobile-category-btn {
    display: none;
    background: white;
    border: 1px solid #e2e8f0;
    padding: 10px 20px;
    border-radius: 40px;
    font-weight: 500;
    margin-bottom: 16px;
    width: fit-content;
    cursor: pointer;
}
.category-drawer {
    position: fixed;
    top: 0;
    left: -100%;
    width: 85%;
    max-width: 300px;
    height: 100%;
    background: white;
    z-index: 1200;
    transition: left 0.3s;
    overflow-y: auto;
    padding: 20px;
}
.category-drawer.open {
    left: 0;
}
.drawer-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 1190;
    display: none;
}
.drawer-overlay.open {
    display: block;
}
.close-drawer {
    float: right;
    font-size: 24px;
    cursor: pointer;
}
.footer {
    background: #0f2b3d;
    color: #94a3b8;
    padding: 48px 0;
    text-align: center;
}
@media (max-width: 1024px) {
    .products-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
    .container { padding: 0 20px; }
    .main-content { flex-direction: column; }
    .category-sidebar { display: none; }
    .mobile-category-btn { display: inline-block; }
    .products-grid { grid-template-columns: 1fr; }
    .product-price { font-size: 22px; }
}
</style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <div class="logo">SY<span>siyin</span></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="products.html" class="active">Products</a>
            <a href="factory.html">Factory</a>
            <a href="contact.html">Contact</a>
            <a href="admin.html">Admin</a>
        </div>
    </div>
</nav>

<section class="slim-banner">
    <div class="container">
        <h1>Neoprene & Laminated Fabrics</h1>
        <p>CR / SCR / SBR Neoprene | Laminated Composites | OEM Solutions</p>
        <div class="banner-buttons">
            <button class="btn-sample" onclick="scrollToContact()">📦 Request Sample</button>
            <button class="btn-quote" onclick="scrollToContact()">💰 Get Quote</button>
        </div>
    </div>
</section>

<section class="container">
    <div class="search-bar">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search products...">
    </div>
    
    <button class="mobile-category-btn" id="mobileCategoryBtn">📁 All Categories</button>
    
    <div class="main-content">
        <div class="category-sidebar" id="categorySidebar">
            <div class="sidebar-header">
                <h3>All Categories</h3>
            </div>
            <div class="category-list" id="categoryList"></div>
        </div>
        
        <div class="products-area">
            <div class="products-header">
                <div class="products-count" id="productsCount">Loading...</div>
            </div>
            <div id="productsGrid" class="products-grid"></div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>
</section>

<div id="drawerOverlay" class="drawer-overlay"></div>
<div id="categoryDrawer" class="category-drawer">
    <span class="close-drawer" id="closeDrawerBtn">✕</span>
    <div id="drawerContent"></div>
</div>

<footer class="footer">
    <div class="container">
        <div class="logo" style="margin-bottom: 16px;">SY<span>siyin</span></div>
        <p>Dongguan Siyin Sports Goods Co., Ltd.</p>
        <p>© 2025 Siyin. All rights reserved.</p>
    </div>
</footer>

<script>
const SUPABASE_URL = "https://tpcxaelljrudshchuzia.supabase.co";
const SUPABASE_KEY = "sb_publishable_c0xeymh6AnE-Ld7StbxpgA_YN3ig8qt";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 7大分类
const CATEGORY_TREE = [
    { id: 1, name: "Neoprene by Material", subcategories: ["CR Neoprene", "SCR Neoprene", "SBR Neoprene", "Eco Neoprene"] },
    { id: 2, name: "Laminated Neoprene Fabric", subcategories: ["Polyester Lamination", "Spandex Lamination", "Lycra Lamination", "Jersey Lamination", "OK Fabric Lamination", "Mesh Lamination", "Velvet Lamination", "TPU Lamination"] },
    { id: 3, name: "Application Materials", subcategories: ["Wetsuit Materials", "Cup Sleeve Materials", "Footwear Materials", "Sports Protection Materials", "Bag Materials", "Medical Support Materials", "Fitness Materials"] },
    { id: 4, name: "Functional Neoprene", subcategories: ["Waterproof", "Stretch", "Breathable", "Embossed", "Perforated", "Printed", "Thermal Insulation"] },
    { id: 5, name: "Surface Fabric Options", subcategories: ["T Fabric", "Lycra", "OK Fabric", "Mesh", "Satin", "Brushed", "Milk Silk", "Velvet"] },
    { id: 6, name: "OEM Custom Solutions", subcategories: ["Custom Thickness", "Custom Color", "Custom Lamination", "Sample Development"] },
    { id: 7, name: "Best Sellers", subcategories: [] }
];

let allProducts = [];
let selectedMainCategory = null;
let selectedSubCategory = null;
let currentPage = 1;
let totalPages = 1;
let searchKeyword = "";

// 渲染左侧分类
function renderCategorySidebar() {
    const container = document.getElementById("categoryList");
    let html = "";
    CATEGORY_TREE.forEach(cat => {
        const hasSubcats = cat.subcategories.length > 0;
        const isActive = selectedMainCategory === cat.name;
        html += `
            <div class="category-item ${isActive ? 'active' : ''}" data-category="${cat.name}">${cat.name}</div>
            <div class="subcategory-list ${isActive ? 'show' : ''}" data-parent="${cat.name}">
                ${hasSubcats ? cat.subcategories.map(sub => `
                    <div class="subcategory-item ${selectedSubCategory === sub ? 'active' : ''}" data-sub="${sub}">${sub}</div>
                `).join('') : '<div style="padding: 8px 20px; font-size: 12px; color: #94a3b8;">—</div>'}
            </div>
        `;
    });
    container.innerHTML = html;
    
    document.querySelectorAll(".category-item").forEach(item => {
        item.onclick = () => {
            const category = item.dataset.category;
            if (selectedMainCategory === category) {
                selectedMainCategory = null;
                selectedSubCategory = null;
                document.querySelectorAll(".category-item").forEach(c => c.classList.remove("active"));
                document.querySelectorAll(".subcategory-list").forEach(sub => sub.classList.remove("show"));
            } else {
                selectedMainCategory = category;
                selectedSubCategory = null;
                document.querySelectorAll(".category-item").forEach(c => c.classList.remove("active"));
                item.classList.add("active");
                document.querySelectorAll(".subcategory-list").forEach(sub => sub.classList.remove("show"));
                const subList = document.querySelector(`.subcategory-list[data-parent="${category}"]`);
                if (subList) subList.classList.add("show");
            }
            currentPage = 1;
            applyFiltersAndRender();
        };
    });
    
    document.querySelectorAll(".subcategory-item").forEach(item => {
        item.onclick = (e) => {
            e.stopPropagation();
            const sub = item.dataset.sub;
            selectedSubCategory = selectedSubCategory === sub ? null : sub;
            document.querySelectorAll(".subcategory-item").forEach(s => s.classList.remove("active"));
            if (selectedSubCategory) item.classList.add("active");
            currentPage = 1;
            applyFiltersAndRender();
        };
    });
}

// 加载产品
async function loadProducts() {
    try {
        const { data, error } = await sb.from("products").select("*");
        if (error) throw error;
        allProducts = data || [];
        renderCategorySidebar();
        applyFiltersAndRender();
    } catch (err) {
        console.error(err);
        allProducts = [];
        applyFiltersAndRender();
    }
}

function filterProducts() {
    return allProducts.filter(p => {
        if (selectedMainCategory && p.main_category !== selectedMainCategory) return false;
        if (selectedSubCategory && p.sub_category !== selectedSubCategory) return false;
        if (searchKeyword.trim()) {
            return p.name?.toLowerCase().includes(searchKeyword.toLowerCase());
        }
        return true;
    });
}

function applyFiltersAndRender() {
    let filtered = filterProducts();
    totalPages = Math.ceil(filtered.length / 9);
    if (currentPage > totalPages && totalPages > 0) currentPage = totalPages;
    if (currentPage < 1) currentPage = 1;
    const paginated = filtered.slice((currentPage - 1) * 9, currentPage * 9);
    renderProductGrid(paginated);
    renderPagination();
    document.getElementById("productsCount").innerHTML = `Found ${filtered.length} products`;
}

function renderProductGrid(products) {
    const container = document.getElementById("productsGrid");
    if (!products.length) {
        container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px;">No products found.</div>`;
        return;
    }
    
    container.innerHTML = products.map(p => {
        let priceHtml = '';
        if (p.price && p.price > 0) {
            priceHtml = `<div class="product-price">$${p.price}<small> / yard</small></div>`;
        } else {
            priceHtml = `<div class="product-price" style="font-size:18px;">Contact for Price</div>`;
        }
        
        const moq = p.moq || "Contact";
        const isHot = p.is_hot;
        const isOem = p.is_oem;
        
        return `<div class="product-card">
            <div class="product-badge">
                ${isHot ? '<span class="badge-hot">🔥 HOT</span>' : ''}
                ${isOem ? '<span class="badge-oem">🔧 OEM</span>' : ''}
            </div>
            <img src="${p.image || 'https://placehold.co/400x260/1a2a3a/white?text=Neoprene'}" 
                 class="product-img" 
                 onclick="location.href='product.html?id=${p.id}'" 
                 onerror="this.src='https://placehold.co/400x260/1a2a3a/white?text=Neoprene'">
            <div class="product-info">
                <div class="product-title" onclick="location.href='product.html?id=${p.id}'">${escapeHtml(p.name)}</div>
                ${priceHtml}
                <div class="product-meta">📦 MOQ: ${escapeHtml(moq)}</div>
                <button class="cta-quote" onclick="goToQuote('${p.id}', '${escapeHtml(p.name)}')">💰 Get Quote</button>
            </div>
        </div>`;
    }).join('');
}

function renderPagination() {
    const container = document.getElementById("pagination");
    if (totalPages <= 1) { container.innerHTML = ""; return; }
    let html = `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹ Prev</button>`;
    for (let i = 1; i <= Math.min(totalPages, 5); i++) {
        html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
    }
    if (totalPages > 5) html += `<button disabled>...</button><button onclick="goToPage(${totalPages})">${totalPages}</button>`;
    html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next ›</button>`;
    container.innerHTML = html;
}

function goToPage(page) { 
    if (page < 1 || page > totalPages) return; 
    currentPage = page; 
    applyFiltersAndRender(); 
    window.scrollTo({ top: 450, behavior: 'smooth' }); 
}

function goToQuote(id, name) { 
    window.location.href = `contact.html?product=${encodeURIComponent(name)}`; 
}

function scrollToContact() { 
    window.location.href = "contact.html"; 
}

function escapeHtml(str) { 
    if (!str) return ""; 
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]); 
}

document.getElementById("searchInput")?.addEventListener("input", (e) => { searchKeyword = e.target.value; currentPage = 1; applyFiltersAndRender(); });

// 移动端
function buildDrawer() {
    const drawerDiv = document.getElementById("drawerContent");
    const clone = document.querySelector(".category-sidebar").cloneNode(true);
    clone.id = "";
    drawerDiv.innerHTML = "";
    drawerDiv.appendChild(clone);
    clone.querySelectorAll(".category-item").forEach(item => {
        item.onclick = () => {
            const category = item.dataset.category;
            if (selectedMainCategory === category) {
                selectedMainCategory = null;
                selectedSubCategory = null;
            } else {
                selectedMainCategory = category;
                selectedSubCategory = null;
            }
            currentPage = 1;
            applyFiltersAndRender();
            document.getElementById("categoryDrawer").classList.remove("open");
            document.getElementById("drawerOverlay").classList.remove("open");
            renderCategorySidebar();
        };
    });
}

document.getElementById("mobileCategoryBtn")?.addEventListener("click", () => { if (!document.getElementById("drawerContent").innerHTML) buildDrawer(); document.getElementById("categoryDrawer").classList.add("open"); document.getElementById("drawerOverlay").classList.add("open"); });
document.getElementById("closeDrawerBtn")?.addEventListener("click", () => { document.getElementById("categoryDrawer").classList.remove("open"); document.getElementById("drawerOverlay").classList.remove("open"); });
document.getElementById("drawerOverlay")?.addEventListener("click", () => { document.getElementById("categoryDrawer").classList.remove("open"); document.getElementById("drawerOverlay").classList.remove("open"); });

loadProducts();
</script>
</body>
</html>
