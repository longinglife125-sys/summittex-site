<!-- Applications (改成苹果级风格) -->
<section class="apps-section">
    <div class="container">
        <h2 class="section-title">Applications</h2>
        <p class="section-subtitle">High-performance fabrics for diverse industries and extreme environments</p>

        <div class="industry-carousel" id="industryCarousel">
            <!-- JS渲染行业卡 -->
        </div>
    </div>
</section>

<style>
/* 横向行业卡（类似苹果官网风格） */
.industry-carousel {
    display: flex;
    gap: 48px;
    overflow-x: auto;
    padding-bottom: 16px;
    scroll-snap-type: x mandatory;
}
.industry-card-hero {
    flex: 0 0 600px;
    border-radius: 24px;
    overflow: hidden;
    position: relative;
    scroll-snap-align: start;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    transition: transform 0.3s, box-shadow 0.3s;
    background: white;
}
.industry-card-hero:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.12);
}
.industry-card-hero img {
    width: 100%;
    height: 280px;
    object-fit: cover;
}
.industry-card-hero .industry-info {
    padding: 24px;
}
.industry-card-hero h3 {
    font-size: 22px;
    margin-bottom: 12px;
    color: #0f3b5c;
}
.industry-card-hero p {
    font-size: 14px;
    color: #64748b;
    margin-bottom: 16px;
}
.industry-card-hero ul {
    list-style: none;
    padding: 0;
}
.industry-card-hero ul li {
    font-size: 13px;
    color: #1e293b;
    padding: 4px 0;
    position: relative;
}
.industry-card-hero ul li::before {
    content: "✓";
    color: #2c7da0;
    font-weight: bold;
    margin-right: 6px;
}
@media (max-width: 1024px) {
    .industry-card-hero { flex: 0 0 80%; }
}
@media (max-width: 640px) {
    .industry-card-hero { flex: 0 0 90%; }
}
</style>

<script>
const industries = [
    {
        name: "Water Sports",
        desc: "High-performance neoprene solutions for aquatic environments",
        image: "https://images.unsplash.com/photo-1535223289827-42f1e9919769?q=80&w=600",
        subItems: ["Wetsuits", "Surfwear", "Diving Gloves", "Thermal insulation"]
    },
    {
        name: "Sports & Fitness",
        desc: "Compression and support gear for athletes and enthusiasts",
        image: "https://images.unsplash.com/photo-1599058917217-02b6e6c9cfb4?q=80&w=600",
        subItems: ["Knee supports", "Weight vests", "Fitness gear", "Protective equipment"]
    },
    {
        name: "Bags & Luggage",
        desc: "Protective cases and backpack padding solutions",
        image: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?q=80&w=600",
        subItems: ["Backpack padding", "Protective cases", "Luggage compartments"]
    },
    {
        name: "Medical & Orthopedic",
        desc: "Orthopedic and rehabilitation supports with superior comfort",
        image: "https://images.unsplash.com/photo-1576091160550-2173dba999ef?q=80&w=600",
        subItems: ["Orthopedic braces", "Compression gear", "Medical supports"]
    },
    {
        name: "Automotive Interior",
        desc: "Advanced padding and lamination for car interiors",
        image: "https://images.unsplash.com/photo-1580273916550-e323be2ae537?q=80&w=600",
        subItems: ["Seat padding", "Sound insulation", "Trim lamination"]
    }
];

function renderIndustryCarousel() {
    const container = document.getElementById("industryCarousel");
    container.innerHTML = industries.map(ind => `
        <div class="industry-card-hero">
            <img src="${ind.image}" alt="${ind.name}">
            <div class="industry-info">
                <h3>${ind.name}</h3>
                <p>${ind.desc}</p>
                <ul>${ind.subItems.map(item => `<li>${item}</li>`).join('')}</ul>
            </div>
        </div>
    `).join('');
}

renderIndustryCarousel();
</script>
