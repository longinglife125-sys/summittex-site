<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siyin | Neoprene Lamination Expert</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ===================== Reset & Base ===================== */
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:#f8fafc; color:#1e293b; line-height:1.5; }
a { text-decoration:none; }
.container { max-width:1280px; margin:0 auto; padding:0 24px; }

/* ===================== Header ===================== */
header { position:fixed; top:0; left:0; width:100%; background:rgba(255,255,255,0.96); backdrop-filter:blur(10px); z-index:1000; border-bottom:1px solid #e2e8f0; }
.navbar { display:flex; justify-content:space-between; align-items:center; padding:16px 0; }
.logo h1 { font-size:24px; font-weight:700; color:#0f3b5c; letter-spacing:1px; }
.logo span { font-size:10px; color:#2c7da0; letter-spacing:1px; }
.nav-links { display:flex; gap:32px; }
.nav-links a { font-size:14px; font-weight:500; color:#1e293b; transition:color 0.2s; }
.nav-links a:hover { color:#2c7da0; }
.btn { display:inline-block; padding:12px 28px; border-radius:40px; font-weight:600; transition:all 0.2s; cursor:pointer; border:none; }
.btn-primary { background:#0f3b5c; color:white; }
.btn-primary:hover { background:#1e4a6f; transform:translateY(-2px); }
.btn-outline { border:1px solid white; color:white; background:transparent; }
.btn-outline:hover { background:rgba(255,255,255,0.15); }

/* ===================== Hero ===================== */
.hero { padding:140px 0 100px; color:white; background:linear-gradient(135deg,#0f3b5c 0%,#1e4a6f 100%); background-size:cover; background-position:center; transition: background-image 0.3s ease; }
.hero-content { max-width:600px; }
.hero-badge { display:inline-block; background:rgba(255,255,255,0.2); padding:6px 14px; border-radius:40px; font-size:12px; font-weight:600; margin-bottom:24px; backdrop-filter:blur(4px); }
.hero h1 { font-size:48px; font-weight:700; line-height:1.2; margin-bottom:20px; }
.hero h1 span { color:#a3e635; }
.hero p { font-size:18px; color:rgba(255,255,255,0.9); margin-bottom:32px; }
.hero-buttons { display:flex; gap:16px; }

/* ===================== Section Titles ===================== */
.section-title { text-align:center; font-size:32px; font-weight:700; margin-bottom:16px; color:#0f3b5c; }
.section-subtitle { text-align:center; color:#64748b; margin-bottom:48px; max-width:600px; margin-left:auto; margin-right:auto; }

/* ===================== Applications ===================== */
.apps-section { padding:70px 0; background:#ffffff; }
.industry-carousel { display:flex; gap:48px; overflow-x:auto; padding-bottom:16px; scroll-snap-type:x mandatory; }
.industry-card-hero { flex:0 0 600px; border-radius:24px; overflow:hidden; position:relative; scroll-snap-align:start; box-shadow:0 10px 30px rgba(0,0,0,0.08); transition: transform 0.3s, box-shadow 0.3s; background:white; }
.industry-card-hero:hover { transform:translateY(-6px); box-shadow:0 20px 40px rgba(0,0,0,0.12); }
.industry-card-hero img { width:100%; height:280px; object-fit:cover; }
.industry-card-hero .industry-info { padding:24px; }
.industry-card-hero h3 { font-size:22px; margin-bottom:12px; color:#0f3b5c; }
.industry-card-hero p { font-size:14px; color:#64748b; margin-bottom:16px; }
.industry-card-hero ul { list-style:none; padding:0; }
.industry-card-hero ul li { font-size:13px; color:#1e293b; padding:4px 0; position:relative; }
.industry-card-hero ul li::before { content:"✓"; color:#2c7da0; font-weight:bold; margin-right:6px; }

/* ===================== Material Solutions ===================== */
.material-solutions { margin-top:80px; margin-bottom:60px; }
.material-solutions h4 { text-align:center; font-size:24px; font-weight:600; margin-bottom:32px; color:#0f3b5c; }
.solution-grid { display:flex; justify-content:center; gap:48px; flex-wrap:wrap; }
.solution-item { text-align:center; }
.solution-item .icon { width:60px; height:60px; background:#e6f2f5; border-radius:60px; display:flex; align-items:center; justify-content:center; margin-bottom:12px; font-size:28px; }
.solution-item p { font-size:13px; font-weight:500; color:#1e293b; }

/* ===================== Technology ===================== */
.tech-section { padding:70px 0; background:#f8fafc; }
.tech-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:30px; }
.tech-card { background:white; border:1px solid #e2e8f0; border-radius:20px; padding:32px 24px; transition:all 0.3s; }
.tech-card:hover { transform:translateY(-6px); box-shadow:0 20px 30px -12px rgba(0,0,0,0.15); border-color:#2c7da0; }
.tech-icon { font-size:48px; margin-bottom:20px; }
.tech-card h3 { font-size:20px; margin-bottom:12px; color:#0f3b5c; }
.tech-card p { font-size:14px; color:#64748b; line-height:1.6; margin-bottom:16px; }
.tech-spec { font-size:12px; color:#2c7da0; font-weight:500; padding-top:12px; border-top:1px solid #e2e8f0; margin-top:8px; }

/* ===================== Featured Products ===================== */
.products-section { padding:70px 0; background:#ffffff; }
.products-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:30px; }
.product-card { background:white; border:1px solid #e2e8f0; border-radius:20px; overflow:hidden; cursor:pointer; transition:all 0.2s; }
.product-card:hover { transform:translateY(-6px); box-shadow:0 20px 30px -12px rgba(0,0,0,0.12); border-color:#2c7da0; }
.product-card img { width:100%; height:220px; object-fit:cover; }
.product-info { padding:20px; }
.product-info h3 { font-size:16px; margin-bottom:6px; color:#0f3b5c; }
.product-info p { font-size:13px; color:#64748b; }

/* ===================== CTA ===================== */
.cta-section { background:#0f3b5c; border-radius:32px; padding:60px 40px; text-align:center; margin:0 24px; }
.cta-section h2 { color:white; margin-bottom:16px; }
.cta-section p { color:#94a3b8; margin-bottom:24px; }
.cta-section .btn-primary { background:white; color:#0f3b5c; }

/* ===================== Footer ===================== */
footer { background:#0f172a; color:#94a3b8; padding:48px 0; text-align:center; margin-top:50px; }
.footer-logo { font-size:20px; font-weight:700; margin-bottom:16px; color:white; }
.footer-logo span { color:#2c7da0; }
