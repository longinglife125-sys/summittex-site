<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Detail - SummitTex</title>

<style>
body{
    font-family:Arial;
    background:#0b0f14;
    color:white;
    margin:0;
    padding:40px;
}

.container{
    max-width:1100px;
    margin:auto;
}

.back{
    color:#60a5fa;
    text-decoration:none;
    display:inline-block;
    margin-bottom:20px;
}

.layout{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:40px;
}

img{
    width:100%;
    border-radius:14px;
}

.box{
    background:#111827;
    padding:20px;
    border-radius:14px;
    margin-top:20px;
}

h1{
    font-size:32px;
}

.rfq{
    margin-top:30px;
    background:#1f2937;
    padding:20px;
    border-radius:14px;
}

input, textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:none;
}

button{
    margin-top:15px;
    padding:14px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    width:100%;
    font-size:16px;
}

@media(max-width:768px){
.layout{
    grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<div class="container">

<a class="back" href="products.html">← Back to Products</a>

<div id="content"></div>

</div>

<script src="data/products.js"></script>

<script>

const id =
new URLSearchParams(location.search).get("id");

/*
🟢 SEO关键：同时支持 id 和 slug
*/
const p = products.find(x =>
    x.id == id || x.slug == id
);

if(!p){
    document.getElementById("content").innerHTML =
    "<h2>Product Not Found</h2>";
}
else{

// 🟢 动态SEO标题（Google会读）
document.title = p.name + " | SummitTex";

// 🟢 页面内容
document.getElementById("content").innerHTML = `

<div class="layout">

<div>
<img src="${p.image}">
</div>

<div>

<h1>${p.name}</h1>

<p>${p.feature}</p>

<div class="box">
<h3>Specifications</h3>
<p><b>Category:</b> ${p.category}</p>
<p><b>Weight:</b> ${p.gsm} gsm</p>
<p><b>Width:</b> ${p.width}</p>
<p><b>MOQ:</b> ${p.moq}</p>
<p><b>Composition:</b> ${p.composition}</p>
</div>

<div class="box">
<h3>Application</h3>
<p>${p.application}</p>
</div>

<div class="box">
<h3>Why Choose Us</h3>
<p>
✔ Factory Direct Supply<br>
✔ Stable Quality Control<br>
✔ Export Experience<br>
✔ OEM / ODM Support<br>
✔ Fast Sample Service
</p>
</div>

</div>

</div>

<div class="rfq">

<h2>Request a Quote (RFQ)</h2>

<input id="name" placeholder="Your Name">
<input id="email" placeholder="Your Email">
<input id="qty" placeholder="Quantity (Meters)">
<textarea id="msg" placeholder="Tell us your requirement..."></textarea>

<button onclick="sendRFQ(p.name)">
Submit RFQ
</button>

</div>

`;

}

function sendRFQ(productName){

const name = document.getElementById("name").value;
const email = document.getElementById("email").value;
const qty = document.getElementById("qty").value;
const msg = document.getElementById("msg").value;

if(!name || !email){
    alert("Please fill name and email");
    return;
}

alert(
`RFQ Submitted!

Product: ${productName}
Name: ${name}
Email: ${email}
Quantity: ${qty}
Message: ${msg}

We will contact you soon.`
);

}

</script>

</body>
</html>
