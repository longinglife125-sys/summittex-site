<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Detail | Siyin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Inter;margin:0;background:#fff;padding:40px;color:#111;}
.container{max-width:1000px;margin:auto;}

h1{color:#0f3b5c;}

.gallery{display:flex;gap:10px;overflow:auto;margin:20px 0;}
.gallery img{width:260px;height:260px;object-fit:cover;border-radius:12px;}

.box{background:#f8fafc;padding:16px;border-radius:12px;margin:12px 0;}

.tags{display:flex;flex-wrap:wrap;gap:8px;}
.tag{padding:4px 10px;border-radius:20px;font-size:12px;background:#eef2ff;color:#0f3b5c;}
.biz{background:#fff7ed;color:#c2410c;}

.specs{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

button{
background:#00bfff;color:white;border:none;
padding:12px 20px;border-radius:30px;
font-weight:600;cursor:pointer;margin-top:20px;
}

iframe{width:100%;height:400px;border-radius:12px;margin-top:20px;}
</style>
</head>

<body>

<div class="container">

<h1 id="name"></h1>

<div id="gallery" class="gallery"></div>

<div class="box">
  <div id="category"></div>
  <div id="specs" class="specs"></div>
</div>

<div class="box">
  <h3>Features</h3>
  <div id="features" class="tags"></div>
</div>

<div class="box">
  <h3>Applications</h3>
  <div id="apps" class="tags"></div>
</div>

<div class="box">
  <h3>Description</h3>
  <div id="desc"></div>
</div>

<div id="video"></div>

<button>📩 Send Inquiry</button>

</div>

<script>
const sb = supabase.createClient(
  "https://tpcxaelljrudshchuzia.supabase.co",
  "sb_publishable_c0xeymh6AnE-Ld7StbxpgA_YN3ig8qt"
);

const id = new URLSearchParams(location.search).get("id");

async function load(){

  const {data:p} = await sb.from("products").select("*").eq("id",id).single();

  document.getElementById("name").innerText = p.name;

  document.getElementById("category").innerText = "Category: " + (p.category||'');

  document.getElementById("specs").innerHTML = `
    <div>Thickness: ${p.thickness||''}</div>
    <div>MOQ: ${p.moq||''}</div>
    <div>Width: ${p.width||''}</div>
    <div>GSM: ${p.gsm||''}</div>
  `;

  document.getElementById("desc").innerText = p.description||'';

  (p.images||[]).forEach(i=>{
    document.getElementById("gallery").innerHTML += `<img src="${i}">`;
  });

  (p.features||[]).forEach(t=>{
    document.getElementById("features").innerHTML += `<span class="tag">${t}</span>`;
  });

  (p.applications||[]).forEach(t=>{
    document.getElementById("apps").innerHTML += `<span class="tag biz">${t}</span>`;
  });

  if(p.video_url){
    let id = p.video_url.split("v=")[1];
    document.getElementById("video").innerHTML =
    `<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`;
  }
}

load();
</script>

</body>
</html>
