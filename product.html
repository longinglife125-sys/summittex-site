<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Detail | SummitTex</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    font-family:Arial;
    margin:0;
    background:#f5f7fa;
    color:#111827;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:30px;
}

.back{
    color:#2563eb;
    text-decoration:none;
    display:inline-block;
    margin-bottom:20px;
}

.back:hover{
    text-decoration:underline;
}

.layout{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:40px;
}

.main-img{
    width:100%;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
    background:#f0f0f0;
    min-height:300px;
    object-fit:contain;
}

.thumbs{
    display:flex;
    gap:10px;
    margin-top:12px;
    flex-wrap:wrap;
}

.thumbs img{
    width:70px;
    height:70px;
    object-fit:cover;
    border-radius:8px;
    cursor:pointer;
    border:2px solid transparent;
}

.thumbs img:hover{
    border:2px solid #2563eb;
}

.box{
    background:white;
    padding:20px;
    border-radius:14px;
    margin-top:20px;
    box-shadow:0 8px 20px rgba(0,0,0,.06);
}

button{
    margin-top:20px;
    padding:14px;
    width:100%;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.rfq{
    margin-top:25px;
    background:white;
    padding:20px;
    border-radius:14px;
    display:none;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

input, textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #e5e7eb;
    box-sizing:border-box;
    font-family:Arial;
}

.tag{
    display:inline-block;
    background:#e0edff;
    color:#2563eb;
    padding:6px 12px;
    border-radius:999px;
    font-size:13px;
    margin-bottom:15px;
}

.wa{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:14px 18px;
    border-radius:50px;
    text-decoration:none;
    font-weight:bold;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
    z-index:100;
}

.wa:hover{
    background:#128C7E;
}

.loading, .error, .not-found{
    text-align:center;
    padding:60px 20px;
    background:white;
    border-radius:16px;
    margin-top:30px;
}

.error, .not-found{
    color:#dc2626;
}

@media(max-width:768px){
    .layout{
        grid-template-columns:1fr;
    }
    .container{
        padding:20px;
    }
}
</style>

</head>

<body>

<div class="container">

<a class="back" href="products.html">← Back to Products</a>

<div id="content">
    <div class="loading">Loading product details...</div>
</div>

</div>

<a class="wa" id="wa" target="_blank">💬 WhatsApp</a>

<script>

const SUPABASE_URL = "https://tpcxaelljrudshchuzia.supabase.co";
const SUPABASE_KEY = "sb_publishable_c0xeymh6AnE-Ld7StbxpgA_YN3ig8qt";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const urlParams = new URLSearchParams(window.location.search);
let productId = urlParams.get("id");

if (productId && !isNaN(parseInt(productId))) {
    productId = parseInt(productId);
}

let productData = null;
let imagesList = [];

function escapeHtml(str) {
    if (!str) return "";
    return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}

function formatText(text) {
    if (!text) return "No description available";
    return escapeHtml(text).replace(/\n/g, "<br>");
}

async function loadProduct() {
    const contentDiv = document.getElementById("content");
    
    if (!productId) {
        contentDiv.innerHTML = `
            <div class="not-found">
                <h2>❌ Invalid Product Link</h2>
                <p>Please select a product from the products page</p>
                <a href="products.html" style="color:#2563eb;">← Back to Products</a>
            </div>
        `;
        return;
    }
    
    try {
        const { data, error } = await sb
            .from("products")
            .select("*")
            .eq("id", productId)
            .single();
        
        if (error || !data) {
            contentDiv.innerHTML = `
                <div class="not-found">
                    <h2>❌ Product Not Found</h2>
                    <p>The product you're looking for may have been removed</p>
                    <a href="products.html" style="color:#2563eb;">← Back to Products</a>
                </div>
            `;
            return;
        }
        
        productData = data;
        
        if (data.images && Array.isArray(data.images) && data.images.length > 0) {
            imagesList = data.images.filter(img => img && img.trim() !== "");
        } else if (data.image && data.image.trim() !== "") {
            imagesList = [data.image];
        } else {
            imagesList = [];
        }
        
        renderProduct();
        setupWhatsApp();
        
    } catch (err) {
        console.error("Error:", err);
        contentDiv.innerHTML = `
            <div class="error">
                <h2>⚠️ System Error</h2>
                <p>${escapeHtml(err.message)}</p>
                <a href="products.html" style="color:#2563eb;">← Back to Products</a>
            </div>
        `;
    }
}

function renderProduct() {
    if (!productData) return;
    
    const p = productData;
    const contentDiv = document.getElementById("content");
    
    let thumbsHtml = "";
    if (imagesList.length > 1) {
        thumbsHtml = `
            <div class="thumbs">
                ${imagesList.map((img, idx) => `
                    <img src="${img}" onclick="setMainImage(${idx})" onerror="this.style.display='none'">
                `).join("")}
            </div>
        `;
    }
    
    const mainImage = imagesList.length > 0 ? imagesList[0] : "";
    
    contentDiv.innerHTML = `
        <div class="layout">
            <div>
                ${mainImage ? 
                    `<img id="mainImg" class="main-img" src="${mainImage}" onerror="this.src='https://placehold.co/600x400?text=Image+Not+Found'">` :
                    `<div class="main-img" style="display:flex;align-items:center;justify-content:center;background:#f0f0f0;min-height:300px;">
                        📷 No Image Available
                     </div>`
                }
                ${thumbsHtml}
            </div>
            
            <div>
                <div class="tag">${escapeHtml(p.category || "Fabric")}</div>
                
                <h1>${escapeHtml(p.name || "Product Name")}</h1>
                
                <div class="box">
                    <b>⚖️ GSM:</b> ${escapeHtml(p.gsm || "-")}<br>
                    <b>📦 MOQ:</b> ${escapeHtml(p.moq || "-")}
                </div>
                
                <div class="box">
                    <h3>📝 Product Features</h3>
                    <div>${formatText(p.feature)}</div>
                </div>
                
                <button onclick="openRFQ()">📧 Request Quotation</button>
                
                <div class="rfq" id="rfqBox">
                    <h3>📋 Inquiry Form</h3>
                    <p style="font-size:13px; color:#666;">We'll get back to you within 24 hours</p>
                    
                    <input type="text" id="inquiryName" placeholder="Full Name *">
                    <input type="email" id="inquiryEmail" placeholder="Email Address *">
                    <input type="text" id="inquiryCompany" placeholder="Company Name">
                    <input type="text" id="inquiryQuantity" placeholder="Quantity (meters/rolls)">
                    <textarea id="inquiryMessage" rows="4" placeholder="Your message or specific requirements..."></textarea>
                    
                    <button onclick="sendInquiry()">Send Inquiry ✉️</button>
                    <button onclick="closeRFQ()" style="background:#6c757d; margin-top:10px;">Cancel</button>
                </div>
            </div>
        </div>
    `;
}

function setMainImage(index) {
    if (imagesList && imagesList[index]) {
        const mainImg = document.getElementById("mainImg");
        if (mainImg) {
            mainImg.src = imagesList[index];
        }
    }
}

function openRFQ() {
    const box = document.getElementById("rfqBox");
    if (box) {
        box.style.display = "block";
        box.scrollIntoView({ behavior: "smooth", block: "start" });
    }
}

function closeRFQ() {
    const box = document.getElementById("rfqBox");
    if (box) {
        box.style.display = "none";
    }
}

async function sendInquiry() {
    const name = document.getElementById("inquiryName")?.value.trim();
    const email = document.getElementById("inquiryEmail")?.value.trim();
    const message = document.getElementById("inquiryMessage")?.value.trim();
    
    if (!name) {
        alert("Please enter your name");
        return;
    }
    if (!email) {
        alert("Please enter your email address");
        return;
    }
    if (!message) {
        alert("Please enter your message");
        return;
    }
    
    const sendBtn = event?.target;
    if (sendBtn) {
        sendBtn.disabled = true;
        sendBtn.textContent = "Sending...";
    }
    
    try {
        const company = document.getElementById("inquiryCompany")?.value.trim() || "";
        const quantity = document.getElementById("inquiryQuantity")?.value.trim() || "";
        
        const { error } = await sb.from("inquiries").insert([{
            name: name,
            email: email,
            product: productData?.name || "",
            message: `Company: ${company}\nQuantity: ${quantity}\nMessage: ${message}`,
            status: "new",
            created_at: new Date().toISOString()
        }]);
        
        if (error) {
            alert("Failed to send: " + error.message);
        } else {
            alert("✅ Inquiry sent successfully! We'll contact you soon.");
            closeRFQ();
            document.getElementById("inquiryName").value = "";
            document.getElementById("inquiryEmail").value = "";
            document.getElementById("inquiryCompany").value = "";
            document.getElementById("inquiryQuantity").value = "";
            document.getElementById("inquiryMessage").value = "";
        }
    } catch (err) {
        alert("Error: " + err.message);
    } finally {
        if (sendBtn) {
            sendBtn.disabled = false;
            sendBtn.textContent = "Send Inquiry ✉️";
        }
    }
}

function setupWhatsApp() {
    if (!productData) return;
    const waLink = document.getElementById("wa");
    if (waLink && productData.name) {
        const message = `Hello, I'm interested in ${productData.name}. Please provide me with a quotation.`;
        waLink.href = `https://wa.me/8613800000000?text=${encodeURIComponent(message)}`;
    }
}

window.addEventListener("DOMContentLoaded", () => {
    loadProduct();
});

</script>

</body>
</html>
