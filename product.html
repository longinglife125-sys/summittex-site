<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Product Detail - SummitTex</title>

<style>

body{
    font-family:Arial;
    margin:0;
    background:#0b0f14;
    color:white;
    padding:30px;
}

.container{
    max-width:1100px;
    margin:auto;
}

.back{
    color:#60a5fa;
    text-decoration:none;
    display:inline-block;
    margin-bottom:20px;
}

.layout{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:40px;
}

img{
    width:100%;
    border-radius:14px;
}

h1{
    font-size:32px;
}

.box{
    background:#111827;
    padding:20px;
    border-radius:12px;
    margin-top:20px;
}

.small{
    color:#94a3b8;
    font-size:14px;
}

.price{
    font-size:20px;
    color:#22c55e;
    margin-top:10px;
}

button{
    margin-top:20px;
    padding:14px;
    width:100%;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.rfq{
    margin-top:30px;
    background:#1f2937;
    padding:20px;
    border-radius:12px;
}

input, textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:none;
}

</style>

</head>

<body>

<div class="container">

<a class="back" href="products.html">← Back to Products</a>

<div id="content">Loading...</div>

</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

/* ===================== */
/* SUPABASE */
/* ===================== */

const SUPABASE_URL = "https://tpcxaelljrudshchuzia.supabase.co";
const SUPABASE_KEY = "你的 publishable key";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ===================== */
/* GET ID */
/* ===================== */

const id = new URLSearchParams(location.search).get("id");

/* ===================== */
/* LOAD PRODUCT */
/* ===================== */

async function load(){

let { data } = await sb
.from("products")
.select("*")
.eq("id", id)
.single();

if(!data){
    content.innerHTML = "<h2>Product Not Found</h2>";
    return;
}

render(data);

}

load();

/* ===================== */
/* RENDER */
/* ===================== */

function render(p){

content.innerHTML = `

<div class="layout">

<div>
    <img src="${p.image}">
</div>

<div>

    <h1>${p.name}</h1>

    <div class="small">${p.category}</div>

    <div class="box">
        <h3>Specifications</h3>
        <p><b>GSM:</b> ${p.gsm}</p>
        <p><b>MOQ:</b> ${p.moq}</p>
    </div>

    <div class="box">
        <h3>Feature</h3>
        <p>${p.feature || "N/A"}</p>
    </div>

    <button onclick="openRFQ()">Request Quotation</button>

</div>

</div>

<div class="rfq" id="rfqBox" style="display:none">

<h2>RFQ Form</h2>

<input id="name" placeholder="Your Name">
<input id="email" placeholder="Email">
<input id="qty" placeholder="Quantity">
<textarea id="msg" placeholder="Message"></textarea>

<button onclick="sendRFQ('${p.name}')">Send Inquiry</button>

</div>

`;

}

/* ===================== */
/* RFQ */
/* ===================== */

function openRFQ(){
    document.getElementById("rfqBox").style.display = "block";
}

function sendRFQ(productName){

const name = document.getElementById("name").value;
const email = document.getElementById("email").value;
const qty = document.getElementById("qty").value;
const msg = document.getElementById("msg").value;

if(!name || !email){
    alert("Please fill required fields");
    return;
}

alert(
`Inquiry Sent!

Product: ${productName}
Name: ${name}
Email: ${email}
Quantity: ${qty}
Message: ${msg}
`
);

}

</script>

</body>
</html>
