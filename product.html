<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details - Debug</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body { font-family: monospace; background: #0a0a0a; color: #0f0; padding: 20px; }
.container { max-width: 900px; margin: 0 auto; background: #111; padding: 20px; border-radius: 8px; }
.loading { color: #ff0; }
.error { color: #f00; }
.success { color: #0f0; }
pre { background: #222; padding: 10px; overflow: auto; font-size: 12px; color: #0f0; }
.product-img { max-width: 300px; border-radius: 8px; }
.row { display: flex; gap: 20px; flex-wrap: wrap; }
button { background: #00bfff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
</style>
</head>
<body>
<div class="container">
    <h2>🔍 Product Detail Debugger</h2>
    <div id="log"></div>
    <div id="content" class="loading">Loading...</div>
</div>

<script>
const SUPABASE_URL = "https://tpcxaelljrudshchuzia.supabase.co";
const SUPABASE_KEY = "sb_publishable_c0xeymh6AnE-Ld7StbxpgA_YN3ig8qt";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function log(msg, type = 'info') {
    const logDiv = document.getElementById('log');
    const color = type === 'error' ? '#f00' : (type === 'success' ? '#0f0' : '#ff0');
    logDiv.innerHTML += `<div style="color:${color}; border-bottom:1px solid #333; padding:4px 0;">${new Date().toLocaleTimeString()} | ${msg}</div>`;
    console.log(msg);
}

async function loadProduct() {
    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');
    
    log(`📍 URL: ${window.location.href}`);
    log(`📦 Product ID from URL: ${productId}`);
    
    if (!productId) {
        log('❌ No product ID provided. Use ?id=1', 'error');
        document.getElementById('content').innerHTML = '<div class="error">❌ No product ID. Try: product.html?id=1</div>';
        return;
    }
    
    try {
        // 测试1: 检查 Supabase 连接
        log('🔌 Testing Supabase connection...');
        const { data: health, error: healthErr } = await sb.from('products').select('count', { count: 'exact', head: true });
        if (healthErr) {
            log(`❌ Connection failed: ${healthErr.message}`, 'error');
        } else {
            log(`✅ Supabase connected! Total products: ${health?.count || 0}`, 'success');
        }
        
        // 测试2: 获取所有产品 ID（调试用）
        log('📋 Fetching all product IDs...');
        const { data: allIds, error: idsErr } = await sb.from('products').select('id, name').limit(10);
        if (idsErr) {
            log(`❌ Failed to fetch IDs: ${idsErr.message}`, 'error');
        } else {
            log(`✅ Available products: ${JSON.stringify(allIds)}`, 'success');
        }
        
        // 测试3: 获取指定产品
        log(`🔍 Fetching product with ID = ${productId}...`);
        const { data, error } = await sb
            .from('products')
            .select('*')
            .eq('id', parseInt(productId))
            .maybeSingle();
        
        if (error) {
            log(`❌ Query error: ${error.message}`, 'error');
            document.getElementById('content').innerHTML = `<div class="error">❌ Database Error: ${error.message}</div>`;
            return;
        }
        
        if (!data) {
            log(`❌ Product ID ${productId} not found`, 'error');
            document.getElementById('content').innerHTML = `
                <div class="error">
                    ❌ Product ID ${productId} not found.<br><br>
                    Available IDs: ${JSON.stringify(allIds?.map(p => ({id: p.id, name: p.name})) || [])}
                </div>`;
            return;
        }
        
        log(`✅ Product found: ${data.name}`, 'success');
        
        // 显示产品信息
        const p = data;
        document.getElementById('content').innerHTML = `
            <div class="row">
                <img src="${p.image || 'https://placehold.co/400x400/1a2a3a/white?text=No+Image'}" class="product-img" onerror="this.src='https://placehold.co/400x400/1a2a3a/white?text=Image+Error'">
                <div>
                    <h1 style="color:white;">${escapeHtml(p.name)}</h1>
                    <p><strong>ID:</strong> ${p.id}</p>
                    <p><strong>Category:</strong> ${escapeHtml(p.category || '-')}</p>
                    <p><strong>Thickness:</strong> ${p.thickness || '-'} mm</p>
                    <p><strong>GSM:</strong> ${p.gsm || '-'}</p>
                    <p><strong>MOQ:</strong> ${p.moq || 'Contact us'}</p>
                    <p><strong>Features:</strong> ${(p.features || []).join(', ') || '-'}</p>
                    <p><strong>Applications:</strong> ${(p.applications || []).join(', ') || '-'}</p>
                    <button onclick="location.href='contact.html?product=${encodeURIComponent(p.name)}'">💰 Get Quote</button>
                </div>
            </div>
            <hr style="margin: 20px 0; border-color:#333;">
            <h3 style="color:white;">📄 Raw Database Record:</h3>
            <pre>${JSON.stringify(p, null, 2)}</pre>
        `;
        
        log('✅ Page rendered successfully', 'success');
        
    } catch (err) {
        log(`❌ Exception: ${err.message}`, 'error');
        document.getElementById('content').innerHTML = `<div class="error">❌ Exception: ${err.message}</div>`;
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]);
}

// 页面加载
loadProduct();
</script>
</body>
</html>
