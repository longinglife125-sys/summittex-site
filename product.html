<script>
const SUPABASE_URL = "https://tpcxaelljrudshchuzia.supabase.co";
const SUPABASE_KEY = "sb_publishable_c0xeymh6AnE-Ld7StbxpgA_YN3ig8qt";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const urlParams = new URLSearchParams(window.location.search);
const productId = urlParams.get("id");

let productData = null;
let mediaList = [];
let currentMediaIndex = 0;

// 性能特性描述库
const featureDescriptions = {
    "Waterproof": "Resistant to water penetration, ideal for marine and wet environments.",
    "Shockproof": "Excellent impact absorption for protective gear and padding.",
    "Flexible": "High elasticity and soft hand-feel, conforms to body shape.",
    "Durable": "Long-lasting performance, resistant to wear and tear.",
    "Thermal Insulation": "Maintains temperature in cold conditions, keeps warmth.",
    "Breathable": "Air circulation design, comfortable for extended wear.",
    "Lightweight": "Easy to handle, reduces product weight.",
    "Soft Touch": "Gentle on skin, comfortable for direct contact."
};

// 应用场景图标映射
const appIcons = {
    "Wetsuits": "🏄",
    "Cooler Bags": "🎒",
    "Shoes": "👟",
    "Backpacks": "🎒",
    "Protective Gear": "🛡️",
    "Medical Supports": "🏥",
    "Sports Equipment": "⚽",
    "Bags": "👜"
};

async function loadProduct() {
    if (!productId) {
        document.getElementById("productContainer").innerHTML = "<div style='text-align:center; padding:60px;'>Invalid product ID</div>";
        return;
    }
    
    let product;
    try {
        const { data, error } = await sb.from("products").select("*").eq("id", productId).single();
        if (!error && data) {
            product = data;
        } else {
            product = getSampleProduct(productId);
        }
    } catch(e) {
        product = getSampleProduct(productId);
    }
    
    if (!product) {
        document.getElementById("productContainer").innerHTML = "<div style='text-align:center; padding:60px;'>Product not found</div>";
        return;
    }
    
    productData = product;
    
    // 更新 SEO 标题
    document.title = `${product.name} | ${product.category || "Neoprene"} Supplier | Siyin`;
    
    // 构建媒体列表
    mediaList = [];
    if (product.image) mediaList.push({ type: 'image', url: product.image });
    if (product.images && product.images.length) {
        product.images.forEach(img => { if (img) mediaList.push({ type: 'image', url: img }); });
    }
    
    // 准备数据
    const categoryName = product.category || "Neoprene Fabrics";
    const subcategoryName = product.subcategory || "Laminated Material";
    const coreFeatures = product.features || ["Waterproof", "Flexible", "Durable", "Thermal Insulation"];
    const applications = product.applications || ["Wetsuits", "Cooler Bags", "Shoes", "Backpacks", "Protective Gear"];
    
    // 生成核心卖点标签
    const sellPointsHtml = coreFeatures.slice(0, 3).map(f => `
        <div class="sell-point"><span class="icon">✓</span> ${f}</div>
    `).join('');
    
    // 生成应用场景卡片
    const appsHtml = applications.slice(0, 6).map(app => `
        <div class="app-card">
            <div class="app-icon">${appIcons[app] || "📦"}</div>
            <h4>${app}</h4>
            <p>Suitable material solution</p>
        </div>
    `).join('');
    
    // 生成性能特性卡片（带描述）
    const featuresHtml = coreFeatures.map(f => `
        <div class="feature-item">
            <div class="feature-icon">${getFeatureIcon(f)}</div>
            <h4>${f}</h4>
            <p>${featureDescriptions[f] || "High-performance material for demanding applications."}</p>
        </div>
    `).join('');
    
    // 生成规格表格
    const specsHtml = `
        <tr><td class="spec-label">Material Type</td><td class="spec-value">${categoryName}</td></tr>
        <tr><td class="spec-label">Construction</td><td class="spec-value">${subcategoryName}</td></tr>
        <tr><td class="spec-label">Thickness</td><td class="spec-value">${product.thickness || "Custom (1mm - 10mm)"}</td></tr>
        <tr><td class="spec-label">Width</td><td class="spec-value">${product.width || "Custom Width Available"}</td></tr>
        <tr><td class="spec-label">Color</td><td class="spec-value">${product.color || "Black / Custom Color"}</td></tr>
        <tr><td class="spec-label">MOQ</td><td class="spec-value">${product.moq || "Contact for MOQ"}</td></tr>
    `;
    
    document.getElementById("productContainer").innerHTML = `
        <a href="products.html" class="back-link">← Back to Products</a>
        <div class="product-detail">
            <div class="media-gallery">
                <div class="main-media-container" id="mainMediaContainer">
                    <div class="main-media-wrapper" id="mainMediaWrapper"></div>
                    ${mediaList.length > 1 ? `<button class="gallery-arrow left" onclick="changeMedia(-1)">‹</button>` : ''}
                    ${mediaList.length > 1 ? `<button class="gallery-arrow right" onclick="changeMedia(1)">›</button>` : ''}
                </div>
                <div class="thumbnails" id="thumbnails"></div>
            </div>
            <div>
                <div class="product-header">
                    <div class="product-badge">${categoryName}</div>
                    <h1 class="product-title">${escapeHtml(product.name)}</h1>
                    <p class="product-subtitle">High-performance material for industrial and outdoor applications</p>
                    <div class="key-sell-points">
                        ${sellPointsHtml}
                    </div>
                </div>
                
                <div class="section-card">
                    <div class="section-title">📖 Material Overview</div>
                    <div class="section-desc">
                        ${escapeHtml(product.description || `${product.name} is designed for demanding applications requiring flexibility, durability, and protection. Suitable for wetsuits, bags, shoes, and protective gear.`)}

                    </div>
                </div>
                
                <div class="section-card">
                    <div class="section-title">🎯 Applications</div>
                    <div class="apps-grid">
                        ${appsHtml}
                    </div>
                </div>
                
                <div class="section-card">
                    <div class="section-title">⚡ Performance Features</div>
                    <div class="features-grid">
                        ${featuresHtml}
                    </div>
                </div>
                
                <div class="section-card">
                    <div class="section-title">📋 Specifications</div>
                    <table class="specs-table">
                        ${specsHtml}
                    </table>
                </div>
                
                <div class="section-card">
                    <div class="section-title">🎨 Customization Options</div>
                    <div class="customization-grid">
                        <div class="custom-item"><span class="check">✓</span> <span>Thickness customization</span></div>
                        <div class="custom-item"><span class="check">✓</span> <span>Fabric lamination options</span></div>
                        <div class="custom-item"><span class="check">✓</span> <span>Color customization</span></div>
                        <div class="custom-item"><span class="check">✓</span> <span>Surface texture options</span></div>
                        <div class="custom-item"><span class="check">✓</span> <span>Printing & branding available</span></div>
                        <div class="custom-item"><span class="check">✓</span> <span>OEM / ODM service</span></div>
                    </div>
                </div>
                
                <div class="cta-card">
                    <h3>Get Free Sample or Quote in 24 Hours</h3>
                    <p>Tell us your requirements, we'll provide the best solution</p>
                    <div class="cta-buttons">
                        <button class="btn btn-white" onclick="scrollToInquiry()">Request Sample</button>
                        <button class="btn btn-white" onclick="scrollToInquiry()">Get Price</button>
                        <button class="btn btn-white" onclick="scrollToInquiry()">Talk to Engineer</button>
                    </div>
                </div>
                
                <div class="quote-form" id="quoteForm" style="display:none;">
                    <div class="section-card">
                        <div class="section-title">📧 Send Inquiry</div>
                        <input type="text" id="inqName" placeholder="Your Name *" style="width:100%; padding:12px; margin-bottom:12px; border:1px solid #e2e8f0; border-radius:12px;">
                        <input type="email" id="inqEmail" placeholder="Your Email *" style="width:100%; padding:12px; margin-bottom:12px; border:1px solid #e2e8f0; border-radius:12px;">
                        <input type="text" id="inqCompany" placeholder="Company Name" style="width:100%; padding:12px; margin-bottom:12px; border:1px solid #e2e8f0; border-radius:12px;">
                        <select id="inqType" style="width:100%; padding:12px; margin-bottom:12px; border:1px solid #e2e8f0; border-radius:12px;">
                            <option value="Sample">Free Sample</option>
                            <option value="Quote">Price Quotation</option>
                            <option value="Technical">Technical Support</option>
                        </select>
                        <textarea id="inqMessage" rows="4" placeholder="Tell us about your requirements... *" style="width:100%; padding:12px; margin-bottom:12px; border:1px solid #e2e8f0; border-radius:12px;"></textarea>
                        <button class="btn btn-primary" onclick="sendInquiry()" style="width:100%;">Send Inquiry →</button>
                        <div id="inqSuccess" style="display:none; margin-top:12px; padding:10px; background:#4ade80; border-radius:8px; text-align:center;">✅ Inquiry sent! We'll contact you soon.</div>
                    </div>
                </div>
            </div>
        </div>
    `;
    
    renderMedia();
}

function getFeatureIcon(feature) {
    const icons = {
        "Waterproof": "💧",
        "Shockproof": "🛡️",
        "Flexible": "🔄",
        "Durable": "💪",
        "Thermal Insulation": "🔥",
        "Breathable": "🌬️",
        "Lightweight": "⚡",
        "Soft Touch": "✨"
    };
    return icons[feature] || "✓";
}

function getSampleProduct(id) {
    const samples = {
        1: { id: 1, name: "Neoprene Fabric 2mm", category: "Neoprene Fabrics", subcategory: "Single-layer Neoprene", thickness: "2mm", width: "1.3m", color: "Black", gsm: "200", moq: "100m", image: "https://placehold.co/600x400/0f3b5c/white?text=Neoprene+2mm", description: "Soft, flexible, and waterproof single-layer neoprene.", features: ["Waterproof", "Flexible", "Thermal Insulation"], applications: ["Wetsuits", "Bags", "Shoes"] },
        2: { id: 2, name: "Neoprene Fabric 3mm", category: "Neoprene Fabrics", subcategory: "Single-layer Neoprene", thickness: "3mm", width: "1.3m", color: "Black", gsm: "300", moq: "100m", image: "https://placehold.co/600x400/0f3b5c/white?text=Neoprene+3mm", description: "Medium thickness neoprene for sports gear.", features: ["Waterproof", "Durable", "Comfortable"], applications: ["Wetsuits", "Protective Gear"] },
        3: { id: 3, name: "Laminated Neoprene 3mm Black", category: "Laminated Neoprene", subcategory: "Neoprene + Polyester", thickness: "3mm", width: "1.5m", color: "Black", gsm: "350", moq: "100m", image: "https://placehold.co/600x400/2c7da0/white?text=Laminated+3mm", description: "Polyester-backed laminated neoprene, waterproof & flexible.", features: ["Waterproof", "Shockproof", "Flexible", "Durable"], applications: ["Wetsuits", "Cooler Bags", "Shoes", "Backpacks"] }
    };
    return samples[id];
}

function renderMedia() {
    const wrapper = document.getElementById("mainMediaWrapper");
    if (!wrapper) return;
    
    wrapper.innerHTML = mediaList.map(media => `
        <div class="main-media-item">
            <img class="main-image" src="${media.url}" onerror="this.src='https://placehold.co/800x800'">
        </div>
    `).join('');
    
    const thumbContainer = document.getElementById("thumbnails");
    if (thumbContainer && mediaList.length > 1) {
        thumbContainer.innerHTML = mediaList.map((media, idx) => `
            <img src="${media.url}" class="thumbnail ${idx === currentMediaIndex ? 'active' : ''}" onclick="goToMedia(${idx})" onerror="this.src='https://placehold.co/70x70'">
        `).join('');
    }
}

function changeMedia(delta) {
    if (mediaList.length <= 1) return;
    currentMediaIndex = (currentMediaIndex + delta + mediaList.length) % mediaList.length;
    const wrapper = document.getElementById("mainMediaWrapper");
    if (wrapper) wrapper.style.transform = `translateX(-${currentMediaIndex * 100}%)`;
    
    document.querySelectorAll(".thumbnail").forEach((thumb, idx) => {
        if (idx === currentMediaIndex) thumb.classList.add("active");
        else thumb.classList.remove("active");
    });
}

function goToMedia(index) {
    currentMediaIndex = index;
    const wrapper = document.getElementById("mainMediaWrapper");
    if (wrapper) wrapper.style.transform = `translateX(-${currentMediaIndex * 100}%)`;
    
    document.querySelectorAll(".thumbnail").forEach((thumb, idx) => {
        if (idx === currentMediaIndex) thumb.classList.add("active");
        else thumb.classList.remove("active");
    });
}

function scrollToInquiry() {
    const form = document.getElementById("quoteForm");
    if (form) {
        form.style.display = "block";
        form.scrollIntoView({ behavior: "smooth", block: "start" });
    }
}

async function sendInquiry() {
    const name = document.getElementById("inqName")?.value.trim();
    const email = document.getElementById("inqEmail")?.value.trim();
    const message = document.getElementById("inqMessage")?.value.trim();
    
    if (!name || !email || !message) {
        alert("Please fill in name, email and message");
        return;
    }
    
    const company = document.getElementById("inqCompany")?.value.trim() || "";
    const inquiryType = document.getElementById("inqType")?.value || "";
    const fullMessage = `Inquiry Type: ${inquiryType}\nProduct: ${productData?.name || ""}\nCompany: ${company}\nMessage: ${message}`;
    
    try {
        const { error } = await sb.from("inquiries").insert([{
            name, email, product: productData?.name || "", message: fullMessage, status: "new", created_at: new Date().toISOString()
        }]);
        if (error) alert("Failed: " + error.message);
        else {
            document.getElementById("inqSuccess").style.display = "block";
            document.getElementById("inqName").value = "";
            document.getElementById("inqEmail").value = "";
            document.getElementById("inqCompany").value = "";
            document.getElementById("inqType").value = "";
            document.getElementById("inqMessage").value = "";
            setTimeout(() => {
                document.getElementById("inqSuccess").style.display = "none";
            }, 3000);
        }
    } catch(e) { alert("Error: " + e.message); }
}

function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
}

loadProduct();
window.goToMedia = goToMedia;
window.changeMedia = changeMedia;
window.sendInquiry = sendInquiry;
window.scrollToInquiry = scrollToInquiry;
</script>
