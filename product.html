<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Detail - SummitTex</title>

<style>

/* ===================== */
/* GLOBAL */
/* ===================== */

body{
    font-family:Arial;
    margin:0;
    background:#f5f7fa;
    color:#111827;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:30px;
}

/* ===================== */
/* BACK */
/* ===================== */

.back{
    color:#2563eb;
    text-decoration:none;
    display:inline-block;
    margin-bottom:20px;
}

/* ===================== */
/* LAYOUT */
/* ===================== */

.layout{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:40px;
}

/* ===================== */
/* IMAGE */
/* ===================== */

img{
    width:100%;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}

/* ===================== */
/* TEXT */
/* ===================== */

h1{
    font-size:34px;
    margin-bottom:10px;
}

.small{
    color:#6b7280;
}

/* ===================== */
/* BOX */
/* ===================== */

.box{
    background:white;
    padding:20px;
    border-radius:14px;
    margin-top:20px;
    box-shadow:0 8px 20px rgba(0,0,0,.06);
}

/* ===================== */
/* BUTTON */
/* ===================== */

button{
    margin-top:20px;
    padding:14px;
    width:100%;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

/* ===================== */
/* RFQ */
/* ===================== */

.rfq{
    margin-top:30px;
    background:white;
    padding:20px;
    border-radius:14px;
    display:none;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

input, textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #e5e7eb;
}

/* ===================== */
/* TAG */
/* ===================== */

.tag{
    display:inline-block;
    background:#e0edff;
    color:#2563eb;
    padding:6px 12px;
    border-radius:999px;
    font-size:13px;
    margin-bottom:10px;
}

/* ===================== */
/* WHATSAPP */
/* ===================== */

.wa{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:14px 18px;
    border-radius:50px;
    text-decoration:none;
    font-weight:bold;
}

/* ===================== */
/* MOBILE */
/* ===================== */

@media(max-width:768px){
.layout{
    grid-template-columns:1fr;
}
}

</style>

</head>

<body>

<div class="container">

<a class="back" href="products.html">← Back to Products</a>

<div id="content">Loading...</div>

</div>

<!-- WhatsApp -->
<a class="wa" id="wa" target="_blank">💬 WhatsApp</a>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

/* ===================== */
/* CONFIG */
/* ===================== */

const SUPABASE_URL =
"https://tpcxaelljrudshchuzia.supabase.co";

const SUPABASE_KEY =
"你的publishable key";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

emailjs.init("你的PUBLIC_KEY");

/* ===================== */
/* GET ID */
/* ===================== */

const id =
new URLSearchParams(location.search).get("id");

/* ===================== */
/* LOAD */
/* ===================== */

async function load(){

let { data } = await sb
.from("products")
.select("*")
.eq("id", id)
.single();

if(!data){
content.innerHTML = "<h2>Product Not Found</h2>";
return;
}

render(data);
setupWhatsApp(data);

}

load();

/* ===================== */
/* RENDER */
/* ===================== */

function render(p){

// 如果没有多图，就用单图
let images = p.images && p.images.length ? p.images : [p.image];

let thumbs = "";

images.forEach((img, index)=>{
thumbs += `<img src="${img}" onclick="setMain(${index})" class="thumb">`;
});

content.innerHTML = `

<div class="layout">

<!-- LEFT IMAGE -->
<div>

    <img id="mainImg" src="${images[0]}" class="main-img">

    <div class="thumbs">
        ${thumbs}
    </div>

</div>

<!-- RIGHT INFO -->
<div>

    <span class="tag">${p.category}</span>

    <h1>${p.name}</h1>

    <div class="box">
        <h3>Specifications</h3>
        <p><b>GSM:</b> ${p.gsm || "-"}</p>
        <p><b>MOQ:</b> ${p.moq || "-"}</p>
    </div>

    <div class="box">
        <h3>Feature</h3>
        <p>${p.feature || "N/A"}</p>
    </div>

    <button onclick="openRFQ()">Request Quotation</button>

    <a class="wa"
       href="https://wa.me/8613800000000?text=I want price for ${p.name}">
       WhatsApp Inquiry
    </a>

</div>

</div>

<!-- RFQ -->
<div class="rfq" id="rfqBox">

<h2>RFQ Form</h2>

<input id="name" placeholder="Your Name">
<input id="email" placeholder="Email">
<input id="qty" placeholder="Quantity">
<textarea id="msg" placeholder="Message"></textarea>

<button onclick="sendRFQ('${p.name}')">Send Inquiry</button>

</div>

`;

window.currentImages = images;

}

/* ===================== */
/* RFQ */
/* ===================== */

function openRFQ(){
document.getElementById("rfqBox").style.display="block";
}

/* ===================== */
/* EMAIL SEND */
/* ===================== */

function sendRFQ(productName){

const name = document.getElementById("name").value;
const email = document.getElementById("email").value;
const qty = document.getElementById("qty").value;
const msg = document.getElementById("msg").value;

if(!name || !email){
alert("Please fill required fields");
return;
}

emailjs.send(
"service_jb1bu3d",
"template_sau1q5q",
{
product: productName,
name: name,
email: email,
qty: qty,
message: msg
}
).then(()=>{
alert("Inquiry sent successfully!");
}).catch(()=>{
alert("Failed to send inquiry");
});

}

/* ===================== */
/* WHATSAPP */
/* ===================== */

function setupWhatsApp(p){
document.getElementById("wa").href =
`https://wa.me/8613800000000?text=Hello, I am interested in ${p.name}`;
}
function setMain(index){
    document.getElementById("mainImg").src = window.currentImages[index];
}
</script>

</body>
</html>
