<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Detail - SummitTex</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>

/* ===================== */
/* GLOBAL */
/* ===================== */

body{
    font-family:Arial;
    margin:0;
    background:#f5f7fa;
    color:#111827;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:30px;
}

/* BACK */
.back{
    color:#2563eb;
    text-decoration:none;
    display:inline-block;
    margin-bottom:20px;
}

/* LAYOUT */
.layout{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:40px;
}

/* IMAGE */
.main-img{
    width:100%;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}

/* THUMB */
.thumbs{
    display:flex;
    gap:10px;
    margin-top:12px;
}

.thumbs img{
    width:70px;
    height:70px;
    object-fit:cover;
    border-radius:8px;
    cursor:pointer;
    border:2px solid transparent;
}

.thumbs img:hover{
    border:2px solid #2563eb;
}

/* BOX */
.box{
    background:white;
    padding:20px;
    border-radius:14px;
    margin-top:20px;
    box-shadow:0 8px 20px rgba(0,0,0,.06);
}

/* BUTTON */
button{
    margin-top:20px;
    padding:14px;
    width:100%;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

/* RFQ */
.rfq{
    margin-top:25px;
    background:white;
    padding:20px;
    border-radius:14px;
    display:none;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

input, textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #e5e7eb;
}

/* TAG */
.tag{
    display:inline-block;
    background:#e0edff;
    color:#2563eb;
    padding:6px 12px;
    border-radius:999px;
    font-size:13px;
}

/* WHATSAPP */
.wa{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:14px 18px;
    border-radius:50px;
    text-decoration:none;
    font-weight:bold;
}

/* MOBILE */
@media(max-width:768px){
.layout{
    grid-template-columns:1fr;
}
}

</style>

</head>

<body>

<div class="container">

<a class="back" href="products.html">← Back to Products</a>

<div id="content">Loading...</div>

</div>

<!-- WhatsApp -->
<a class="wa" id="wa" target="_blank">💬 WhatsApp</a>

<script>

/* ===================== */
/* SAFE INIT (关键修复) */
/* ===================== */

const SUPABASE_URL = "https://tpcxaelljrudshchuzia.supabase.co/rest/v1/";
const SUPABASE_KEY = "sb_publishable_c0xeymh6AnE-Ld7StbxpgA_YN3ig8qt";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

emailjs.init("YOUR_PUBLIC_KEY");

/* FIX: 避免 content undefined */
const content = document.getElementById("content");

/* ===================== */
/* LOAD ID */
/* ===================== */

const id = new URLSearchParams(location.search).get("id");

let images = [];
let currentIndex = 0;

/* ===================== */
/* LOAD PRODUCT */
/* ===================== */

async function load(){

let { data } = await sb
.from("products")
.select("*")
.eq("id", id)
.single();

if(!data){
    content.innerHTML = "<h2>Product Not Found</h2>";
    return;
}

/* 多图兼容 */
images = data.images && data.images.length ? data.images : [data.image];

render(data);
setupWhatsApp(data);

/* CRM记录（自动写入） */
sb.from("inquiries").insert([{
    product: data.name,
    product_id: id,
    created_at: new Date()
}]);

}

load();

/* ===================== */
/* RENDER */
/* ===================== */

function render(p){

content.innerHTML = `
<div class="layout">

<!-- LEFT -->
<div>

    <img id="mainImg" class="main-img" src="${images[0]}">

    <div class="thumbs">
        ${images.map((img,i)=>`
            <img src="${img}" onclick="setImage(${i})">
        `).join("")}
    </div>

</div>

<!-- RIGHT -->
<div>

    <span class="tag">${p.category || ""}</span>

    <h1>${p.name || ""}</h1>

    <div class="box">
        <b>GSM:</b> ${p.gsm || "-"}<br>
        <b>MOQ:</b> ${p.moq || "-"}
    </div>

    <div class="box">
        <h3>Feature</h3>
        ${p.feature || "N/A"}
    </div>

    <button onclick="openRFQ()">Request Quotation</button>

    <div class="rfq" id="rfqBox">

        <h3>RFQ Form</h3>

        <input id="name" placeholder="Your Name">
        <input id="email" placeholder="Email">
        <input id="qty" placeholder="Quantity">
        <textarea id="msg" placeholder="Message"></textarea>

        <button onclick="sendRFQ('${p.name}')">Send Inquiry</button>

    </div>

</div>

</div>
`;

}

/* ===================== */
/* IMAGE SWITCH */
/* ===================== */

function setImage(i){
document.getElementById("mainImg").src = images[i];
}

/* ===================== */
/* RFQ */
/* ===================== */

function openRFQ(){
document.getElementById("rfqBox").style.display = "block";
}

/* ===================== */
/* EMAIL SEND */
/* ===================== */

function sendRFQ(product){

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let qty = document.getElementById("qty").value;
let msg = document.getElementById("msg").value;

if(!name || !email){
    alert("Please fill required fields");
    return;
}

emailjs.send(
"YOUR_SERVICE_ID",
"YOUR_TEMPLATE_ID",
{
    product,
    name,
    email,
    qty,
    message: msg
}
).then(()=>{
    alert("Inquiry sent successfully!");
}).catch(()=>{
    alert("Failed to send inquiry");
});

}

/* ===================== */
/* WHATSAPP */
/* ===================== */

function setupWhatsApp(p){
document.getElementById("wa").href =
`https://wa.me/8613800000000?text=I want quote for ${p.name}`;
}

</script>

</body>
</html>
