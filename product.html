<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Product Detail - SummitTex</title>

<style>

body{
    font-family:Arial;
    margin:0;
    background:#0b0f14;
    color:white;
    padding:30px;
}

.container{
    max-width:1100px;
    margin:auto;
}

.back{
    color:#60a5fa;
    text-decoration:none;
    display:inline-block;
    margin-bottom:20px;
}

.layout{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:40px;
}

img{
    width:100%;
    border-radius:14px;
}

h1{
    font-size:32px;
}

.box{
    background:#111827;
    padding:20px;
    border-radius:12px;
    margin-top:20px;
}

.small{
    color:#94a3b8;
    font-size:14px;
}

button{
    margin-top:20px;
    padding:14px;
    width:100%;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.rfq{
    margin-top:30px;
    background:#1f2937;
    padding:20px;
    border-radius:12px;
    display:none;
}

input, textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:none;
}

/* WhatsApp floating */
.wa{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:14px 18px;
    border-radius:50px;
    text-decoration:none;
    font-weight:bold;
    z-index:999;
}

</style>

</head>

<body>

<div class="container">

<a class="back" href="products.html">← Back to Products</a>

<div id="content">Loading...</div>

</div>

<!-- WhatsApp -->
<a class="wa" id="wa" target="_blank">💬 WhatsApp</a>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

/* ===================== */
/* CONFIG */
/* ===================== */

const SUPABASE_URL = "https://tpcxaelljrudshchuzia.supabase.co";
const SUPABASE_KEY = "你的publishable key";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* EmailJS */
emailjs.init("你的PUBLIC_KEY");

/* ===================== */
/* GET ID */
/* ===================== */

const id = new URLSearchParams(location.search).get("id");

/* ===================== */
/* LOAD PRODUCT */
/* ===================== */

async function load(){

let { data } = await sb
.from("products")
.select("*")
.eq("id", id)
.single();

if(!data){
    content.innerHTML = "<h2>Product Not Found</h2>";
    return;
}

render(data);

setupWhatsApp(data);

}

load();

/* ===================== */
/* RENDER */
/* ===================== */

function render(p){

content.innerHTML = `

<div class="layout">

<div>
    <img src="${p.image}">
</div>

<div>

    <h1>${p.name}</h1>

    <div class="small">${p.category}</div>

    <div class="box">
        <h3>Specifications</h3>
        <p><b>GSM:</b> ${p.gsm}</p>
        <p><b>MOQ:</b> ${p.moq}</p>
    </div>

    <div class="box">
        <h3>Feature</h3>
        <p>${p.feature || "N/A"}</p>
    </div>

    <button onclick="openRFQ()">Request Quotation</button>

</div>

</div>

<div class="rfq" id="rfqBox">

<h2>RFQ Form</h2>

<input id="name" placeholder="Your Name">
<input id="email" placeholder="Email">
<input id="qty" placeholder="Quantity">
<textarea id="msg" placeholder="Message"></textarea>

<button onclick="sendRFQ('${p.name}')">Send Inquiry</button>

</div>

`;

}

/* ===================== */
/* RFQ OPEN */
/* ===================== */

function openRFQ(){
    document.getElementById("rfqBox").style.display = "block";
}

/* ===================== */
/* EMAILJS SEND */
/* ===================== */

function sendRFQ(productName){

const name = document.getElementById("name").value;
const email = document.getElementById("email").value;
const qty = document.getElementById("qty").value;
const msg = document.getElementById("msg").value;

if(!name || !email){
    alert("Please fill required fields");
    return;
}

emailjs.send(
    "service_jb1bu3d",
    "template_sau1q5q",
    {
        product: productName,
        name: name,
        email: email,
        qty: qty,
        message: msg
    }
).then(() => {
    alert("Inquiry sent successfully!");
}).catch((err) => {
    console.log(err);
    alert("Failed to send inquiry");
});

}

/* ===================== */
/* WHATSAPP */
/* ===================== */

function setupWhatsApp(p){
    document.getElementById("wa").href =
    `https://wa.me/8613800000000?text=Hello, I am interested in ${p.name}`;
}

</script>

</body>
</html>
