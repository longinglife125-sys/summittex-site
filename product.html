<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SummitTex Product Detail</title>

<style>

body{
    font-family:Arial;
    background:#0b0f14;
    color:white;
    margin:0;
    padding:40px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.product{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:40px;
}

.product img{
    width:100%;
    border-radius:16px;
}

.info h1{
    font-size:36px;
    margin-bottom:20px;
}

.specs{
    background:#111827;
    padding:20px;
    border-radius:12px;
    margin-top:20px;
}

.specs p{
    margin:10px 0;
}

.feature-box{
    background:#1f2937;
    padding:20px;
    border-radius:12px;
    margin-top:20px;
}

.btn{
    display:inline-block;
    margin-top:30px;
    padding:14px 22px;
    background:#25D366;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}

.back{
    display:inline-block;
    margin-bottom:30px;
    color:#60a5fa;
    text-decoration:none;
}

@media(max-width:768px){

.product{
    grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="container">

<a class="back" href="products.html">
← Back to Products
</a>

<div id="content"></div>

</div>

<script src="data/products.js"></script>

<script>

const id =
new URLSearchParams(location.search).get("id");

const p =
products.find(x => x.id == id);

if(!p){

document.getElementById("content").innerHTML =
"<h2>Product Not Found</h2>";

}else{

document.getElementById("content").innerHTML = `

<div class="product">

<div>
<img src="${p.image}">
</div>

<div class="info">

<h1>${p.name}</h1>

<p>
${p.feature}
</p>

<div class="specs">

<h3>Technical Specifications</h3>

<p><b>Category:</b> ${p.category}</p>

<p><b>Weight:</b> ${p.gsm} gsm</p>

<p><b>MOQ:</b> ${p.moq}</p>

<p><b>Application:</b> Outdoor Jackets / Sportswear / Hiking</p>

<p><b>Supply Type:</b> OEM & ODM</p>

</div>

<div class="feature-box">

<h3>Key Features</h3>

<p>

✔ Waterproof<br>
✔ Breathable<br>
✔ Durable Performance<br>
✔ Export Quality<br>
✔ Outdoor Functional Textile

</p>

</div>

<a
class="btn"
target="_blank"
href="https://wa.me/861234567890?text=Hi, I want sample of ${p.name}">

💬 Contact WhatsApp / Get Sample

</a>

</div>

</div>

`;

}

</script>

</body>
</html>
