<div id="content"></div>

<!-- ⭐赚钱按钮（WhatsApp询盘按钮） -->
<a id="waLink"
   target="_blank"
   style="
      display:inline-block;
      margin-top:20px;
      padding:12px 18px;
      background:#25D366;
      color:white;
      border-radius:8px;
      text-decoration:none;
      font-weight:bold;">
   💬 Contact WhatsApp / Get Sample
</a>

<script>
const id = new URLSearchParams(location.search).get("id");

// 找到产品
const p = products.find(x => x.id == id);

// 防止报错（很重要）
if (!p) {
    document.getElementById("content").innerHTML = "<h2>Product not found</h2>";
} else {

    // 产品内容显示
    document.getElementById("content").innerHTML = `
        <h2>${p.name}</h2>
        <p>${p.feature}</p>
        <p><b>${p.gsm}</b> / MOQ <b>${p.moq}</b></p>
    `;

    // ⭐ WhatsApp询盘按钮（自动带产品名）
    document.getElementById("waLink").href =
        `https://wa.me/861234567890?text=Hi, I want sample of ${p.name}`;
}
</script>
