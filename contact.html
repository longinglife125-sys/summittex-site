<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact SummitTex | Functional Fabric Supplier</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0b0f14;
    color:white;
}

.container{
    max-width:900px;
    margin:auto;
    padding:60px 20px;
}

h1{
    text-align:center;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#94a3b8;
    margin-bottom:50px;
}

.box{
    background:#111827;
    padding:30px;
    border-radius:16px;
}

input, textarea{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#1f2937;
    color:white;
    font-size:15px;
    box-sizing:border-box;
}

textarea{
    min-height:140px;
    resize:vertical;
}

button{
    width:100%;
    padding:16px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
}

.contact-info{
    margin-top:40px;
    text-align:center;
    color:#cbd5e1;
}

.contact-info p{
    margin:10px 0;
}

.back{
    display:inline-block;
    margin-bottom:30px;
    color:#60a5fa;
    text-decoration:none;
}

.success{
    margin-top:20px;
    background:#14532d;
    padding:15px;
    border-radius:10px;
    display:none;
}

</style>

</head>

<body>

<div class="container">

<a class="back" href="index.html">← Back Home</a>

<h1>Contact SummitTex</h1>

<p class="subtitle">
Functional Fabric Manufacturer & Global Textile Supplier
</p>

<div class="box">

<input id="name" placeholder="Your Name">

<input id="email" placeholder="Your Email">

<input id="company" placeholder="Company Name">

<input id="country" placeholder="Country">

<textarea id="message"
placeholder="Tell us your fabric requirements..."></textarea>

<button onclick="submitRFQ()">
Send Inquiry
</button>

<div class="success" id="successBox">
Inquiry submitted successfully. We will contact you soon.
</div>

</div>

<div class="contact-info">

<p>Email: sales@summittex.com</p>

<p>Business Type: Functional Fabric Manufacturer</p>

<p>Main Market: Europe / USA / Southeast Asia</p>

</div>

</div>

<script>

function submitRFQ(){

const name = document.getElementById("name").value;
const email = document.getElementById("email").value;

if(!name || !email){

alert("Please fill in your name and email.");

return;

}

document.getElementById("successBox").style.display = "block";

}

</script>

</body>
</html>
