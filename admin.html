<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>V16 Product Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

/* LOGIN */
#login{
    max-width:300px;
    margin:100px auto;
    background:white;
    color:#111827;
    padding:20px;
    border-radius:12px;
    text-align:center;
}

/* PANEL */
#panel{
    display:none;
    padding:20px;
}

.box{
    background:#111827;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

/* INPUT */
input, select, textarea{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:none;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

/* PRODUCT LIST */
.item{
    background:white;
    color:#111827;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

img{
    width:50px;
    height:50px;
    object-fit:cover;
    border-radius:8px;
}

.small{
    font-size:12px;
    color:#6b7280;
}

</style>

</head>

<body>

<!-- LOGIN -->
<div id="login">
<h3>Admin Login</h3>
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- PANEL -->
<div id="panel">

<div class="box">

<h2>➕ Add Product</h2>

<input id="name" placeholder="Product Name">

<select id="category">
<option>Outdoor Functional Fabrics</option>
<option>Sports & Activewear Fabrics</option>
<option>Recycled & Sustainable Fabrics</option>
<option>Stretch Fabrics</option>
<option>Nylon & Polyester Fabrics</option>
<option>Jacquard & Textured Fabrics</option>
<option>Printed Fabrics</option>
<option>Swimwear Fabrics</option>
<option>Underwear Fabrics</option>
<option>Workwear Fabrics</option>
<option>Fashion Fabrics</option>
<option>Others</option>
</select>

<input id="gsm" placeholder="GSM">
<input id="moq" placeholder="MOQ">

<textarea id="feature" placeholder="Feature"></textarea>

<input type="file" id="file">

<button onclick="uploadProduct()">Upload Product</button>

</div>

<div class="box">

<h2>📦 Product List</h2>
<div id="list"></div>

</div>

</div>

<script>

const SUPABASE_URL = "https://tpcxaelljrudshchuzia.supabase.co";
const SUPABASE_KEY = "你的publishable key";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const PASSWORD = "123456";

function login(){
    if(pass.value === PASSWORD){
        login.style.display="none";
        panel.style.display="block";
        load();
    }else{
        alert("Wrong password");
    }
}

/* UPLOAD PRODUCT */
async function uploadProduct(){

let file = document.getElementById("file").files[0];

let imageUrl = "";

if(file){

let fileName = Date.now() + "_" + file.name;

await sb.storage.from("images").upload(fileName, file);

imageUrl = SUPABASE_URL + "/storage/v1/object/public/images/" + fileName;
}

await sb.from("products").insert([{
    name: name.value,
    category: category.value,
    gsm: gsm.value,
    moq: moq.value,
    feature: feature.value,
    image: imageUrl
}]);

alert("Product uploaded!");

load();
}

/* LOAD */
async function load(){

let { data } = await sb.from("products").select("*");

let html = "";

data.forEach(p=>{

html += `
<div class="item">
    <div style="display:flex;gap:10px;align-items:center;">
        <img src="${p.image}">
        <div>
            <b>${p.name}</b><br>
            <span class="small">${p.category}</span>
        </div>
    </div>
</div>
`;

});

list.innerHTML = html;

}

</script>

</body>
</html>
