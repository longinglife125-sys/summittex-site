<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>V3 Admin - SummitTex</title>

<style>

body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    margin:0;
    padding:20px;
}

/* LOGIN */
.login{
    max-width:300px;
    margin:100px auto;
    background:white;
    color:#0f172a;
    padding:20px;
    border-radius:12px;
    text-align:center;
}

input, textarea{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    margin-top:10px;
    padding:10px;
    width:100%;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* PANEL */
#panel{
    display:none;
}

.box{
    background:#111827;
    padding:15px;
    margin-top:20px;
    border-radius:10px;
}

.product{
    background:white;
    color:#0f172a;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.small{
    font-size:12px;
    color:#64748b;
}

.btn-red{
    background:#ef4444;
    padding:5px 10px;
    border:none;
    border-radius:6px;
    color:white;
    cursor:pointer;
}

.btn-green{
    background:#10b981;
    padding:10px;
    width:100%;
}

textarea{
    height:120px;
}

</style>

</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginBox">

<h2>Admin Login</h2>
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>

</div>

<!-- PANEL -->
<div id="panel">

<h2>V3 Product Manager</h2>

<div class="box">

<input id="name" placeholder="Product Name">
<input id="category" placeholder="Category">
<input id="gsm" placeholder="GSM">
<input id="moq" placeholder="MOQ">
<input id="image" placeholder="Image (images/xxx.jpg)">
<textarea id="feature" placeholder="Feature"></textarea>

<button onclick="addProduct()">Add Product</button>

</div>

<div class="box">
<h3>Product List</h3>
<div id="list"></div>
</div>

<div class="box">

<h3>Generated products.js</h3>
<textarea id="output"></textarea>

<button class="btn-green" onclick="copy()">Copy products.js</button>

</div>

</div>

<script>

/* ===================== */
/* LOGIN */
/* ===================== */

const PASSWORD = "123456";

function login(){
    if(document.getElementById("pass").value === PASSWORD){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("panel").style.display="block";
        load();
    }else{
        alert("Wrong password");
    }
}

/* ===================== */
/* DATA */
/* ===================== */

let products = JSON.parse(localStorage.getItem("products") || "[]");

/* ===================== */
/* ADD PRODUCT */
/* ===================== */

function addProduct(){

const p = {
    id: Date.now(),
    name: name.value,
    category: category.value,
    gsm: gsm.value,
    moq: moq.value,
    image: image.value,
    feature: feature.value
};

products.push(p);
save();
render();
}

/* ===================== */
/* DELETE */
/* ===================== */

function del(id){
    products = products.filter(p => p.id !== id);
    save();
    render();
}

/* ===================== */
/* SAVE */
/* ===================== */

function save(){
    localStorage.setItem("products", JSON.stringify(products));
}

/* ===================== */
/* RENDER LIST */
/* ===================== */

function render(){

let html = "";
let js = "const products = [\n";

products.forEach(p=>{
    html += `
    <div class="product">
        <div>
            <b>${p.name}</b><br>
            <span class="small">${p.category} | ${p.gsm}gsm</span>
        </div>
        <button class="btn-red" onclick="del(${p.id})">Delete</button>
    </div>
    `;

    js += `{
id:"${p.id}",
name:"${p.name}",
category:"${p.category}",
gsm:"${p.gsm}",
moq:"${p.moq}",
image:"${p.image}",
feature:"${p.feature}"
},\n`;

});

js += "];";

list.innerHTML = html;
output.value = js;

}

/* ===================== */
/* COPY */
/* ===================== */

function copy(){
    navigator.clipboard.writeText(output.value);
    alert("Copied products.js");
}

/* INIT */
function load(){
    render();
}

</script>

</body>
</html>
