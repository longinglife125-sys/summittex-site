<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Siyin 后台管理 V3</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',Arial,sans-serif;background:#0b1220;color:white;}
#loginBox{max-width:360px;margin:120px auto;background:white;color:black;padding:24px;border-radius:16px;}
#panelBox{display:none;padding:20px;}
.box{background:#111827;padding:24px;border-radius:20px;margin-bottom:20px;}
h3{margin-bottom:16px;color:#e2e8f0;font-size:18px;}
h4{margin:16px 0 10px;color:#cbd5e1;font-size:14px;}
.step-nav{display:flex;gap:12px;margin-bottom:30px;}
.step{flex:1;padding:12px;text-align:center;border-radius:40px;background:#1e293b;color:#94a3b8;font-weight:500;}
.step.active{background:#00bfff;color:#0f172a;}
.step-content{display:none;}
.step-content.active{display:block;}
input,select,textarea{width:100%;padding:12px;margin-bottom:16px;border-radius:12px;border:none;background:#1f2a3e;color:white;font-size:14px;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:15px;}
.upload-box{border:2px dashed #4b5563;border-radius:16px;padding:30px;text-align:center;cursor:pointer;background:#1e293b;margin-bottom:15px;}
.upload-box:hover{border-color:#00bfff;background:#334155;}
.preview-img{width:80px;height:80px;object-fit:cover;border-radius:8px;margin:5px;}
.tags{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;}
.tag{padding:8px 18px;border:1px solid #334155;border-radius:40px;cursor:pointer;background:#1f2a3e;color:#cbd5e1;}
.tag.active{background:#00bfff;color:#0f172a;border-color:#00bfff;}
button{padding:12px 24px;background:#00bfff;color:#0f172a;border:none;border-radius:40px;cursor:pointer;font-weight:600;margin-top:10px;}
button:hover{background:#0099cc;transform:translateY(-2px);}
.tab-buttons{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.tab-btn{flex:1;background:#1e293b;border:none;padding:12px;border-radius:10px;cursor:pointer;font-weight:500;color:white;}
.tab-btn.active{background:#00bfff;color:#0f172a;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.item{background:white;color:black;padding:15px;border-radius:12px;margin-top:12px;}
.item-actions{display:flex;gap:10px;margin-top:12px;justify-content:flex-end;}
.edit-btn{background:#f59e0b;color:white;border:none;padding:6px 12px;border-radius:20px;cursor:pointer;}
.delete-btn{background:#dc2626;color:white;border:none;padding:6px 12px;border-radius:20px;cursor:pointer;}
.preview-btn{background:#22c55e;color:white;border:none;padding:6px 12px;border-radius:20px;cursor:pointer;}
.dashboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:20px;}
.kpi-box{background:#1e293b;padding:20px;border-radius:16px;text-align:center;}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:10000;justify-content:center;align-items:center;}
.modal-content{background:#1e293b;border-radius:20px;padding:28px;width:90%;max-width:650px;max-height:85vh;overflow-y:auto;}
.modal-buttons{display:flex;gap:12px;margin-top:20px;}
</style>
</head>
<body>

<div id="loginBox">
  <h3>管理员登录</h3>
  <input type="password" id="pass" placeholder="请输入密码">
  <button id="loginBtn">登录</button>
  <div style="font-size:12px;margin-top:10px;text-align:center;">密码：123456</div>
</div>

<div id="panelBox">
  <div class="tab-buttons">
    <button class="tab-btn active" data-tab="dashboard">📊 Dashboard</button>
    <button class="tab-btn" data-tab="products">📦 产品管理</button>
    <button class="tab-btn" data-tab="clients">👥 客户管理</button>
    <button class="tab-btn" data-tab="orders">📝 订单管理</button>
    <button class="tab-btn" data-tab="settings">⚙️ 网站设置</button>
  </div>

  <!-- Dashboard -->
  <div id="dashboardTab" class="tab-content active">
    <div class="dashboard">
      <div class="kpi-box" id="kpiProducts">📦 产品: 0</div>
      <div class="kpi-box" id="kpiClients">👥 客户: 0</div>
      <div class="kpi-box" id="kpiOrders">📝 订单: 0</div>
    </div>
  </div>

  <!-- Products -->
  <div id="productsTab" class="tab-content">
    <div class="box">
      <h3>📤 快速上架新产品</h3>
      <div class="step-nav">
        <div class="step active" data-step="1">1. 基础信息</div>
        <div class="step" data-step="2">2. 图片上传</div>
        <div class="step" data-step="3">3. 规格与标签</div>
        <div class="step" data-step="4">4. 发布</div>
      </div>
      <div id="step1" class="step-content active">
        <input type="text" id="p_name" placeholder="产品名称 *">
        <select id="p_category">
          <option value="">选择分类</option>
          <option value="Neoprene Fabrics">🧵 Neoprene Fabrics</option>
          <option value="Laminated Neoprene">🔗 Laminated Neoprene</option>
          <option value="Foam & Protective">🛡️ Foam & Protective</option>
        </select>
        <button class="btn-next" onclick="goToStep(2)">下一步 →</button>
      </div>
      <div id="step2" class="step-content">
        <div class="upload-box" id="uploadBox">📸 点击上传产品图片</div>
        <input type="file" id="fileInput" multiple accept="image/*" style="display:none">
        <div id="previewArea" style="display:flex; flex-wrap:wrap; gap:8px; margin-top:15px;"></div>
        <button class="btn-next" onclick="goToStep(3)">下一步 →</button>
      </div>
      <div id="step3" class="step-content">
        <div class="row">
          <input type="text" id="p_thickness" placeholder="厚度 (mm)">
          <input type="text" id="p_width" placeholder="宽度 (m)">
        </div>
        <div class="row">
          <input type="text" id="p_gsm" placeholder="GSM">
          <input type="text" id="p_color" placeholder="颜色">
        </div>
        <input type="text" id="p_moq" placeholder="MOQ">
        <h4>⚡ 性能特点</h4>
        <div class="tags" id="featuresTags">
          <div class="tag" data-val="Waterproof">💧 Waterproof</div>
          <div class="tag" data-val="Stretch">🔄 Stretch</div>
        </div>
        <h4>🎯 应用场景</h4>
        <div class="tags" id="appsTags">
          <div class="tag" data-val="Wetsuits">🏄 Wetsuits</div>
          <div class="tag" data-val="Bags">🎒 Bags</div>
        </div>
        <button class="btn-next" onclick
