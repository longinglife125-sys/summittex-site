<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>V19 企业后台管理系统 | 修复版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0b1220;
            color: #eef2ff;
        }

        #loginBox {
            max-width: 380px;
            margin: 140px auto;
            background: #ffffff;
            color: #0f172a;
            padding: 28px 24px;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.35);
        }

        #loginBox h3 {
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 1.6rem;
            text-align: center;
            color: #1e293b;
        }

        #loginBox input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 16px;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            background: #f8fafc;
            font-size: 1rem;
            outline: none;
        }

        #loginBox input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.2);
        }

        #loginBox button {
            width: 100%;
            background: #2563eb;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            color: white;
            cursor: pointer;
        }

        #loginBox button:hover {
            background: #1d4ed8;
        }

        #panelBox {
            display: none;
            padding: 24px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .box {
            background: #111827;
            border-radius: 24px;
            padding: 20px 24px;
            margin-bottom: 28px;
            border: 1px solid #1f2a3e;
        }

        .box h3 {
            margin-top: 0;
            margin-bottom: 18px;
            font-weight: 600;
            font-size: 1.4rem;
            border-left: 4px solid #3b82f6;
            padding-left: 14px;
            color: #e2e8f0;
        }

        label {
            font-weight: 500;
            font-size: 0.85rem;
            display: block;
            margin-top: 12px;
            color: #9ca3af;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            margin-top: 6px;
            border-radius: 16px;
            border: 1px solid #2d3a5e;
            background: #1e293b;
            color: #f1f5f9;
            font-size: 0.9rem;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #3b82f6;
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        button {
            background: #2563eb;
            border: none;
            padding: 12px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        button:hover {
            background: #1e40af;
        }

        .flex-btns {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .item {
            background: #1e293b;
            color: #f1f5f9;
            padding: 16px;
            border-radius: 20px;
            margin-top: 14px;
            border: 1px solid #2d3a5e;
        }

        .item b {
            color: #facc15;
            font-size: 1.05rem;
        }

        .log {
            background: #0f1722;
            padding: 14px;
            font-family: monospace;
            font-size: 12px;
            height: 150px;
            overflow: auto;
            border-radius: 20px;
            border: 1px solid #2d3a5e;
            color: #b9c7d9;
            line-height: 1.5;
        }

        .product-grid {
            max-height: 480px;
            overflow-y: auto;
            margin-top: 12px;
            padding-right: 6px;
        }
    </style>
</head>
<body>

<div id="loginBox">
    <h3>🔐 管理员登录</h3>
    <input type="password" id="adminPass" placeholder="请输入安全密码" autocomplete="off">
    <button id="loginBtn">登录系统 ➔</button>
    <div style="font-size: 12px; text-align: center; margin-top: 20px; color: #64748b;">密码: 123456</div>
</div>

<div id="panelBox">
    <div class="box">
        <h3>📤 产品上传</h3>
        <input id="prodName" placeholder="产品名称 *">
        
        <label>🏷️ 产品分类</label>
        <select id="prodCategory">
            <option>Outdoor Functional Fabrics</option>
            <option>Sports & Activewear Fabrics</option>
            <option>Recycled & Sustainable Fabrics</option>
            <option>Stretch Fabrics</option>
            <option>Nylon & Polyester Fabrics</option>
            <option>Jacquard & Textured Fabrics</option>
            <option>Printed Fabrics</option>
            <option>Swimwear Fabrics</option>
            <option>Underwear Fabrics</option>
            <option>Workwear Fabrics</option>
            <option>Fashion Fabrics</option>
            <option>Others</option>
        </select>

        <label>⚖️ GSM</label>
        <input id="prodGsm" placeholder="例: 180 gsm">

        <label>📦 MOQ</label>
        <input id="prodMoq" placeholder="例: 500 meters">

        <label>✨ 产品特性</label>
        <textarea id="prodFeature" placeholder="描述产品优势、技术特点..."></textarea>

        <label>🖼️ 产品图片 (可选)</label>
        <input type="file" id="prodImageFile" accept="image/*">

        <button id="uploadProductBtn" style="margin-top: 20px; width: 100%;">🚀 上传产品</button>
    </div>

    <div class="box">
        <h3>📦 产品库</h3>
        <div class="flex-btns">
            <button id="refreshProductsBtn">🔄 刷新产品</button>
        </div>
        <div id="productList" class="product-grid">
            <div style="color: #6c7a91; text-align:center; padding: 24px;">点击刷新加载产品</div>
        </div>
    </div>

    <div class="box">
        <h3>📩 客户询盘 (CRM)</h3>
        <div class="flex-btns">
            <button id="refreshCRMBtn">🔄 刷新询盘</button>
        </div>
        <div id="crmList">
            <div style="color: #6c7a91; text-align:center; padding: 24px;">暂无客户留言</div>
        </div>
    </div>

    <div class="box">
        <h3>📋 实时日志</h3>
        <div class="log" id="logBox">✅ 系统就绪，等待登录...</div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://tpcxaelljrudshchuzia.supabase.co";
    const SUPABASE_KEY = "sb_publishable_c0xeymh6AnE-Ld7StbxpgA_YN3ig8qt";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const logBox = document.getElementById("logBox");
    
    function addLog(msg, isError = false) {
        const time = new Date().toLocaleTimeString('zh-CN');
        const prefix = `[${time}] ${isError ? '❌' : '✅'}`;
        logBox.innerHTML += `<div style="color: ${isError ? '#f87171' : '#86efac'};">${prefix} ${msg}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
        if (logBox.children.length > 80) {
            while(logBox.children.length > 70) logBox.removeChild(logBox.firstChild);
        }
    }

    // ===== 登录函数 =====
    function doLogin() {
        const input = document.getElementById("adminPass");
        const loginBox = document.getElementById("loginBox");
        const panelBox = document.getElementById("panelBox");

        if (!input || !loginBox || !panelBox) {
            alert("页面结构错误");
            return;
        }

        const pass = input.value.trim();

        if (pass === "123456") {
            loginBox.style.display = "none";
            panelBox.style.display = "block";
            addLog("登录成功，正在加载数据...");
            
            loadProducts();
            loadCRM();
        } else {
            alert("密码错误");
            input.value = "";
            input.focus();
        }
    }

    // ===== 上传产品（修复版：移除 created_at）=====
    async function uploadProduct() {
        const nameValue = document.getElementById("prodName").value.trim();
        if (!nameValue) {
            alert("请填写产品名称");
            addLog("上传失败: 产品名称为空", true);
            return;
        }

        const file = document.getElementById("prodImageFile").files[0];
        let uploadedImageUrl = "";
        
        try {
            addLog("开始上传产品...");
            
            if (file) {
                const fileExt = file.name.split('.').pop();
                const safeName = `${Date.now()}_${Math.random().toString(36).substring(2, 8)}.${fileExt}`;
                const filePath = `product_images/${safeName}`;
                
                const { error: uploadError } = await supabase.storage
                    .from("images")
                    .upload(filePath, file);
                
                if (!uploadError) {
                    uploadedImageUrl = `${SUPABASE_URL}/storage/v1/object/public/images/${filePath}`;
                    addLog(`图片上传成功`);
                } else {
                    addLog(`图片上传失败: ${uploadError.message}`, true);
                }
            }
            
            // 注意：这里移除了 created_at 字段
            const newProduct = {
                name: nameValue,
                category: document.getElementById("prodCategory").value,
                gsm: document.getElementById("prodGsm").value || "",
                moq: document.getElementById("prodMoq").value || "",
                feature: document.getElementById("prodFeature").value || "",
                image: uploadedImageUrl,
                images: uploadedImageUrl ? [uploadedImageUrl] : []
            };
            
            const { error: insertError } = await supabase
                .from("products")
                .insert([newProduct]);
            
            if (insertError) {
                addLog(`数据库错误: ${insertError.message}`, true);
                alert(`上传失败: ${insertError.message}`);
                return;
            }
            
            addLog(`产品「${nameValue}」上传成功`);
            
            // 清空表单
            document.getElementById("prodName").value = "";
            document.getElementById("prodGsm").value = "";
            document.getElementById("prodMoq").value = "";
            document.getElementById("prodFeature").value = "";
            document.getElementById("prodImageFile").value = "";
            
            await loadProducts();
        } catch (err) {
            addLog(`异常: ${err.message}`, true);
            alert("上传失败，请查看日志");
        }
    }
    
    // ===== 加载产品（修复版：移除 order by created_at）=====
    async function loadProducts() {
        addLog("加载产品列表...");
        try {
            // 移除了 .order('created_at')，如果有其他可用字段可以排序，比如 id
            const { data, error } = await supabase
                .from("products")
                .select("*");
            
            if (error) {
                addLog(`加载失败: ${error.message}`, true);
                document.getElementById("productList").innerHTML = `<div style="color:#f87171;">❌ 数据获取失败</div>`;
                return;
            }
            
            if (!data || data.length === 0) {
                document.getElementById("productList").innerHTML = `<div style="color:#9ca3af; text-align:center; padding: 32px;">📭 暂无产品</div>`;
                addLog("产品库为空");
                return;
            }
            
            let html = "";
            data.forEach(p => {
                html += `
                    <div class="item">
                        <b>${escapeHtml(p.name || "未命名")}</b><br>
                        🏷️ ${escapeHtml(p.category || "未分类")}<br>
                        ⚖️ GSM: ${escapeHtml(p.gsm || "—")} &nbsp;|&nbsp; 📦 MOQ: ${escapeHtml(p.moq || "—")}<br>
                        ${p.feature ? `✨ ${escapeHtml(p.feature.substring(0, 100))}${p.feature.length > 100 ? '...' : ''}<br>` : ''}
                        ${p.image ? `<img src="${p.image}" style="max-width: 80px; margin-top: 8px; border-radius: 8px;" onerror="this.style.display='none'">` : ''}
                    </div>
                `;
            });
            document.getElementById("productList").innerHTML = html;
            addLog(`加载完成，共 ${data.length} 件产品`);
        } catch (err) {
            addLog(`异常: ${err.message}`, true);
        }
    }
    
    // ===== 加载 CRM =====
    async function loadCRM() {
        addLog("加载客户询盘...");
        try {
            const { data, error } = await supabase
                .from("inquiries")
                .select("*");
            
            if (error) {
                addLog(`CRM加载失败: ${error.message}`, true);
                document.getElementById("crmList").innerHTML = `<div style="color:#f87171;">无法加载询盘</div>`;
                return;
            }
            
            if (!data || data.length === 0) {
                document.getElementById("crmList").innerHTML = `<div style="color:#9ca3af; text-align:center; padding: 32px;">💬 暂无询盘</div>`;
                return;
            }
            
            let html = "";
            data.forEach(c => {
                html += `
                    <div class="item">
                        <b>👤 ${escapeHtml(c.name || "匿名")}</b><br>
                        📌 产品: ${escapeHtml(c.product || "未指定")}<br>
                        💬 ${escapeHtml(c.message || "")}
                    </div>
                `;
            });
            document.getElementById("crmList").innerHTML = html;
            addLog(`询盘加载完成，共 ${data.length} 条`);
        } catch (err) {
            addLog(`CRM异常: ${err.message}`, true);
        }
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ===== 绑定事件 =====
    window.addEventListener("DOMContentLoaded", () => {
        const loginBtn = document.getElementById("loginBtn");
        const passInput = document.getElementById("adminPass");
        const uploadBtn = document.getElementById("uploadProductBtn");
        const refreshBtn = document.getElementById("refreshProductsBtn");
        const refreshCRM = document.getElementById("refreshCRMBtn");
        
        if (loginBtn) loginBtn.addEventListener("click", doLogin);
        if (passInput) passInput.addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });
        if (uploadBtn) uploadBtn.addEventListener("click", uploadProduct);
        if (refreshBtn) refreshBtn.addEventListener("click", loadProducts);
        if (refreshCRM) refreshCRM.addEventListener("click", loadCRM);
        
        if (passInput) passInput.focus();
        addLog("登录系统就绪，请输入密码 123456");
    });
</script>
</body>
</html>
