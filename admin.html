<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>V21 企业外贸后台系统</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

#loginBox{
    max-width:360px;
    margin:120px auto;
    background:white;
    color:black;
    padding:24px;
    border-radius:16px;
}

#panelBox{
    display:none;
    padding:20px;
}

.box{
    background:#111827;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
}

input,select,textarea{
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:8px;
    border:none;
    box-sizing:border-box;
    background:#1f2a3e;
    color:white;
}

input::placeholder, textarea::placeholder {
    color: #9ca3af;
}

select {
    background: #1f2a3e;
    color: white;
}

select option {
    background: #1f2a3e;
    color: white;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.item{
    background:white;
    color:black;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
    position:relative;
}

.item-img{
    max-width:50px;
    max-height:50px;
    border-radius:5px;
    margin:2px;
    object-fit:cover;
}

.item-actions {
    display: flex;
    gap: 10px;
    margin-top: 10px;
    justify-content: flex-end;
}

.edit-btn, .delete-btn {
    padding: 6px 12px;
    font-size: 12px;
    width: auto;
    margin-top: 0;
    border-radius: 6px;
}

.edit-btn {
    background: #f59e0b;
}

.edit-btn:hover {
    background: #d97706;
}

.delete-btn {
    background: #dc2626;
}

.delete-btn:hover {
    background: #b91c1c;
}

.hint {
    font-size: 11px;
    color: #9ca3af;
    margin-top: 5px;
}

.section-title {
    margin-top: 15px;
    margin-bottom: 5px;
    font-size: 13px;
    color: #9ca3af;
    border-left: 3px solid #2563eb;
    padding-left: 8px;
}

/* 多图上传区域 */
.drop-area {
    border: 2px dashed #4b5563;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    margin-top: 10px;
    cursor: pointer;
    transition: all 0.2s;
    background: #1e293b;
}

.drop-area:hover {
    border-color: #2563eb;
    background: #334155;
}

.drop-area.dragover {
    border-color: #2563eb;
    background: #1e3a5f;
}

.preview-container {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 15px;
}

.preview-item {
    position: relative;
    width: 80px;
    height: 80px;
    border-radius: 8px;
    overflow: hidden;
    background: #1e293b;
    border: 1px solid #4b5563;
}

.preview-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.remove-btn {
    position: absolute;
    top: 2px;
    right: 2px;
    background: rgba(220,38,38,0.8);
    color: white;
    border: none;
    border-radius: 50%;
    width: 20px;
    height: 20px;
 font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

.remove-btn:hover {
    background: #dc2626;
}

.img-count {
    font-size: 12px;
    color: #4ade80;
    margin-top: 5px;
}

/* 模态框 */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #1e293b;
    border-radius: 16px;
    padding: 24px;
    max-width: 500px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
}

.modal-content h3 {
    margin-bottom: 20px;
}

.modal-buttons {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}

.modal-buttons button {
    flex: 1;
    margin-top: 0;
}

.confirm-delete {
    background: #dc2626;
}

.confirm-delete:hover {
    background: #b91c1c;
}
</style>
</head>

<body>

<div id="loginBox">
<h3>管理员登录</h3>
<input type="password" id="pass" placeholder="请输入密码">
<button id="loginBtn">登录</button>
<div style="font-size:12px;margin-top:10px;text-align:center;">密码：123456</div>
</div>

<div id="panelBox">

<div class="box">
<h3>📤 上传产品</h3>

<input id="name" placeholder="产品名称 *">

<select id="category">
    <option value="">请选择产品分类</option>
    <option>Outdoor Functional Fabrics</option>
    <option>Sports & Activewear Fabrics</option>
    <option>Recycled & Sustainable Fabrics</option>
    <option>Stretch Fabrics</option>
    <option>Nylon & Polyester Fabrics</option>
    <option>Jacquard & Textured Fabrics</option>
    <option>Printed Fabrics</option>
    <option>Swimwear Fabrics</option>
    <option>Underwear Fabrics</option>
    <option>Workwear Fabrics</option>
    <option>Fashion Fabrics</option>
    <option>Others</option>
</select>

<input id="gsm" placeholder="GSM (例: 180)">
<input id="moq" placeholder="MOQ (例: 1000 meters)">
<textarea id="feature" placeholder="产品描述"></textarea>

<div class="section-title">🖼️ 产品图片（支持多选/拖拽）</div>
<div class="drop-area" id="dropArea">
    📸 点击或拖拽图片到此处上传<br>
    <small>支持 JPG、PNG、WEBP，可同时选择多张</small>
</div>
<div class="preview-container" id="previewContainer"></div>
<div class="img-count" id="imgCount">已选择 0 张图片</div>
<input type="file" id="imageInput" multiple accept="image/jpeg,image/jpg,image/png,image/webp" style="display:none">

<div class="section-title">📹 视频（二选一即可）</div>
<input id="videoUrl" placeholder="方式一：粘贴视频链接 (YouTube/Vimeo)">
<div class="hint">💡 支持 YouTube: https://youtu.be/xxxxx</div>
<input type="file" id="videoFile" accept="video/mp4,video/webm">
<div class="hint">📁 方式二：直接上传 MP4 视频（小于50MB）</div>

<button id="uploadBtn">上传产品</button>
</div>

<div class="box">
<h3>📦 产品列表</h3>
<button id="refreshBtn">刷新产品</button>
<div id="list"></div>
</div>

<div class="box">
<h3>📩 CRM 客户询盘</h3>
<button id="crmBtn">刷新询盘</button>
<div id="crm"></div>
</div>

</div>

<!-- 编辑模态框 -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>✏️ 编辑产品</h3>
        <input type="hidden" id="editId">
        <input id="editName" placeholder="产品名称">
        <select id="editCategory">
            <option value="">请选择产品分类</option>
            <option>Outdoor Functional Fabrics</option>
            <option>Sports & Activewear Fabrics</option>
            <option>Recycled & Sustainable Fabrics</option>
            <option>Stretch Fabrics</option>
            <option>Nylon & Polyester Fabrics</option>
            <option>Jacquard & Textured Fabrics</option>
            <option>Printed Fabrics</option>
            <option>Swimwear Fabrics</option>
            <option>Underwear Fabrics</option>
            <option>Workwear Fabrics</option>
            <option>Fashion Fabrics</option>
            <option>Others</option>
        </select>
        <input id="editGsm" placeholder="GSM">
        <input id="editMoq" placeholder="MOQ">
        <textarea id="editFeature" placeholder="产品描述"></textarea>
        <input id="editVideoUrl" placeholder="视频链接">
        <div class="modal-buttons">
            <button id="saveEditBtn">保存修改</button>
            <button id="cancelEditBtn" style="background:#6c757d;">取消</button>
        </div>
    </div>
</div>

<!-- 删除确认模态框 -->
<div id="deleteModal" class="modal">
    <div class="modal-content">
        <h3>⚠️ 确认删除</h3>
        <p>确定要删除产品 "<span id="deleteProductName"></span>" 吗？</p>
        <p style="color:#f87171; font-size:12px;">此操作不可恢复！</p>
        <div class="modal-buttons">
            <button id="confirmDeleteBtn" class="confirm-delete">确认删除</button>
            <button id="cancelDeleteBtn" style="background:#6c757d;">取消</button>
        </div>
    </div>
</div>

<script>

const { createClient } = supabase;

const sb = createClient(
    "https://tpcxaelljrudshchuzia.supabase.co",
    "sb_publishable_c0xeymh6AnE-Ld7StbxpgA_YN3ig8qt"
);

// 存储待上传的图片文件列表
let selectedImages = [];
let editingProductId = null;
let deletingProductId = null;
let deletingProductName = '';

// DOM 元素
const dropArea = document.getElementById('dropArea');
const imageInput = document.getElementById('imageInput');
const previewContainer = document.getElementById('previewContainer');
const imgCountSpan = document.getElementById('imgCount');

// 打开文件选择
dropArea.addEventListener('click', () => imageInput.click());

// 拖拽上传
dropArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropArea.classList.add('dragover');
});

dropArea.addEventListener('dragleave', () => {
    dropArea.classList.remove('dragover');
});

dropArea.addEventListener('drop', (e) => {
    e.preventDefault();
    dropArea.classList.remove('dragover');
    const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
    addImages(files);
});

imageInput.addEventListener('change', (e) => {
    addImages(Array.from(e.target.files));
    imageInput.value = '';
});

function addImages(files) {
    for (const file of files) {
        if (file.size > 10 * 1024 * 1024) {
            alert(`图片 ${file.name} 超过10MB，已跳过`);
            continue;
        }
        selectedImages.push(file);
    }
    refreshPreview();
}

function removeImage(index) {
    selectedImages.splice(index, 1);
    refreshPreview();
}

function refreshPreview() {
    previewContainer.innerHTML = '';
    selectedImages.forEach((file, idx) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const previewDiv = document.createElement('div');
            previewDiv.className = 'preview-item';
            previewDiv.innerHTML = `
                <img src="${e.target.result}">
                <button class="remove-btn" onclick="removeImage(${idx})">×</button>
            `;
            previewContainer.appendChild(previewDiv);
        };
        reader.readAsDataURL(file);
    });
    imgCountSpan.innerText = `已选择 ${selectedImages.length} 张图片`;
}

function login() {
    const pass = document.getElementById("pass").value.trim();
    if (pass === "123456") {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("panelBox").style.display = "block";
        load();
        loadCRM();
    } else {
        alert("密码错误");
    }
}

async function upload() {
    try {
        const productName = document.getElementById("name").value.trim();
        if (!productName) {
            alert("请填写产品名称");
            return;
        }

        const uploadBtn = document.getElementById("uploadBtn");
        uploadBtn.disabled = true;
        uploadBtn.innerText = "上传中...";

        const imageUrls = [];
        for (let i = 0; i < selectedImages.length; i++) {
            const file = selectedImages[i];
            const fileName = Date.now() + "_" + i + "_" + file.name.replace(/[^a-zA-Z0-9.-]/g, '_');
            const { error: uploadError } = await sb.storage
                .from("images")
                .upload(fileName, file);
            if (uploadError) {
                console.error("图片上传错误:", uploadError);
            } else {
                const { data: publicUrlData } = sb.storage
                    .from("images")
                    .getPublicUrl(fileName);
                imageUrls.push(publicUrlData.publicUrl);
            }
        }

        let videoUrl = document.getElementById("videoUrl").value.trim();
        const videoFile = document.getElementById("videoFile").files[0];
        
        if (videoFile) {
            const videoFileName = Date.now() + "_video_" + videoFile.name.replace(/[^a-zA-Z0-9.-]/g, '_');
            const { error: videoUploadError } = await sb.storage
                .from("images")
                .upload(videoFileName, videoFile);
            if (!videoUploadError) {
                const { data: publicUrlData } = sb.storage
                    .from("images")
                    .getPublicUrl(videoFileName);
                videoUrl = publicUrlData.publicUrl;
            }
        }

        const productData = {
            name: productName,
            category: document.getElementById("category").value,
            gsm: document.getElementById("gsm").value,
            moq: document.getElementById("moq").value,
            feature: document.getElementById("feature").value,
            image: imageUrls[0] || "",
            images: imageUrls,
            video_url: videoUrl || null
        };

        const { error: dbError } = await sb
            .from("products")
            .insert([productData]);

        if (dbError) {
            alert("上传失败：" + dbError.message);
        } else {
            alert(`✅ 产品上传成功！\n图片：${imageUrls.length}张\n视频：${videoUrl ? "已添加" : "无"}`);
            
            document.getElementById("name").value = "";
            document.getElementById("gsm").value = "";
            document.getElementById("moq").value = "";
            document.getElementById("feature").value = "";
            document.getElementById("videoUrl").value = "";
            document.getElementById("videoFile").value = "";
            document.getElementById("category").value = "";
            selectedImages = [];
            refreshPreview();
            
            load();
        }
    } catch (e) {
        console.error("系统异常:", e);
        alert("系统错误：" + e.message);
    } finally {
        const uploadBtn = document.getElementById("uploadBtn");
        uploadBtn.disabled = false;
        uploadBtn.innerText = "上传产品";
    }
}

// 编辑产品
function editProduct(id, name, category, gsm, moq, feature, videoUrl) {
    editingProductId = id;
    document.getElementById("editId").value = id;
    document.getElementById("editName").value = name || '';
    document.getElementById("editCategory").value = category || '';
    document.getElementById("editGsm").value = gsm || '';
    document.getElementById("editMoq").value = moq || '';
    document.getElementById("editFeature").value = feature || '';
    document.getElementById("editVideoUrl").value = videoUrl || '';
    document.getElementById("editModal").style.display = "flex";
}

// 保存编辑
async function saveEdit() {
    const id = document.getElementById("editId").value;
    const updateData = {
        name: document.getElementById("editName").value,
        category: document.getElementById("editCategory").value,
        gsm: document.getElementById("editGsm").value,
        moq: document.getElementById("editMoq").value,
        feature: document.getElementById("editFeature").value,
        video_url: document.getElementById("editVideoUrl").value || null
    };
    
    try {
        const { error } = await sb
            .from("products")
            .update(updateData)
            .eq("id", id);
        
        if (error) {
            alert("编辑失败：" + error.message);
        } else {
            alert("✅ 产品已更新");
            document.getElementById("editModal").style.display = "none";
            load();
        }
    } catch (e) {
        alert("系统错误：" + e.message);
    }
}

// 删除确认
function confirmDeleteProduct(id, name) {
    deletingProductId = id;
    deletingProductName = name;
    document.getElementById("deleteProductName").innerText = name;
    document.getElementById("deleteModal").style.display = "flex";
}

// 执行删除
async function executeDelete() {
    if (!deletingProductId) return;
    
    try {
        // 先获取产品图片URL，准备删除存储文件
        const { data: product } = await sb
            .from("products")
            .select("image, images")
            .eq("id", deletingProductId)
            .single();
        
        // 删除数据库记录
        const { error } = await sb
            .from("products")
            .delete()
            .eq("id", deletingProductId);
        
        if (error) {
            alert("删除失败：" + error.message);
        } else {
            alert("✅ 产品已删除");
            load();
        }
    } catch (e) {
        alert("系统错误：" + e.message);
    } finally {
        document.getElementById("deleteModal").style.display = "none";
        deletingProductId = null;
    }
}

async function load() {
    const { data, error } = await sb
        .from("products")
        .select("*")
        .order("id", { ascending: false });
    
    if (error) {
        console.error("加载错误:", error);
        return;
    }

    let html = "";
    if (!data || data.length === 0) {
        html = "<div class='item'>暂无产品</div>";
    } else {
        data.forEach(p => {
            const imagesCount = p.images ? p.images.length : (p.image ? 1 : 0);
            html += `
            <div class="item">
                <b>${escapeHtml(p.name || "")}</b><br><br>
                📁 分类：${escapeHtml(p.category || "")}<br>
                ⚖️ GSM：${escapeHtml(p.gsm || "")}<br>
                📦 MOQ：${escapeHtml(p.moq || "")}<br>
                🖼️ 图片：${imagesCount}张 &nbsp;|&nbsp; 🎬 视频：${p.video_url ? '✅' : '❌'}<br>
                📝 ${escapeHtml((p.feature || "").substring(0, 80))}${p.feature && p.feature.length > 80 ? '...' : ''}<br>
                <div class="item-actions">
                    <button class="edit-btn" onclick="editProduct('${p.id}', '${escapeHtml(p.name || "").replace(/'/g, "\\'")}', '${escapeHtml(p.category || "").replace(/'/g, "\\'")}', '${escapeHtml(p.gsm || "").replace(/'/g, "\\'")}', '${escapeHtml(p.moq || "").replace(/'/g, "\\'")}', ${escapeHtml(p.feature || "").replace(/'/g, "\\'")}, '${p.video_url || ""}')">✏️ 编辑</button>
                    <button class="delete-btn" onclick="confirmDeleteProduct('${p.id}', '${escapeHtml(p.name || "").replace(/'/g, "\\'")}')">🗑️ 删除</button>
                </div>
            </div>
            `;
        });
    }
    document.getElementById("list").innerHTML = html;
}

async function loadCRM() {
    const { data, error } = await sb
        .from("inquiries")
        .select("*")
        .order("created_at", { ascending: false });
    
    if (error) {
        console.error("CRM错误:", error);
        return;
    }
    let html = "";
    if (!data || data.length === 0) {
        html = "<div class='item'>暂无客户询盘</div>";
    } else {
        data.forEach(c => {
            html += `
            <div class="item">
                <b>${escapeHtml(c.name || "匿名客户")}</b><br><br>
                📌 产品：${escapeHtml(c.product || "")}<br><br>
                💬 ${escapeHtml((c.message || "").substring(0, 150))}
            </div>
            `;
        });
    }
    document.getElementById("crm").innerHTML = html;
}

function escapeHtml(str) {
    if (!str) return "";
    return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}

// 暴露全局函数
window.removeImage = removeImage;
window.editProduct = editProduct;
window.confirmDeleteProduct = confirmDeleteProduct;

// 绑定事件
document.getElementById("loginBtn").onclick = login;
document.getElementById("uploadBtn").onclick = upload;
document.getElementById("refreshBtn").onclick = load;
document.getElementById("crmBtn").onclick = loadCRM;
document.getElementById("saveEditBtn").onclick = saveEdit;
document.getElementById("cancelEditBtn").onclick = () => document.getElementById("editModal").style.display = "none";
document.getElementById("confirmDeleteBtn").onclick = executeDelete;
document.getElementById("cancelDeleteBtn").onclick = () => document.getElementById("deleteModal").style.display = "none";

const passInput = document.getElementById("pass");
if (passInput) {
    passInput.addEventListener("keydown", function(e) {
        if (e.key === "Enter") login();
    });
}

</script>

</body>
</html>
