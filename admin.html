<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>V21 企业外贸后台系统</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

#loginBox{
    max-width:360px;
    margin:120px auto;
    background:white;
    color:black;
    padding:24px;
    border-radius:16px;
}

#panelBox{
    display:none;
    padding:20px;
}

.box{
    background:#111827;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
}

input,select,textarea{
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:8px;
    border:none;
    box-sizing:border-box;
    background:#1f2a3e;
    color:white;
}

input::placeholder, textarea::placeholder {
    color: #9ca3af;
}

select {
    background: #1f2a3e;
    color: white;
}

select option {
    background: #1f2a3e;
    color: white;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.item{
    background:white;
    color:black;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

.item-img{
    max-width:60px;
    max-height:60px;
    border-radius:8px;
    margin:5px;
    object-fit:cover;
}

.hint {
    font-size: 11px;
    color: #9ca3af;
    margin-top: 5px;
}

.section-title {
    margin-top: 15px;
    margin-bottom: 5px;
    font-size: 13px;
    color: #9ca3af;
    border-left: 3px solid #2563eb;
    padding-left: 8px;
}

/* 多图上传区域 */
.drop-area {
    border: 2px dashed #4b5563;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    margin-top: 10px;
    cursor: pointer;
    transition: all 0.2s;
    background: #1e293b;
}

.drop-area:hover {
    border-color: #2563eb;
    background: #334155;
}

.drop-area.dragover {
    border-color: #2563eb;
    background: #1e3a5f;
}

.preview-container {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 15px;
}

.preview-item {
    position: relative;
    width: 80px;
    height: 80px;
    border-radius: 8px;
    overflow: hidden;
    background: #1e293b;
}

.preview-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.remove-btn {
    position: absolute;
    top: 2px;
    right: 2px;
    background: rgba(0,0,0,0.6);
    color: white;
    border: none;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

.remove-btn:hover {
    background: #dc2626;
}

.video-preview {
    margin-top: 10px;
    color: #4ade80;
    font-size: 12px;
}
</style>
</head>

<body>

<div id="loginBox">
<h3>管理员登录</h3>
<input type="password" id="pass" placeholder="请输入密码">
<button id="loginBtn">登录</button>
<div style="font-size:12px;margin-top:10px;text-align:center;">密码：123456</div>
</div>

<div id="panelBox">

<div class="box">
<h3>📤 上传产品</h3>

<input id="name" placeholder="产品名称 *">

<select id="category">
    <option value="">请选择产品分类</option>
    <option>Outdoor Functional Fabrics</option>
    <option>Sports & Activewear Fabrics</option>
    <option>Recycled & Sustainable Fabrics</option>
    <option>Stretch Fabrics</option>
    <option>Nylon & Polyester Fabrics</option>
    <option>Jacquard & Textured Fabrics</option>
    <option>Printed Fabrics</option>
    <option>Swimwear Fabrics</option>
    <option>Underwear Fabrics</option>
    <option>Workwear Fabrics</option>
    <option>Fashion Fabrics</option>
    <option>Others</option>
</select>

<input id="gsm" placeholder="GSM (例: 180)">
<input id="moq" placeholder="MOQ (例: 1000 meters)">
<textarea id="feature" placeholder="产品描述"></textarea>

<div class="section-title">🖼️ 产品图片（支持多选/拖拽）</div>
<div class="drop-area" id="dropArea">
    📸 点击或拖拽图片到此处上传<br>
    <small>支持 JPG、PNG、WEBP，可同时选择多张</small>
</div>
<div class="preview-container" id="previewContainer"></div>
<input type="file" id="imageInput" multiple accept="image/jpeg,image/jpg,image/png,image/webp" style="display:none">

<div class="section-title">📹 视频（二选一即可）</div>
<input id="videoUrl" placeholder="方式一：粘贴视频链接 (YouTube/Vimeo)">
<div class="hint">💡 支持 YouTube: https://youtu.be/xxxxx</div>
<input type="file" id="videoFile" accept="video/mp4,video/webm">
<div class="hint">📁 方式二：直接上传 MP4 视频（小于50MB）</div>

<button id="uploadBtn">上传产品</button>
</div>

<div class="box">
<h3>📦 产品列表</h3>
<button id="refreshBtn">刷新产品</button>
<div id="list"></div>
</div>

<div class="box">
<h3>📩 CRM 客户询盘</h3>
<button id="crmBtn">刷新询盘</button>
<div id="crm"></div>
</div>

</div>

<script>

const { createClient } = supabase;

const sb = createClient(
    "https://tpcxaelljrudshchuzia.supabase.co",
    "sb_publishable_c0xeymh6AnE-Ld7StbxpgA_YN3ig8qt"
);

// 存储待上传的图片文件列表
let selectedImages = [];

// DOM 元素
const dropArea = document.getElementById('dropArea');
const imageInput = document.getElementById('imageInput');
const previewContainer = document.getElementById('previewContainer');

// 打开文件选择
dropArea.addEventListener('click', () => imageInput.click());

// 拖拽上传
dropArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropArea.classList.add('dragover');
});

dropArea.addEventListener('dragleave', () => {
    dropArea.classList.remove('dragover');
});

dropArea.addEventListener('drop', (e) => {
    e.preventDefault();
    dropArea.classList.remove('dragover');
    const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
    addImages(files);
});

// 选择文件
imageInput.addEventListener('change', (e) => {
    addImages(Array.from(e.target.files));
    imageInput.value = '';
});

// 添加图片到列表
function addImages(files) {
    for (const file of files) {
        if (file.size > 5 * 1024 * 1024) {
            alert(`图片 ${file.name} 超过5MB，已跳过`);
            continue;
        }
        selectedImages.push(file);
        const reader = new FileReader();
        reader.onload = (e) => {
            const previewDiv = document.createElement('div');
            previewDiv.className = 'preview-item';
            previewDiv.innerHTML = `
                <img src="${e.target.result}">
                <button class="remove-btn" onclick="removeImage(${selectedImages.length - 1})">×</button>
            `;
            previewContainer.appendChild(previewDiv);
        };
        reader.readAsDataURL(file);
    }
}

// 移除图片
function removeImage(index) {
    selectedImages.splice(index, 1);
    refreshPreview();
}

// 刷新预览
function refreshPreview() {
    previewContainer.innerHTML = '';
    selectedImages.forEach((file, idx) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const previewDiv = document.createElement('div');
            previewDiv.className = 'preview-item';
            previewDiv.innerHTML = `
                <img src="${e.target.result}">
                <button class="remove-btn" onclick="removeImage(${idx})">×</button>
            `;
            previewContainer.appendChild(previewDiv);
        };
        reader.readAsDataURL(file);
    });
}

function login() {
    const pass = document.getElementById("pass").value.trim();
    if (pass === "123456") {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("panelBox").style.display = "block";
        load();
        loadCRM();
    } else {
        alert("密码错误");
    }
}

async function upload() {
    try {
        const productName = document.getElementById("name").value.trim();
        if (!productName) {
            alert("请填写产品名称");
            return;
        }

        // 1. 上传多张图片
        const imageUrls = [];
        for (const file of selectedImages) {
            const fileName = Date.now() + "_" + Math.random().toString(36).substring(2, 8) + "_" + file.name;
            const { error: uploadError } = await sb.storage
                .from("images")
                .upload(fileName, file);
            if (uploadError) {
                console.log("图片上传错误:", uploadError);
                alert("图片上传失败：" + uploadError.message);
            } else {
                const { data: publicUrlData } = sb.storage
                    .from("images")
                    .getPublicUrl(fileName);
                imageUrls.push(publicUrlData.publicUrl);
            }
        }

        // 2. 处理视频
        let videoUrl = document.getElementById("videoUrl").value.trim();
        const videoFile = document.getElementById("videoFile").files[0];
        
        if (videoFile) {
            const videoFileName = Date.now() + "_video_" + videoFile.name;
            const { error: videoUploadError } = await sb.storage
                .from("images")
                .upload(videoFileName, videoFile);
            if (videoUploadError) {
                console.log("视频上传错误:", videoUploadError);
                alert("视频上传失败：" + videoUploadError.message);
            } else {
                const { data: publicUrlData } = sb.storage
                    .from("images")
                    .getPublicUrl(videoFileName);
                videoUrl = publicUrlData.publicUrl;
            }
        }

        // 3. 保存到数据库
        const productData = {
            name: productName,
            category: document.getElementById("category").value,
            gsm: document.getElementById("gsm").value,
            moq: document.getElementById("moq").value,
            feature: document.getElementById("feature").value,
            image: imageUrls[0] || "",
            images: imageUrls,
            video_url: videoUrl || null
        };

        const { error: dbError } = await sb
            .from("products")
            .insert([productData]);

        if (dbError) {
            alert("上传失败：" + dbError.message);
        } else {
            alert("✅ 产品上传成功！图片：" + imageUrls.length + "张" + (videoUrl ? "，含视频" : ""));
            
            // 清空表单
            document.getElementById("name").value = "";
            document.getElementById("gsm").value = "";
            document.getElementById("moq").value = "";
            document.getElementById("feature").value = "";
            document.getElementById("videoUrl").value = "";
            document.getElementById("videoFile").value = "";
            document.getElementById("category").value = "";
            selectedImages = [];
            refreshPreview();
            
            load();
        }
    } catch (e) {
        console.log("系统异常:", e);
        alert("系统错误：" + e.message);
    }
}

async function load() {
    const { data, error } = await sb
        .from("products")
        .select("*");
    if (error) {
        console.log("加载错误:", error);
        return;
    }

    let html = "";
    if (!data || data.length === 0) {
        html = "<div class='item'>暂无产品</div>";
    } else {
        data.forEach(p => {
            const imagesCount = p.images ? p.images.length : (p.image ? 1 : 0);
            html += `
            <div class="item">
                <b>${escapeHtml(p.name || "")}</b><br><br>
                📁 分类：${escapeHtml(p.category || "")}<br>
                ⚖️ GSM：${escapeHtml(p.gsm || "")}<br>
                📦 MOQ：${escapeHtml(p.moq || "")}<br>
                🖼️ 图片：${imagesCount}张 &nbsp;|&nbsp; 🎬 视频：${p.video_url ? '✅' : '❌'}<br><br>
                📝 ${escapeHtml((p.feature || "").substring(0, 100))}${p.feature && p.feature.length > 100 ? '...' : ''}<br>
                ${p.image ? `<img src="${p.image}" class="item-img" onerror="this.style.display='none'">` : ""}
            </div>
            `;
        });
    }
    document.getElementById("list").innerHTML = html;
}

async function loadCRM() {
    const { data, error } = await sb
        .from("inquiries")
        .select("*");
    if (error) {
        console.log("CRM错误:", error);
        return;
    }
    let html = "";
    if (!data || data.length === 0) {
        html = "<div class='item'>暂无客户询盘</div>";
    } else {
        data.forEach(c => {
            html += `
            <div class="item">
                <b>${escapeHtml(c.name || "匿名客户")}</b><br><br>
                📌 产品：${escapeHtml(c.product || "")}<br><br>
                💬 ${escapeHtml((c.message || "").substring(0, 150))}
            </div>
            `;
        });
    }
    document.getElementById("crm").innerHTML = html;
}

function escapeHtml(str) {
    if (!str) return "";
    return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}

// 暴露全局函数
window.removeImage = removeImage;

document.getElementById("loginBtn").onclick = login;
document.getElementById("uploadBtn").onclick = upload;
document.getElementById("refreshBtn").onclick = load;
document.getElementById("crmBtn").onclick = loadCRM;

const passInput = document.getElementById("pass");
if (passInput) {
    passInput.addEventListener("keydown", function(e) {
        if (e.key === "Enter") login();
    });
}

</script>

</body>
</html>
