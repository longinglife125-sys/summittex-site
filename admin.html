<title>SummitTex V4 Admin</title>

body{
    margin:0;

/* LOGIN */

#loginBox{

    margin:100px auto;
    background:white;
    color:#0f172a;
    padding:25px;
    border-radius:14px;

}

}

button{

}

}

.preview{

    height:60px;

}

}

    font-size:12px;
}
