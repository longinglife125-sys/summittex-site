<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>V21 企业外贸后台系统</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

#loginBox{
    max-width:360px;
    margin:120px auto;
    background:white;
    color:black;
    padding:24px;
    border-radius:16px;
}

#panelBox{
    display:none;
    padding:20px;
}

.box{
    background:#111827;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
}

input,select,textarea{
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:8px;
    border:none;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.item{
    background:white;
    color:black;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

img{
    max-width:80px;
    border-radius:8px;
    margin-top:8px;
}
</style>
</head>

<body>

<div id="loginBox">
<h3>管理员登录</h3>

<input type="password" id="pass" placeholder="请输入密码">

<button id="loginBtn">登录</button>

<div style="font-size:12px;margin-top:10px;text-align:center;">
密码：123456
</div>
</div>

<div id="panelBox">

<div class="box">

<h3>📤 上传产品</h3>

<input id="name" placeholder="产品名称">

<select id="category">
    <option value="">请选择产品分类</option>

    <option>Outdoor Functional Fabrics</option>
    <option>Sports & Activewear Fabrics</option>
    <option>Recycled & Sustainable Fabrics</option>
    <option>Stretch Fabrics</option>
    <option>Nylon & Polyester Fabrics</option>
    <option>Jacquard & Textured Fabrics</option>
    <option>Printed Fabrics</option>
    <option>Swimwear Fabrics</option>
    <option>Underwear Fabrics</option>
    <option>Workwear Fabrics</option>
    <option>Fashion Fabrics</option>
    <option>Others</option>
</select>

<input id="gsm" placeholder="GSM">

<input id="moq" placeholder="MOQ">

<textarea id="feature" placeholder="产品描述"></textarea>

<input type="file" id="file">

<button id="uploadBtn">上传产品</button>

</div>

<div class="box">

<h3>📦 产品列表</h3>

<button id="refreshBtn">刷新产品</button>

<div id="list"></div>

</div>

<div class="box">

<h3>📩 CRM 客户询盘</h3>

<button id="crmBtn">刷新询盘</button>

<div id="crm"></div>

</div>

</div>

<script>

/* ===================== SUPABASE ===================== */

const { createClient } = supabase;

const sb = createClient(
    "https://tpcxaelljrudshchuzia.supabase.co",
    "sb_publishable_c0xeymh6AnE-Ld7StbxpgA_YN3ig8qt"
);

/* ===================== 登录 ===================== */

function login(){

    const pass = document.getElementById("pass").value.trim();

    if(pass === "123456"){

        document.getElementById("loginBox").style.display = "none";

        document.getElementById("panelBox").style.display = "block";

        load();

        loadCRM();

    }else{

        alert("密码错误");

    }
}

/* ===================== 上传产品 ===================== */

async function upload(){

try{

    const productName = document.getElementById("name").value.trim();

    if(!productName){

        alert("请填写产品名称");

        return;
    }

    const file = document.getElementById("file").files[0];

    let imageUrl = "";

    /* ===== 上传图片 ===== */

    if(file){

        const fileName = Date.now() + "_" + file.name;

        const { error: uploadError } = await sb.storage
        .from("images")
        .upload(fileName, file);

        if(uploadError){

            console.log(uploadError);

            alert("图片上传失败");

        }else{

            imageUrl =
            "https://tpcxaelljrudshchuzia.supabase.co/storage/v1/object/public/images/" + fileName;
        }
    }

    /* ===== 插入数据库 ===== */

    const { error: dbError } = await sb
    .from("products")
    .insert([{

        name: productName,

        category: document.getElementById("category").value,

        gsm: document.getElementById("gsm").value,

        moq: document.getElementById("moq").value,

        feature: document.getElementById("feature").value,

        image: imageUrl

    }]);

    if(dbError){

        console.log(dbError);

        alert("上传失败：" + dbError.message);

    }else{

        alert("✅ 产品上传成功");

        /* 清空表单 */

        document.getElementById("name").value = "";

        document.getElementById("category").value = "";

        document.getElementById("gsm").value = "";

        document.getElementById("moq").value = "";

        document.getElementById("feature").value = "";

        document.getElementById("file").value = "";

        load();
    }

}catch(e){

    console.log(e);

    alert("系统错误：" + e.message);
}

}

/* ===================== 加载产品 ===================== */

async function load(){

const { data, error } = await sb
.from("products")
.select("*");

if(error){

    console.log(error);

    return;
}

let html = "";

if(!data || data.length === 0){

    html = "<div class='item'>暂无产品</div>";

}else{

    data.forEach(p=>{

        html += `
        <div class="item">

            <b>${p.name || ""}</b><br><br>

            📁 分类：${p.category || ""}<br>

            ⚖️ GSM：${p.gsm || ""}<br>

            📦 MOQ：${p.moq || ""}<br><br>

            📝 ${p.feature || ""}<br>

            ${
                p.image
                ? `<img src="${p.image}" onerror="this.style.display='none'">`
                : ""
            }

        </div>
        `;
    });
}

document.getElementById("list").innerHTML = html;

}

/* ===================== CRM ===================== */

async function loadCRM(){

const { data, error } = await sb
.from("inquiries")
.select("*");

if(error){

    console.log(error);

    return;
}

let html = "";

if(!data || data.length === 0){

    html = "<div class='item'>暂无客户询盘</div>";

}else{

    data.forEach(c=>{

        html += `
        <div class="item">

            <b>${c.name || "匿名客户"}</b><br><br>

            📌 产品：${c.product || ""}<br><br>

            💬 ${c.message || ""}

        </div>
        `;
    });
}

document.getElementById("crm").innerHTML = html;

}

/* ===================== 绑定事件 ===================== */

document.getElementById("loginBtn").onclick = login;

document.getElementById("uploadBtn").onclick = upload;

document.getElementById("refreshBtn").onclick = load;

document.getElementById("crmBtn").onclick = loadCRM;

/* ===== 回车登录 ===== */

document.getElementById("pass").addEventListener("keydown",function(e){

    if(e.key === "Enter"){

        login();
    }
});

</script>

</body>
</html>
