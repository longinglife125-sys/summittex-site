<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>V21 企业外贸后台系统</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

#loginBox{
    max-width:360px;
    margin:120px auto;
    background:white;
    color:black;
    padding:24px;
    border-radius:16px;
}

#panelBox{
    display:none;
    padding:20px;
}

.box{
    background:#111827;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
}

input,select,textarea{
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:8px;
    border:none;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.item{
    background:white;
    color:black;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

.item-img{
    max-width:80px;
    max-height:80px;
    border-radius:8px;
    margin-top:8px;
    object-fit:cover;
}
</style>
</head>

<body>

<div id="loginBox">
<h3>管理员登录</h3>

<input type="password" id="pass" placeholder="请输入密码">

<button id="loginBtn">登录</button>

<div style="font-size:12px;margin-top:10px;text-align:center;">
密码：123456
</div>
</div>

<div id="panelBox">

<div class="box">

<h3>📤 上传产品</h3>

<input id="name" placeholder="产品名称">

<select id="category">
    <option value="">请选择产品分类</option>
    <option>Outdoor Functional Fabrics</option>
    <option>Sports & Activewear Fabrics</option>
    <option>Recycled & Sustainable Fabrics</option>
    <option>Stretch Fabrics</option>
    <option>Nylon & Polyester Fabrics</option>
    <option>Jacquard & Textured Fabrics</option>
    <option>Printed Fabrics</option>
    <option>Swimwear Fabrics</option>
    <option>Underwear Fabrics</option>
    <option>Workwear Fabrics</option>
    <option>Fashion Fabrics</option>
    <option>Others</option>
</select>

<input id="gsm" placeholder="GSM">

<input id="moq" placeholder="MOQ">

<textarea id="feature" placeholder="产品描述"></textarea>

<input type="file" id="file">

<button id="uploadBtn">上传产品</button>

</div>

<div class="box">

<h3>📦 产品列表</h3>

<button id="refreshBtn">刷新产品</button>

<div id="list"></div>

</div>

<div class="box">

<h3>📩 CRM 客户询盘</h3>

<button id="crmBtn">刷新询盘</button>

<div id="crm"></div>

</div>

</div>

<script>

/* ===================== SUPABASE ===================== */

const { createClient } = supabase;

const sb = createClient(
    "https://tpcxaelljrudshchuzia.supabase.co",
    "sb_publishable_c0xeymh6AnE-Ld7StbxpgA_YN3ig8qt"
);

/* ===================== 登录 ===================== */

function login(){

    const pass = document.getElementById("pass").value.trim();

    if(pass === "123456"){

        document.getElementById("loginBox").style.display = "none";

        document.getElementById("panelBox").style.display = "block";

        load();

        loadCRM();

    }else{

        alert("密码错误");

    }
}

/* ===================== 上传产品 ===================== */

async function upload(){

try{

    const productName = document.getElementById("name").value.trim();

    if(!productName){

        alert("请填写产品名称");

        return;
    }

    const file = document.getElementById("file").files[0];

    let imageUrl = "";

    /* ===== 上传图片 ===== */

    if(file){

        const fileName = Date.now() + "_" + file.name;

        const { error: uploadError } = await sb.storage
        .from("images")
        .upload(fileName, file);

        if(uploadError){

            console.log("图片上传错误:", uploadError);

            alert("图片上传失败：" + uploadError.message);

        }else{

            // 使用 getPublicUrl 方法获取标准公开URL
            const { data: publicUrlData } = sb.storage
                .from("images")
                .getPublicUrl(fileName);
            
            imageUrl = publicUrlData.publicUrl;
            
            console.log("图片URL生成成功:", imageUrl);
        }
    }

    /* ===== 插入数据库 ===== */

    const productData = {
        name: productName,
        category: document.getElementById("category").value,
        gsm: document.getElementById("gsm").value,
        moq: document.getElementById("moq").value,
        feature: document.getElementById("feature").value,
        image: imageUrl
    };

    console.log("准备保存的产品数据:", productData);

    const { error: dbError } = await sb
    .from("products")
    .insert([productData]);

    if(dbError){

        console.log("数据库错误:", dbError);

        alert("上传失败：" + dbError.message);

    }else{

        alert("✅ 产品上传成功" + (imageUrl ? "（含图片）" : "（无图片）"));

        /* 清空表单 */
        document.getElementById("name").value = "";
        document.getElementById("gsm").value = "";
        document.getElementById("moq").value = "";
        document.getElementById("feature").value = "";
        document.getElementById("file").value = "";
        
        // 重置分类下拉框
        const categorySelect = document.getElementById("category");
        if(categorySelect) categorySelect.value = "";

        load();
    }

}catch(e){

    console.log("系统异常:", e);

    alert("系统错误：" + e.message);
}

}

/* ===================== 加载产品 ===================== */

async function load(){

const { data, error } = await sb
.from("products")
.select("*");

if(error){

    console.log("加载错误:", error);

    alert("加载产品失败：" + error.message);

    return;
}

let html = "";

if(!data || data.length === 0){

    html = "<div class='item'>暂无产品</div>";

}else{

    data.forEach(p=>{

        // 调试：打印图片URL
        if(p.image) console.log("产品图片URL:", p.name, p.image);
        
        html += `
        <div class="item">
            <b>${escapeHtml(p.name || "")}</b><br><br>
            📁 分类：${escapeHtml(p.category || "")}<br>
            ⚖️ GSM：${escapeHtml(p.gsm || "")}<br>
            📦 MOQ：${escapeHtml(p.moq || "")}<br><br>
            📝 ${escapeHtml(p.feature || "")}<br>
            ${
                p.image && p.image.trim() !== ""
                ? `<img src="${p.image}" class="item-img" onerror="this.onerror=null; this.style.display='none'; this.insertAdjacentHTML('afterend', '<span style=\"color:red;font-size:12px;\"> 图片加载失败</span>');" 
                       onload="console.log('图片加载成功: ${p.image}')">`
                : "<span style='color:#999;font-size:12px;'>📷 无图片</span>"
            }
        </div>
        `;
    });
}

document.getElementById("list").innerHTML = html;

}

/* ===================== CRM ===================== */

async function loadCRM(){

const { data, error } = await sb
.from("inquiries")
.select("*");

if(error){

    console.log("CRM错误:", error);

    return;
}

let html = "";

if(!data || data.length === 0){

    html = "<div class='item'>暂无客户询盘</div>";

}else{

    data.forEach(c=>{

        html += `
        <div class="item">
            <b>${escapeHtml(c.name || "匿名客户")}</b><br><br>
            📌 产品：${escapeHtml(c.product || "")}<br><br>
            💬 ${escapeHtml(c.message || "")}
        </div>
        `;
    });
}

document.getElementById("crm").innerHTML = html;

}

/* ===================== 防XSS辅助函数 ===================== */
function escapeHtml(str){
    if(!str) return "";
    return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}

/* ===================== 绑定事件 ===================== */

document.getElementById("loginBtn").onclick = login;

document.getElementById("uploadBtn").onclick = upload;

document.getElementById("refreshBtn").onclick = load;

document.getElementById("crmBtn").onclick = loadCRM;

/* ===== 回车登录 ===== */

const passInput = document.getElementById("pass");
if(passInput){
    passInput.addEventListener("keydown", function(e){
        if(e.key === "Enter"){
            login();
        }
    });
}

</script>

</body>
</html>
