<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>V16 Admin FIXED</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

#login{
    max-width:300px;
    margin:100px auto;
    background:white;
    color:#111827;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

#panel{
    display:none;
    padding:20px;
}

.box{
    background:#111827;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

input,select,textarea{
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

.log{
    background:black;
    padding:10px;
    font-size:12px;
    height:200px;
    overflow:auto;
    border-radius:8px;
    margin-top:10px;
    white-space:pre-wrap;
}

.item{
    background:white;
    color:black;
    padding:8px;
    margin-top:8px;
    border-radius:8px;
    font-size:13px;
}

</style>

</head>

<body>

<div id="login">
<h3>Debug Login</h3>
<input type="password" id="pass">
<button onclick="login()">Login</button>
</div>

<div id="panel">

<div class="box">

<h3>Upload Product (FIXED MODE)</h3>

<input id="name" placeholder="name">

<select id="category">
<option>Outdoor Functional Fabrics</option>
<option>Sports & Activewear Fabrics</option>
<option>Recycled & Sustainable Fabrics</option>
<option>Others</option>
</select>

<input id="gsm" placeholder="gsm">
<input id="moq" placeholder="moq">

<textarea id="feature" placeholder="feature"></textarea>

<input type="file" id="file">

<button onclick="upload()">UPLOAD PRODUCT</button>

</div>

<div class="box">

<h3>🔍 LIVE LOG</h3>
<div class="log" id="log"></div>

</div>

<div class="box">

<h3>📦 DATABASE DATA</h3>
<button onclick="load()">REFRESH DATA</button>
<div id="list"></div>

</div>

</div>

<script>

/* ===================== */
/* CONFIG */
/* ===================== */

const SUPABASE_URL = "https://tpcxaelljrudshchuzia.supabase.co";
const SUPABASE_KEY = "你的publishable key";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const logBox = document.getElementById("log");

function log(msg){
    logBox.innerText += msg + "\n";
    logBox.scrollTop = logBox.scrollHeight;
}

/* ===================== */
/* LOGIN */
/* ===================== */

function login(){
    if(pass.value==="123456"){
        login.style.display="none";
        panel.style.display="block";
        log("Login success");
        load();
    }else{
        alert("wrong password");
    }
}

/* ===================== */
/* UPLOAD FIXED */
/* ===================== */

async function upload(){

log("Start upload...");

let file = document.getElementById("file").files[0];

let imageUrl = "";

/* 1. upload image */
if(file){

log("Uploading image...");

let fileName = Date.now() + "_" + file.name;

let { data, error } = await sb.storage
.from("images")
.upload(fileName, file);

if(error){
    log("❌ Upload error: " + error.message);
    return;
}

imageUrl = SUPABASE_URL + "/storage/v1/object/public/images/" + fileName;

log("Image uploaded OK");
}

/* 2. insert product (FIXED STRUCTURE) */
log("Inserting product...");

let { error: dbError } = await sb.from("products").insert([{
    name: name.value,
    category: category.value,
    gsm: gsm.value,
    moq: moq.value,
    feature: feature.value,

    /* 🔥 FIX: unified structure */
    image: imageUrl,
    images: imageUrl ? [imageUrl] : []
}]);

if(dbError){
    log("❌ DB error: " + dbError.message);
    return;
}

log("✅ Product inserted successfully");

load();
}

/* ===================== */
/* LOAD PRODUCTS */
/* ===================== */

async function load(){

log("Loading products...");

let { data, error } = await sb.from("products").select("*");

if(error){
    log("❌ Load error: " + error.message);
    return;
}

log("Loaded: " + (data?.length || 0) + " items");

let html = "";

data.forEach(p=>{
html += `
<div class="item">
<b>${p.name || ""}</b><br>
${p.category || ""}<br>
<img src="${p.image || ""}" width="80">
</div>
`;
});

list.innerHTML = html;

}

</script>

</body>
</html>
