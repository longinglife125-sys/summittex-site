<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>V5 Admin - SummitTex</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

/* LOGIN */
#loginBox{
    max-width:320px;
    margin:100px auto;
    background:white;
    color:#0f172a;
    padding:25px;
    border-radius:14px;
    text-align:center;
}

input, textarea, select{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    margin-top:10px;
    padding:10px;
    width:100%;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* PANEL */
#panel{
    display:none;
    padding:20px;
}

.box{
    background:#111827;
    padding:20px;
    border-radius:12px;
    margin-top:20px;
}

.product{
    background:white;
    color:#0f172a;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.left{
    display:flex;
    align-items:center;
    gap:10px;
}

.preview{
    width:50px;
    height:50px;
    object-fit:cover;
    border-radius:8px;
}

.small{
    font-size:12px;
    color:#64748b;
}

.btn{
    padding:6px 10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.edit{ background:#f59e0b; color:white; }
.del{ background:#ef4444; color:white; }

.primary{
    background:#2563eb;
    color:white;
}

</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h2>Admin Login</h2>
<input type="password" id="pass" placeholder="Password">
<button class="primary" onclick="login()">Login</button>
</div>

<!-- PANEL -->
<div id="panel">

<h2>V5 Product Manager (Supabase)</h2>

<div class="box">

<input id="name" placeholder="Product Name">
<input id="category" placeholder="Category">
<input id="gsm" placeholder="GSM">
<input id="moq" placeholder="MOQ">
<textarea id="feature" placeholder="Feature"></textarea>

<!-- IMAGE UPLOAD -->
<input type="file" id="file">

<button class="primary" onclick="uploadAndSave()">Upload & Save Product</button>

</div>

<div class="box">
<h3>Product List</h3>
<div id="list"></div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

/* ===================== */
/* SUPABASE CONFIG */
/* ===================== */

https://tpcxaelljrudshchuzia.supabase.co/rest/v1/;
sb_publishable_c0xeymh6AnE-Ld7StbxpgA_YN3ig8qt;

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ===================== */
/* LOGIN */
/* ===================== */

const PASSWORD = "123456";

function login(){
    if(pass.value === PASSWORD){
        loginBox.style.display="none";
        panel.style.display="block";
        loadProducts();
    }else{
        alert("Wrong password");
    }
}

/* ===================== */
/* LOAD PRODUCTS */
/* ===================== */

async function loadProducts(){

let { data } = await sb.from("products").select("*");

render(data);
}

/* ===================== */
/* UPLOAD IMAGE + SAVE PRODUCT */
/* ===================== */

async function uploadAndSave(){

let file = document.getElementById("file").files[0];

let imageUrl = "";

if(file){

let fileName = Date.now() + "_" + file.name;

let { data, error } = await sb.storage
.from("images")
.upload(fileName, file);

imageUrl = SUPABASE_URL + "/storage/v1/object/public/images/" + fileName;
}

await sb.from("products").insert([{
    name: name.value,
    category: category.value,
    gsm: gsm.value,
    moq: moq.value,
    feature: feature.value,
    image: imageUrl
}]);

alert("Product saved!");

loadProducts();
clearForm();
}

/* ===================== */
/* DELETE */
/* ===================== */

async function del(id){
    await sb.from("products").delete().eq("id", id);
    loadProducts();
}

/* ===================== */
/* RENDER */
/* ===================== */

function render(products){

let html = "";

products.forEach(p=>{

html += `
<div class="product">
    <div class="left">
        <img src="${p.image}" class="preview">
        <div>
            <b>${p.name}</b><br>
            <span class="small">${p.category} | ${p.gsm}gsm</span>
        </div>
    </div>

    <button class="btn del" onclick="del(${p.id})">Del</button>
</div>
`;

});

list.innerHTML = html;

}

/* ===================== */
/* CLEAR FORM */
/* ===================== */

function clearForm(){
name.value="";
category.value="";
gsm.value="";
moq.value="";
feature.value="";
file.value="";
}

</script>

</body>
</html>
