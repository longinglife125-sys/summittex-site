<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>V20 企业后台系统</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

#loginBox{
    max-width:360px;
    margin:120px auto;
    background:white;
    color:black;
    padding:24px;
    border-radius:16px;
}

#panelBox{display:none;padding:20px;}

.box{
    background:#111827;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
}

input,select,textarea{
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.item{
    background:white;
    color:black;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<div id="loginBox">
<h3>管理员登录</h3>
<input type="password" id="pass">
<button onclick="login()">登录</button>
</div>

<div id="panelBox">

<div class="box">
<h3>上传产品</h3>

<input id="name" placeholder="name">

<select id="category">
<option>Outdoor</option>
<option>Sports</option>
<option>Workwear</option>
</select>

<input id="gsm" placeholder="gsm">
<input id="moq" placeholder="moq">
<textarea id="feature" placeholder="feature"></textarea>

<input type="file" id="file">

<button onclick="upload()">上传</button>
</div>

<div class="box">
<h3>产品列表</h3>
<button onclick="load()">刷新</button>
<div id="list"></div>
</div>

<div class="box">
<h3>CRM</h3>
<button onclick="loadCRM()">刷新</button>
<div id="crm"></div>
</div>

</div>

<script>

const supabaseUrl = "https://tpcxaelljrudshchuzia.supabase.co";
const supabaseKey = "sb_publishable_c0xeymh6AnE-Ld7StbxpgA_YN3ig8qt";
const sb = supabase.createClient(supabaseUrl, supabaseKey);

/* LOGIN */
function login(){
    if(document.getElementById("pass").value === "123456"){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("panelBox").style.display="block";
        load();
        loadCRM();
    }else{
        alert("密码错误");
    }
}

/* LOAD */
async function load(){
let { data } = await sb.from("products").select("*");

let html="";
(data||[]).forEach(p=>{
html+=`
<div class="item">
<b>${p.name}</b><br>
${p.category}<br>
${p.gsm || ""} ${p.moq || ""}
</div>`;
});

document.getElementById("list").innerHTML=html;
}

/* UPLOAD */
async function upload(){

let file=document.getElementById("file").files[0];
let url="";

if(file){
let name=Date.now()+"_"+file.name;
await sb.storage.from("images").upload(name,file);
url=supabaseUrl+"/storage/v1/object/public/images/"+name;
}

await sb.from("products").insert([{
name:document.getElementById("name").value,
category:document.getElementById("category").value,
gsm:document.getElementById("gsm").value,
moq:document.getElementById("moq").value,
feature:document.getElementById("feature").value,
image:url
}]);

load();
}

/* CRM */
async function loadCRM(){
let { data } = await sb.from("inquiries").select("*");

let html="";
(data||[]).forEach(c=>{
html+=`
<div class="item">
<b>${c.name}</b><br>
${c.product}<br>
${c.message}
</div>`;
});

document.getElementById("crm").innerHTML=html;
}

</script>

</body>
</html>
