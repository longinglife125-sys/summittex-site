<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>V18 Enterprise Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

#login{
    max-width:320px;
    margin:120px auto;
    background:white;
    color:black;
    padding:20px;
    border-radius:12px;
}

#panel{
    display:none;
    padding:20px;
}

.box{
    background:#111827;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

input,select,textarea{
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

.item{
    background:white;
    color:black;
    padding:10px;
    border-radius:8px;
    margin-top:8px;
}

</style>
</head>

<body>

<div id="login">
<h3>Admin Login</h3>
<input type="password" id="pass">
<button onclick="login()">Login</button>
</div>

<div id="panel">

<div class="box">
<h3>➕ Product Upload</h3>

<input id="name" placeholder="name">

<select id="category">
<option>Outdoor Functional Fabrics</option>
<option>Sports Fabrics</option>
<option>Recycled Fabrics</option>
<option>Workwear Fabrics</option>
<option>Fashion Fabrics</option>
<option>Others</option>
</select>

<input id="gsm" placeholder="gsm">
<input id="moq" placeholder="moq">
<textarea id="feature" placeholder="feature"></textarea>

<input type="file" id="file">

<button onclick="upload()">UPLOAD</button>
</div>

<div class="box">
<h3>📦 Products</h3>
<button onclick="load()">Refresh</button>
<div id="list"></div>
</div>

<div class="box">
<h3>📩 CRM Inquiries</h3>
<div id="crm"></div>
</div>

</div>

<script>

const SUPABASE_URL = "https://tpcxaelljrudshchuzia.supabase.co";
const SUPABASE_KEY = "sb_publishable_c0xeymh6AnE-Ld7StbxpgA_YN3ig8qt";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let products = [];

function login(){
    if(pass.value === "123456"){
        login.style.display="none";
        panel.style.display="block";
        load();
        loadCRM();
    }else{
        alert("wrong");
    }
}

/* PRODUCTS */
async function load(){
let { data } = await sb.from("products").select("*");
products = data || [];

let html = "";
products.forEach(p=>{
html += `<div class="item">
<b>${p.name}</b><br>
${p.category}
</div>`;
});

list.innerHTML = html;
}

/* UPLOAD */
async function upload(){

let file = document.getElementById("file").files[0];
let imageUrl = "";

if(file){
let fileName = Date.now() + file.name;
await sb.storage.from("images").upload(fileName,file);
imageUrl = SUPABASE_URL+"/storage/v1/object/public/images/"+fileName;
}

await sb.from("products").insert([{
name:name.value,
category:category.value,
gsm:gsm.value,
moq:moq.value,
feature:feature.value,
image:imageUrl
}]);

load();
}

/* CRM */
async function loadCRM(){
let { data } = await sb.from("inquiries").select("*");

let html = "";
(data||[]).forEach(c=>{
html += `<div class="item">
<b>${c.name}</b><br>
${c.product}<br>
${c.message}
</div>`;
});

crm.innerHTML = html;
}

</script>

</body>
</html>
