<script>

/* ===================== */
/* CONFIG SAFE MODE */
/* ===================== */

const SUPABASE_URL = "https://tpcxaelljrudshchuzia.supabase.co";
const SUPABASE_KEY = "sb_publishable_c0xeymh6AnE-Ld7StbxpgA_YN3ig8qt";

let sb = null;

try {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    console.log("Supabase init OK");
} catch (e) {
    console.error("Supabase init failed", e);
}

/* ===================== */
/* DOM */
/* ===================== */

const loginBox = document.getElementById("login");
const panelBox = document.getElementById("panel");

const pass = document.getElementById("pass");
const nameInput = document.getElementById("name");
const category = document.getElementById("category");
const gsm = document.getElementById("gsm");
const moq = document.getElementById("moq");
const feature = document.getElementById("feature");
const search = document.getElementById("search");
const logBox = document.getElementById("log");

/* ===================== */
/* STATE */
/* ===================== */

let products = [];
let editId = null;

/* ===================== */
/* LOG */
/* ===================== */

function log(msg){
    logBox.innerText += msg + "\n";
}

/* ===================== */
/* LOGIN */
/* ===================== */

function doLogin(){
    if(pass.value === "123456"){
        loginBox.style.display = "none";
        panelBox.style.display = "block";
        log("LOGIN SUCCESS");
        load();
    } else {
        alert("Wrong password");
    }
}

/* ===================== */
/* LOAD (FIXED + FALLBACK) */
/* ===================== */

async function load(){

log("Loading products...");

if(!sb){
    log("Supabase not initialized → using demo data");

    products = [
        {id:1,name:"Demo Fabric A",category:"Test",gsm:"120",moq:"1000",image:"https://images.unsplash.com/photo-1520975916090-3105956dac38"},
        {id:2,name:"Demo Fabric B",category:"Test",gsm:"150",moq:"800",image:"https://images.unsplash.com/photo-1517836357463-d25dfeac3438"}
    ];

    render();
    return;
}

try{

let { data, error } = await sb.from("products").select("*");

if(error){
    log("Load error: " + error.message);

    // fallback
    products = [];
    render();
    return;
}

products = data || [];
log("Loaded: " + products.length);

render();

}catch(e){
    log("Load failed: " + e.message);
}

}

/* ===================== */
/* UPLOAD */
/* ===================== */

async function upload(){

if(!sb){
    alert("Supabase not ready");
    return;
}

let file = document.getElementById("file").files[0];
let imageUrl = "";

try{

if(file){

    let fileName = Date.now() + "_" + file.name;

    let { error } = await sb.storage.from("images").upload(fileName, file);

    if(!error){
        imageUrl = SUPABASE_URL + "/storage/v1/object/public/images/" + fileName;
    } else {
        log(error.message);
    }
}

/* INSERT */
let { error } = await sb.from("products").insert([{
    name: nameInput.value,
    category: category.value,
    gsm: gsm.value,
    moq: moq.value,
    feature: feature.value,
    image: imageUrl,
    images: imageUrl ? [imageUrl] : []
}]);

if(error){
    log(error.message);
} else {
    log("INSERT OK");
}

clearForm();
load();

}catch(e){
    log(e.message);
}

}

/* ===================== */
/* RENDER */
/* ===================== */

function render(){

let key = search.value?.toLowerCase() || "";

let list = products.filter(p =>
    (p.name || "").toLowerCase().includes(key)
);

let html = "";

list.forEach(p=>{

html += `
<div class="item">

<div>
<b>${p.name || ""}</b><br>
<small>${p.category || ""}</small>
</div>

<img src="${p.image || ''}">

<div class="actions">
<button onclick="edit('${p.id}')">Edit</button>
<button onclick="del('${p.id}')">Del</button>
</div>

</div>
`;

});

document.getElementById("list").innerHTML = html;

}

/* ===================== */
/* EDIT */
/* ===================== */

function edit(id){

let p = products.find(x => x.id == id);
if(!p) return;

nameInput.value = p.name || "";
category.value = p.category || "";
gsm.value = p.gsm || "";
moq.value = p.moq || "";
feature.value = p.feature || "";

editId = id;

}

/* ===================== */
/* DELETE */
/* ===================== */

async function del(id){

if(!sb){
    alert("Supabase not ready");
    return;
}

await sb.from("products").delete().eq("id", id);
load();

}

/* ===================== */
/* CLEAR */
/* ===================== */

function clearForm(){
nameInput.value = "";
gsm.value = "";
moq.value = "";
feature.value = "";
document.getElementById("file").value = "";
}

</script>
