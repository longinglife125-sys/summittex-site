<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>V21 企业外贸后台系统</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

#loginBox{
    max-width:360px;
    margin:120px auto;
    background:white;
    color:black;
    padding:24px;
    border-radius:16px;
}

#panelBox{
    display:none;
    padding:20px;
}

.box{
    background:#111827;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
}

input,select,textarea{
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:8px;
    border:none;
    box-sizing:border-box;
}

select{
    background:white;
    color:black;
}

input,textarea{
    background:white;
    color:black;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.item{
    background:white;
    color:black;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<div id="loginBox">
<h3>管理员登录</h3>
<input type="password" id="pass">
<button id="loginBtn">登录</button>
<div style="font-size:12px;margin-top:10px;">密码：123456</div>
</div>

<div id="panelBox">

<div class="box">
<h3>📤 上传产品</h3>

<input id="name" placeholder="产品名称">

<!-- 分类改为下拉选择框 -->
<select id="category">
    <option value="">请选择分类</option>
    <option>Outdoor Functional Fabrics</option>
    <option>Sports & Activewear Fabrics</option>
    <option>Recycled & Sustainable Fabrics</option>
    <option>Stretch Fabrics</option>
    <option>Nylon & Polyester Fabrics</option>
    <option>Jacquard & Textured Fabrics</option>
    <option>Printed Fabrics</option>
    <option>Swimwear Fabrics</option>
    <option>Underwear Fabrics</option>
    <option>Workwear Fabrics</option>
    <option>Fashion Fabrics</option>
    <option>Others</option>
</select>

<input id="gsm" placeholder="GSM">
<input id="moq" placeholder="MOQ">
<textarea id="feature" placeholder="描述"></textarea>
<input type="file" id="file">

<button id="uploadBtn">上传产品</button>
</div>

<div class="box">
<h3>📦 产品列表</h3>
<button id="refreshBtn">刷新</button>
<div id="list"></div>
</div>

<div class="box">
<h3>📩 CRM</h3>
<button id="crmBtn">刷新</button>
<div id="crm"></div>
</div>

</div>

<script>

/* ===================== SAFE INIT ===================== */
const { createClient } = supabase;

const sb = createClient(
  "https://tpcxaelljrudshchuzia.supabase.co",
  "sb_publishable_c0xeymh6AnE-Ld7StbxpgA_YN3ig8qt"
);

/* ===================== LOGIN ===================== */
function login(){
    const pass = document.getElementById("pass").value;

    if(pass === "123456"){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("panelBox").style.display="block";
        load();
        loadCRM();
    }else{
        alert("密码错误");
    }
}

/* ===================== UPLOAD ===================== */
async function upload(){

try{

console.log("upload clicked");

const file = document.getElementById("file").files[0];
let url = "";

if(file){
    const fileName = Date.now()+"_"+file.name;

    const { error } = await sb.storage
      .from("images")
      .upload(fileName,file);

    if(!error){
        url = "https://tpcxaelljrudshchuzia.supabase.co/storage/v1/object/public/images/"+fileName;
    }
}

const { error: dbError } = await sb.from("products").insert([{
    name: document.getElementById("name").value,
    category: document.getElementById("category").value,
    gsm: document.getElementById("gsm").value,
    moq: document.getElementById("moq").value,
    feature: document.getElementById("feature").value,
    image: url
}]);

if(dbError){
    alert(dbError.message);
}else{
    alert("上传成功");
    load();
}

}catch(e){
    alert("系统错误："+e.message);
}

}

/* ===================== LOAD ===================== */
async function load(){

const { data } = await sb.from("products").select("*");

let html = "";

(data||[]).forEach(p=>{
html += `<div class="item">
<b>${p.name}</b><br>
${p.category}
</div>`;
});

document.getElementById("list").innerHTML = html;
}

/* ===================== CRM ===================== */
async function loadCRM(){

const { data } = await sb.from("inquiries").select("*");

let html = "";

(data||[]).forEach(c=>{
html += `<div class="item">
<b>${c.name}</b><br>
${c.product}<br>
${c.message}
</div>`;
});

document.getElementById("crm").innerHTML = html;
}

/* ===================== EVENTS ===================== */
document.getElementById("loginBtn").onclick = login;
document.getElementById("uploadBtn").onclick = upload;
document.getElementById("refreshBtn").onclick = load;
document.getElementById("crmBtn").onclick = loadCRM;

</script>

</body>
</html>
