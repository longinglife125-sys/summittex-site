<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { margin: 0; font-family: 'Inter', sans-serif; background: #0b1220; color: #eef2ff; }
#loginBox { max-width: 380px; margin: 120px auto; background: white; color: #0f172a; padding: 28px 24px; border-radius: 28px; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.35); }
#loginBox h3 { margin-bottom: 20px; font-size: 1.6rem; text-align: center; }
#loginBox input { width: 100%; padding: 14px 16px; margin-bottom: 16px; border-radius: 40px; border: 1px solid #cbd5e1; font-size: 1rem; outline: none; }
#loginBox button { width: 100%; background: #2563eb; border: none; padding: 12px; border-radius: 40px; font-weight: bold; font-size: 1rem; color: white; cursor: pointer; }
#panelBox { display: none; padding: 20px; max-width: 1600px; margin: 0 auto; }
.nav-tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; border-bottom: 1px solid #1f2a3e; padding-bottom: 12px; }
.nav-tab { background: transparent; border: none; padding: 12px 28px; border-radius: 40px; font-weight: 600; font-size: 14px; cursor: pointer; color: #94a3b8; transition: all 0.2s; }
.nav-tab:hover { color: #00bfff; background: #1e293b; }
.nav-tab.active { background: #00bfff; color: #0f172a; }
.box { background: #111827; border-radius: 20px; padding: 24px; margin-bottom: 24px; border: 1px solid #1f2a3e; }
.box h3 { font-size: 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; border-left: 4px solid #00bfff; padding-left: 14px; }
input, select, textarea { width: 100%; padding: 12px 14px; margin-bottom: 16px; border-radius: 12px; border: 1px solid #2d3a5e; background: #1e293b; color: #f1f5f9; font-size: 14px; outline: none; }
input:focus, select:focus, textarea:focus { border-color: #00bfff; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.tags-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
.tag { padding: 6px 16px; border: 1px solid #334155; border-radius: 30px; cursor: pointer; background: #1f2a3e; color: #cbd5e1; font-size: 12px; transition: all 0.2s; }
.tag:hover { border-color: #00bfff; }
.tag.active { background: #00bfff; color: #0f172a; border-color: #00bfff; }
.btn { padding: 10px 24px; background: #00bfff; color: #0f172a; border: none; border-radius: 40px; cursor: pointer; font-weight: 600; font-size: 13px; transition: all 0.2s; }
.btn:hover { background: #0099cc; transform: translateY(-1px); }
.btn-danger { background: #dc2626; color: white; }
.btn-warning { background: #f59e0b; color: white; }
.btn-outline { background: transparent; border: 1px solid #00bfff; color: #00bfff; }
.btn-sm { padding: 5px 12px; font-size: 11px; }
.upload-box, .video-upload-box { border: 2px dashed #4b5563; border-radius: 16px; padding: 20px; text-align: center; cursor: pointer; background: #1e293b; margin-bottom: 15px; transition: all 0.2s; }
.upload-box:hover, .video-upload-box:hover { border-color: #00bfff; background: #334155; }
.preview-img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; margin: 5px; }
.video-preview { width: 120px; border-radius: 8px; margin: 5px; }
.product-item { background: #1e293b; border-radius: 16px; padding: 16px; margin-bottom: 12px; }
.product-header { display: flex; justify-content: space-between; align-items: start; flex-wrap: wrap; margin-bottom: 10px; }
.product-name { font-weight: 700; font-size: 16px; color: #facc15; }
.product-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.product-details { font-size: 12px; color: #94a3b8; margin-top: 8px; display: flex; flex-wrap: wrap; gap: 16px; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; justify-content: center; align-items: center; }
.modal-content { background: #1e293b; border-radius: 24px; padding: 28px; width: 90%; max-width: 800px; max-height: 85vh; overflow-y: auto; }
.modal-buttons { display: flex; gap: 12px; margin-top: 20px; justify-content: flex-end; }
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 24px; }
.kpi-card { background: #1e293b; padding: 20px; border-radius: 16px; text-align: center; }
.kpi-number { font-size: 32px; font-weight: 800; color: #00bfff; }
.kpi-label { font-size: 13px; color: #94a3b8; margin-top: 6px; }
.section-title { font-size: 13px; font-weight: 600; margin: 16px 0 12px; color: #00bfff; text-transform: uppercase; letter-spacing: 1px; }
@media (max-width: 768px) { .row { grid-template-columns: 1fr; } .nav-tab { padding: 8px 16px; font-size: 12px; } }
</style>
</head>

<script>
const SUPABASE_URL = "https://tpcxaelljrudshchuzia.supabase.co";
const SUPABASE_KEY = "sb_publishable_c0xeymh6AnE-Ld7StbxpgA_YN3ig8qt";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const FEATURE_OPTS = ["Waterproof", "Stretch", "Breathable", "Thermal", "Embossed", "Perforated"];
const APP_OPTS = ["Wetsuit", "Sportswear", "Bags", "Medical", "Outdoor", "Footwear"];

let allCategories = [];
let currentEditFile = null;
let currentEditVideoFile = null;
let currentEditFeatures = [];
let currentEditApps = [];

// 预置分类数据
const PRESET_CATEGORIES = [
  { name: "Neoprene Fabric", parent_id: null, sort_order: 1 },
  { name: "Laminated Neoprene Fabric", parent_id: null, sort_order: 2 },
  { name: "Application Materials", parent_id: null, sort_order: 3 },
  { name: "Functional Fabric", parent_id: null, sort_order: 4 },

  { name: "Best Sellers", parent_id: null, sort_order: 7 },

  { name: "SCR Neoprene", parent_name: "Neoprene Fabric", sort_order: 2 },

  { name: "Lycra Lamination", parent_name: "Laminated Neoprene Fabric", sort_order: 3 },
  { name: "Jersey Lamination", parent_name: "Laminated Neoprene Fabric", sort_order: 4 },
  { name: "OK Fabric Lamination", parent_name: "Laminated Neoprene Fabric", sort_order: 5 },
  { name: "Mesh Lamination", parent_name: "Laminated Neoprene Fabric", sort_order: 6 },
  { name: "TPU Lamination", parent_name: "Laminated Neoprene Fabric", sort_order: 7 },
  { name: "Velvet Lamination", parent_name: "Laminated Neoprene Fabric", sort_order: 8 },
  { name: "Wetsuit Material", parent_name: "Application Materials", sort_order: 1 },
  { name: "Cup Sleeve Material", parent_name: "Application Materials", sort_order: 2 },
  { name: "Footwear Material", parent_name: "Application Materials", sort_order: 3 },
  { name: "Sports Support Material", parent_name: "Application Materials", sort_order: 4 },
  { name: "Bag Material", parent_name: "Application Materials", sort_order: 5 },
  { name: "Medical Support Material", parent_name: "Application Materials", sort_order: 6 },
  { name: "Fitness Product Material", parent_name: "Application Materials", sort_order: 7 },
  { name: "Waterproof", parent_name: "Functional Fabric", sort_order: 1 },
  { name: "Stretch", parent_name: "Functional Fabric", sort_order: 2 },
  { name: "Thermal Insulation", parent_name: "Functional Fabric", sort_order: 3 },
  { name: "Shock Absorption", parent_name: "Functional Fabric", sort_order: 4 },
  { name: "Breathable", parent_name: "Functional Fabric", sort_order: 5 },
  { name: "Embossed", parent_name: "Functional Fabric", sort_order: 6 },
  { name: "Printed", parent_name: "Functional Fabric", sort_order: 7 },
  { name: "Lycra Fabric", parent_name: "Surface Fabric Options", sort_order: 1 },
  { name: "T Fabric", parent_name: "Surface Fabric Options", sort_order: 2 },
  { name: "Jersey Fabric", parent_name: "Surface Fabric Options", sort_order: 3 },
  { name: "OK Fabric", parent_name: "Surface Fabric Options", sort_order: 4 },
  { name: "Mesh Fabric", parent_name: "Surface Fabric Options", sort_order: 5 },
  { name: "Satin Fabric", parent_name: "Surface Fabric Options", sort_order: 6 },
  { name: "Milk Silk Fabric", parent_name: "Surface Fabric Options", sort_order: 7 },
  { name: "Velvet Fabric", parent_name: "Surface Fabric Options", sort_order: 8 },
  { name: "Brushed Fabric", parent_name: "Surface Fabric Options", sort_order: 9 },
  { name: "Custom Thickness", parent_name: "OEM & Custom Solutions", sort_order: 1 },
  { name: "Custom Lamination", parent_name: "OEM & Custom Solutions", sort_order: 2 },
  { name: "Custom Color", parent_name: "OEM & Custom Solutions", sort_order: 3 },
  { name: "Sample Development", parent_name: "OEM & Custom Solutions", sort_order: 4 }
];

async function initPresetCategories() {
  const { data: existing, count } = await sb.from("categories").select("*", { count: "exact" });
  if (count > 0) return;
  const parentMap = {};
  for (let cat of PRESET_CATEGORIES.filter(c => !c.parent_name)) {
    const { data } = await sb.from("categories").insert([{ name: cat.name, parent_id: null, sort_order: cat.sort_order }]).select();
    if (data) parentMap[cat.name] = data[0].id;
  }
  for (let cat of PRESET_CATEGORIES.filter(c => c.parent_name)) {
    const parentId = parentMap[cat.parent_name];
    if (parentId) await sb.from("categories").insert([{ name: cat.name, parent_id: parentId, sort_order: cat.sort_order }]);
  }
  await loadCategories();
}

document.getElementById("loginBtn").onclick = async () => {
  if (document.getElementById("adminPass").value === "123456") {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("panelBox").style.display = "block";
    await initPresetCategories();
    await loadAllData();
  } else alert("密码错误");
};

document.querySelectorAll(".nav-tab").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".nav-tab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.querySelectorAll(".tab-content").forEach(t => t.style.display = "none");
    document.getElementById(`${btn.dataset.tab}Tab`).style.display = "block";
    if (btn.dataset.tab === "products") loadProducts();
    if (btn.dataset.tab === "categories") loadCategoriesTree();
    if (btn.dataset.tab === "crm") loadCRM();
    if (btn.dataset.tab === "factory") loadFactoryPhotos();
  };
});

async function loadAllData() {
  await loadCategories();
  await loadProducts();
  await loadStats();
  await loadCategoriesTree();
  await loadHomepageSettings();
  await loadFactoryPhotos();
  await loadCRM();
}

async function loadStats() {
  const { data: products } = await sb.from("products").select("*", { count: "exact" });
  const { data: categories } = await sb.from("categories").select("*", { count: "exact" });
  const { data: inquiries } = await sb.from("inquiries").select("*", { count: "exact" });
  document.getElementById("kpiProducts").innerText = products?.length || 0;
  document.getElementById("kpiCategories").innerText = categories?.length || 0;
  document.getElementById("kpiInquiries").innerText = inquiries?.length || 0;
  document.getElementById("kpiHot").innerText = (products || []).filter(p => p.is_hot).length || 0;
}

async function loadCategories() {
  const { data, error } = await sb.from("categories").select("*").order("sort_order");
  if (!error) allCategories = data || [];
  return allCategories;
}

async function loadCategoriesTree() {
  await loadCategories();
  const container = document.getElementById("categoriesTree");
  const parentSelect = document.getElementById("parentCatSelect");
  const topLevel = allCategories.filter(c => !c.parent_id);
  parentSelect.innerHTML = '<option value="">— 作为一级分类 —</option>' + allCategories.map(c => `<option value="${c.id}">${"——".repeat(c.level || 0)}${escapeHtml(c.name)}</option>`).join('');
  let html = '<table><thead><tr><th>分类名称</th><th>类型</th><th>排序</th><th>操作</th></tr></thead><tbody>';
  const renderTree = (items, level = 0) => {
    items.forEach(cat => {
      html += `<tr><td>${"&nbsp;&nbsp;".repeat(level)}📁 ${escapeHtml(cat.name)}</td><td>${cat.parent_id ? "子分类" : "一级分类"}</td><td><input type="number" value="${cat.sort_order || 0}" style="width:70px;" onchange="updateSortOrder(${cat.id}, this.value)"></td><td><button class="btn btn-sm btn-warning" onclick="editCategory(${cat.id}, '${escapeHtml(cat.name)}')">编辑</button> <button class="btn btn-sm btn-danger" onclick="deleteCategory(${cat.id})">删除</button></td></tr>`;
      const children = allCategories.filter(c => c.parent_id === cat.id);
      if (children.length) renderTree(children, level + 1);
    });
  };
  renderTree(topLevel);
  html += '</tbody></table>';
  container.innerHTML = html || "<div>暂无分类</div>";
}

async function updateSortOrder(id, val) { await sb.from("categories").update({ sort_order: parseInt(val) || 0 }).eq("id", id); loadCategoriesTree(); }
document.getElementById("addCategoryBtn").onclick = async () => {
  const name = document.getElementById("newCatName").value.trim();
  const parentId = document.getElementById("parentCatSelect").value;
  if (!name) { alert("请输入分类名称"); return; }
  const { error } = await sb.from("categories").insert([{ name, parent_id: parentId || null, sort_order: 0 }]);
  if (error) alert("添加失败: " + error.message);
  else { alert("✅ 添加成功"); document.getElementById("newCatName").value = ""; await loadCategoriesTree(); await loadCategories(); }
};
window.editCategory = async (id, oldName) => {
  const newName = prompt("修改分类名称:", oldName);
  if (newName && newName !== oldName) { await sb.from("categories").update({ name: newName }).eq("id", id); await loadCategoriesTree(); await loadCategories(); }
};
window.deleteCategory = async (id) => {
  const hasChildren = allCategories.some(c => c.parent_id === id);
  if (hasChildren) { alert("请先删除子分类"); return; }
  if (confirm("删除分类后，产品将变为未分类，确定删除？")) {
    await sb.from("products").update({ category_id: null }).eq("category_id", id);
    await sb.from("categories").delete().eq("id", id);
    await loadCategoriesTree(); await loadCategories(); await loadProducts();
  }
};

async function loadProducts() {
  const { data, error } = await sb.from("products").select("*, categories(name)").order("id", { ascending: false });
  if (error) { console.error(error); return; }
  let html = '';
  if (!data || data.length === 0) html = '<div style="padding:20px; text-align:center; color:#94a3b8;">暂无产品，点击“新增产品”添加</div>';
  else {
    data.forEach(p => {
      html += `<div class="product-item">
        <div class="product-header">
          <div><span class="product-name">${escapeHtml(p.name)}</span> ${p.is_hot ? '🔥' : ''}</div>
          <div class="product-actions">
            <button class="btn btn-sm btn-warning" onclick='openProductModal(${JSON.stringify(p).replace(/'/g, "&#39;")})'>✏️ 编辑</button>
            <button class="btn btn-sm btn-danger" onclick="deleteProduct(${p.id})">🗑️ 删除</button>
          </div>
        </div>
        <div class="product-details">
          <span>🔖 SKU: ${escapeHtml(p.sku || "未设置")}</span>
          <span>📁 ${escapeHtml(p.categories?.name || "未分类")}</span>
          <span>💰 ${escapeHtml(p.price || "询价")}</span>
          <span>📏 ${escapeHtml(p.thickness || "-")}mm</span>
          <span>📦 Min.Order: ${escapeHtml(p.moq || "联系")}</span>
          ${p.oem_level ? `<span>🔧 ${escapeHtml(p.oem_level)}</span>` : ''}
          ${p.video_url ? `<span>🎬 有视频</span>` : ''}
        </div>
      </div>`;
    });
  }
  document.getElementById("productsList").innerHTML = html;
}

document.getElementById("showAddProductBtn").onclick = () => openProductModal(null);
document.getElementById("refreshProductsBtn").onclick = loadProducts;
document.getElementById("cancelModalBtn").onclick = () => document.getElementById("productModal").style.display = "none";

async function loadCategoriesForSelect(selectedId) {
  const { data } = await sb.from("categories").select("*").order("sort_order");
  allCategories = data || [];
  const catSelect = document.getElementById("editCategoryId");
  const buildOptions = (items, level = 0) => {
    let html = '';
    items.forEach(cat => {
      html += `<option value="${cat.id}" ${selectedId == cat.id ? 'selected' : ''}>${"——".repeat(level)}${escapeHtml(cat.name)}</option>`;
      const children = allCategories.filter(c => c.parent_id === cat.id);
      if (children.length) html += buildOptions(children, level + 1);
    });
    return html;
  };
  const topLevel = allCategories.filter(c => !c.parent_id);
  catSelect.innerHTML = '<option value="">— 选择分类 —</option>' + buildOptions(topLevel);
}

function openProductModal(product) {
  const isEdit = product !== null;
  document.getElementById("modalTitle").innerText = isEdit ? "✏️ 编辑产品" : "➕ 新增产品";
  document.getElementById("editId").value = product?.id || "";
  document.getElementById("editName").value = product?.name || "";
  document.getElementById("editSku").value = product?.sku || "";
  document.getElementById("editPrice").value = product?.price || "";
  document.getElementById("editThickness").value = product?.thickness || "";
  document.getElementById("editGsm").value = product?.gsm || "";
  document.getElementById("editMoq").value = product?.moq || "";
  document.getElementById("editOemLevel").value = product?.oem_level || "";
  document.getElementById("editIsHot").checked = product?.is_hot || false;
  document.getElementById("editDesc").value = product?.description || "";
  document.getElementById("editVideoUrl").value = product?.video_url || "";
  
  loadCategoriesForSelect(product?.category_id || null);
  
  currentEditFeatures = product?.features || [];
  currentEditApps = product?.applications || [];
  renderEditTags();
  
  document.getElementById("editPreviewArea").innerHTML = product?.image ? `<img src="${product.image}" class="preview-img">` : "";
  document.getElementById("videoPreviewArea").innerHTML = product?.video_url ? (product.video_url.includes('mp4') ? `<video src="${product.video_url}" class="video-preview" controls style="width:120px;"></video>` : `<a href="${product.video_url}" target="_blank">📹 查看视频</a>`) : "";
  
  currentEditFile = null;
  currentEditVideoFile = null;
  document.getElementById("productModal").style.display = "flex";
}

function renderEditTags() {
  const featuresHtml = FEATURE_OPTS.map(opt => `<span class="tag ${currentEditFeatures.includes(opt) ? 'active' : ''}" data-val="${opt}">${opt}</span>`).join('');
  const appsHtml = APP_OPTS.map(opt => `<span class="tag ${currentEditApps.includes(opt) ? 'active' : ''}" data-val="${opt}">${opt}</span>`).join('');
  document.getElementById("editFeaturesTags").innerHTML = featuresHtml;
  document.getElementById("editAppsTags").innerHTML = appsHtml;
  document.querySelectorAll("#editFeaturesTags .tag").forEach(t => {
    t.onclick = () => { t.classList.toggle("active"); const val = t.dataset.val; if (currentEditFeatures.includes(val)) currentEditFeatures = currentEditFeatures.filter(v => v !== val); else currentEditFeatures.push(val); };
  });
  document.querySelectorAll("#editAppsTags .tag").forEach(t => {
    t.onclick = () => { t.classList.toggle("active"); const val = t.dataset.val; if (currentEditApps.includes(val)) currentEditApps = currentEditApps.filter(v => v !== val); else currentEditApps.push(val); };
  });
}

document.getElementById("editUploadBox").onclick = () => document.getElementById("editFile").click();
document.getElementById("editFile").onchange = (e) => { if (e.target.files[0]) { currentEditFile = e.target.files[0]; const reader = new FileReader(); reader.onload = (ev) => document.getElementById("editPreviewArea").innerHTML = `<img src="${ev.target.result}" class="preview-img">`; reader.readAsDataURL(currentEditFile); } };

document.getElementById("videoUploadBox").onclick = () => document.getElementById("videoFile").click();
document.getElementById("videoFile").onchange = (e) => { if (e.target.files[0]) { currentEditVideoFile = e.target.files[0]; document.getElementById("videoPreviewArea").innerHTML = `<video src="${URL.createObjectURL(currentEditVideoFile)}" class="video-preview" controls style="width:120px;"></video>`; } };

document.getElementById("saveProductBtn").onclick = async () => {
  const name = document.getElementById("editName").value.trim();
  if (!name) { alert("请填写产品名称"); return; }
  const id = document.getElementById("editId").value;
  let imageUrl = "";
  let videoUrl = document.getElementById("editVideoUrl").value;
  
  if (currentEditFile) {
    const fn = "products/" + Date.now() + "_" + currentEditFile.name.replace(/[^a-zA-Z0-9.-]/g, '_');
    await sb.storage.from("images").upload(fn, currentEditFile);
    const { data } = sb.storage.from("images").getPublicUrl(fn);
    imageUrl = data.publicUrl;
  }
  if (currentEditVideoFile) {
    const fn = "videos/" + Date.now() + "_" + currentEditVideoFile.name.replace(/[^a-zA-Z0-9.-]/g, '_');
    await sb.storage.from("images").upload(fn, currentEditVideoFile);
    const { data } = sb.storage.from("images").getPublicUrl(fn);
    videoUrl = data.publicUrl;
  }
  
  const productData = {
    name: name,
    sku: document.getElementById("editSku").value || null,
    category_id: document.getElementById("editCategoryId").value || null,
    price: document.getElementById("editPrice").value,
    thickness: document.getElementById("editThickness").value,
    gsm: document.getElementById("editGsm").value,
    moq: document.getElementById("editMoq").value,
    oem_level: document.getElementById("editOemLevel").value || null,
    is_hot: document.getElementById("editIsHot").checked,
    features: currentEditFeatures,
    applications: currentEditApps,
    description: document.getElementById("editDesc").value,
    video_url: videoUrl || null,
    ...(imageUrl && { image: imageUrl })
  };
  let error;
  if (id) error = (await sb.from("products").update(productData).eq("id", id)).error;
  else error = (await sb.from("products").insert([productData])).error;
  if (error) alert("保存失败: " + error.message);
  else { alert("✅ 保存成功"); document.getElementById("productModal").style.display = "none"; loadProducts(); }
};

window.deleteProduct = async (id) => { if (confirm("确定删除？")) { await sb.from("products").delete().eq("id", id); loadProducts(); } };

async function loadHomepageSettings() {
  const { data } = await sb.from("site_settings").select("*");
  const settings = data || [];
  document.getElementById("heroTitle").value = settings.find(s => s.key === "hero_title")?.value || "OEM / ODM | Custom Lamination | Global Supply";
  document.getElementById("heroSubtitle").value = settings.find(s => s.key === "hero_subtitle")?.value || "Custom neoprene and composite fabrics for wetsuits, sportswear, bags, and industrial gear.";
  document.getElementById("companyFullName").value = settings.find(s => s.key === "company_name")?.value || "Dongguan Siyin Sports Goods Co., Ltd.";
  document.getElementById("contactEmail").value = settings.find(s => s.key === "contact_email")?.value || "sales@siyin.com";
  document.getElementById("contactPhone").value = settings.find(s => s.key === "contact_phone")?.value || "+86 138 0000 0000";
  document.getElementById("contactWhatsapp").value = settings.find(s => s.key === "contact_whatsapp")?.value || "+86 138 0000 0000";
}

document.getElementById("saveHomepageBtn").onclick = async () => {
  const settings = [
    { key: "hero_title", value: document.getElementById("heroTitle").value },
    { key: "hero_subtitle", value: document.getElementById("heroSubtitle").value },
    { key: "company_name", value: document.getElementById("companyFullName").value },
    { key: "contact_email", value: document.getElementById("contactEmail").value },
    { key: "contact_phone", value: document.getElementById("contactPhone").value },
    { key: "contact_whatsapp", value: document.getElementById("contactWhatsapp").value }
  ];
  for (let s of settings) await sb.from("site_settings").upsert({ key: s.key, value: s.value }, { onConflict: "key" });
  alert("✅ 已保存");
};

let currentFactoryFile = null;
document.getElementById("factoryUploadBox").onclick = () => document.getElementById("factoryFile").click();
document.getElementById("factoryFile").onchange = (e) => { if (e.target.files[0]) { currentFactoryFile = e.target.files[0]; const reader = new FileReader(); reader.onload = (ev) => document.getElementById("factoryPreview").innerHTML = `<img src="${ev.target.result}" class="preview-img">`; reader.readAsDataURL(currentFactoryFile); } };
document.getElementById("addFactoryBtn").onclick = async () => {
  if (!currentFactoryFile) { alert("请选择图片"); return; }
  const fn = "factory/" + Date.now() + "_" + currentFactoryFile.name;
  await sb.storage.from("images").upload(fn, currentFactoryFile);
  const { data } = sb.storage.from("images").getPublicUrl(fn);
  await sb.from("factory_photos").insert([{ image_url: data.publicUrl, title: document.getElementById("factoryTitle").value, category: document.getElementById("factoryCategory").value, sort_order: parseInt(document.getElementById("factoryOrder").value) || 0 }]);
  alert("添加成功"); location.reload();
};
async function loadFactoryPhotos() {
  const { data } = await sb.from("factory_photos").select("*").order("sort_order");
  const container = document.getElementById("factoryList");
  container.innerHTML = (data || []).map(p => `<div><img src="${p.image_url}" style="width:100px;border-radius:8px;"><div>${p.title || "照片"}</div><button class="btn btn-sm btn-danger" onclick="deleteFactoryPhoto(${p.id})">删除</button></div>`).join('');
}
window.deleteFactoryPhoto = async (id) => { if (confirm("删除？")) { await sb.from("factory_photos").delete().eq("id", id); loadFactoryPhotos(); } };

async function loadCRM() {
  const { data } = await sb.from("inquiries").select("*").order("created_at", { ascending: false });
  document.getElementById("crmList").innerHTML = (data || []).map(c => `<div class="product-item"><div><b>${escapeHtml(c.name)}</b> | ${escapeHtml(c.email || "")}</div><div>📌 ${escapeHtml(c.product || "未指定")}</div><div>💬 ${escapeHtml(c.message || "")}</div><div style="font-size:11px; color:#64748b;">${new Date(c.created_at).toLocaleString()}</div></div>`).join("") || "<div>暂无询盘</div>";
}
document.getElementById("refreshCrmBtn").onclick = loadCRM;

function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]); }

loadCategories();
</script>
