<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>SummitTex 后台管理系统</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; }
body { margin:0; font-family:Arial; background:#0b1220; color:white; }
#loginBox { max-width:360px; margin:120px auto; background:white; color:black; padding:24px; border-radius:16px; }
#panelBox { display:none; padding:20px; }
.box { background:#111827; padding:15px; border-radius:12px; margin-bottom:15px; }
h3 { margin-bottom: 15px; color: #e2e8f0; }
.tab-buttons { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.tab-btn { flex:1; background:#1e293b; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer; font-size:14px; }
.tab-btn.active { background:#2563eb; }
.tab-content { display: none; }
.tab-content.active { display: block; }
input,select,textarea { width:100%; padding:10px; margin-top:8px; margin-bottom:8px; border-radius:8px; border:none; background:#1f2a3e; color:white; }
button { padding:12px; margin-top:10px; background:#2563eb; color:white; border:none; border-radius:10px; cursor:pointer; }
button:hover { background:#1d4ed8; }
.item { background:white; color:black; padding:10px; border-radius:10px; margin-top:10px; }
.item-img { max-width:50px; max-height:50px; border-radius:5px; margin:2px; }
.item-actions { display: flex; gap: 10px; margin-top: 10px; justify-content: flex-end; }
.edit-btn, .delete-btn { padding:6px 12px; font-size:12px; width:auto; margin-top:0; border-radius:6px; cursor:pointer; }
.edit-btn { background:#f59e0b; color:white; border:none; }
.delete-btn { background:#dc2626; color:white; border:none; }
.upload-box { border:2px dashed #4b5563; border-radius:12px; padding:20px; text-align:center; margin:10px 0; cursor:pointer; background:#1e293b; }
.upload-box:hover { border-color:#2563eb; background:#334155; }
.preview-img { width:80px; height:80px; object-fit:cover; border-radius:8px; margin:5px; }
.preview-video { width:200px; border-radius:8px; margin-top:10px; }
.media-item { background:#1e293b; border-radius:8px; padding:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
.media-img { width:60px; height:60px; object-fit:cover; border-radius:8px; }
.video-hint { font-size:11px; color:#94a3b8; margin-top:5px; }
.existing-img-item { position:relative; width:70px; height:70px; border-radius:8px; overflow:hidden; border:1px solid #4b5563; display:inline-block; margin:5px; }
.existing-img-item img { width:100%; height:100%; object-fit:cover; }
.existing-img-remove { position:absolute; top:2px; right:2px; background:rgba(220,38,38,0.9); color:white; border:none; border-radius:50%; width:18px; height:18px; font-size:10px; cursor:pointer; }

.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; justify-content:center; align-items:center; }
.modal-content { background:#1e293b; border-radius:16px; padding:24px; width:90%; max-width:600px; max-height:85vh; overflow-y:auto; }
.modal-content h3 { margin-bottom:20px; }
.modal-buttons { display:flex; gap:10px; margin-top:20px; }
.modal-buttons button { flex:1; margin-top:0; }
</style>
</head>

<body>

<div id="loginBox">
<h3>管理员登录</h3>
<input type="password" id="pass" placeholder="请输入密码">
<button id="loginBtn">登录</button>
<div style="font-size:12px;margin-top:10px;text-align:center;">密码：123456</div>
</div>

<div id="panelBox">

<div class="tab-buttons">
    <button class="tab-btn active" data-tab="products">📦 产品管理</button>
    <button class="tab-btn" data-tab="slides">🖼️ 轮播图管理</button>
    <button class="tab-btn" data-tab="factory">🏭 工厂管理</button>
</div>

<!-- 产品管理 -->
<div id="productsTab" class="tab-content active">
    <div class="box">
        <h3>📤 上传产品</h3>
        <input id="name" placeholder="产品名称">
        <select id="category">
            <option>Outdoor Functional Fabrics</option>
            <option>Sports & Activewear Fabrics</option>
            <option>Recycled & Sustainable Fabrics</option>
            <option>Stretch Fabrics</option>
            <option>Nylon & Polyester Fabrics</option>
            <option>Others</option>
        </select>
        <input id="gsm" placeholder="GSM">
        <input id="moq" placeholder="MOQ">
        <textarea id="feature" placeholder="产品描述"></textarea>
        <div class="upload-box" id="productUploadBox">📸 点击选择产品图片（可多选）</div>
        <input type="file" id="productFile" multiple accept="image/*" style="display:none">
        <div id="productPreviewContainer" style="display:flex; flex-wrap:wrap; gap:5px; margin-top:10px;"></div>
        <input id="videoUrl" placeholder="视频链接 (YouTube)">
        <input type="file" id="videoFile" accept="video/mp4">
        <button id="uploadBtn">上传产品</button>
    </div>
    <div class="box">
        <h3>📦 产品列表</h3>
        <button id="refreshBtn">刷新</button>
        <div id="productList"></div>
    </div>
</div>

<!-- 轮播图管理 -->
<div id="slidesTab" class="tab-content">
    <div class="box">
        <h3>🖼️ 轮播图管理</h3>
        <div class="upload-box" id="slideUploadBox">📸 点击选择轮播图图片</div>
        <input type="file" id="slideFile" accept="image/*" style="display:none">
        <div id="slidePreview"></div>
        <input type="text" id="slideTitle" placeholder="图片标题">
        <input type="number" id="slideOrder" placeholder="排序" value="0">
        <button id="addSlideBtn">添加轮播图</button>
        <div id="slidesList" style="margin-top:20px;"></div>
    </div>
</div>

<!-- 工厂管理 -->
<div id="factoryTab" class="tab-content">
    <div class="box">
        <h3>🏭 工厂照片管理</h3>
        <div style="margin-bottom:20px;">
            <h4>➕ 添加工厂照片</h4>
            <div class="upload-box" id="factoryUploadBox">📸 点击选择照片</div>
            <input type="file" id="factoryFile" accept="image/*" style="display:none">
            <div id="factoryPreview"></div>
            <input type="text" id="factoryTitle" placeholder="照片标题">
            <select id="factoryCategory">
                <option value="facility">工厂设施</option>
                <option value="production">生产线</option>
            </select>
            <input type="number" id="factoryOrder" placeholder="排序" value="0">
            <button id="addFactoryBtn">添加工厂照片</button>
        </div>
        <div id="factoryList"></div>
    </div>
    <div class="box">
        <h3>📜 证书管理</h3>
        <div style="margin-bottom:20px;">
            <div class="upload-box" id="certUploadBox">📸 点击选择证书图片</div>
            <input type="file" id="certFile" accept="image/*" style="display:none">
            <div id="certPreview"></div>
            <input type="text" id="certName" placeholder="证书名称">
            <input type="number" id="certOrder" placeholder="排序" value="0">
            <button id="addCertBtn">添加证书</button>
        </div>
        <div id="certList"></div>
    </div>
    <div class="box">
        <h3>⚙️ 工厂设置</h3>
        <div class="upload-box" id="videoUploadBox">📹 点击上传 MP4 视频</div>
        <input type="file" id="videoFileUpload" accept="video/mp4,video/webm" style="display:none">
        <div id="videoPreviewArea"></div>
        <input type="text" id="factoryVideoUrl" placeholder="或粘贴 YouTube 链接">
        <input type="text" id="factoryName" placeholder="工厂标题">
        <textarea id="factoryDesc" placeholder="工厂描述" rows="2"></textarea>
        <button id="saveSettingsBtn">保存设置</button>
        <div id="settingsStatus" style="margin-top:10px; font-size:12px;"></div>
    </div>
</div>

</div>

<!-- 编辑产品模态框（支持图片增删） -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>✏️ 编辑产品</h3>
        <input type="hidden" id="editId">
        <input type="text" id="editName" placeholder="产品名称">
        <select id="editCategory">
            <option>Outdoor Functional Fabrics</option>
            <option>Sports & Activewear Fabrics</option>
            <option>Recycled & Sustainable Fabrics</option>
            <option>Stretch Fabrics</option>
            <option>Nylon & Polyester Fabrics</option>
            <option>Others</option>
        </select>
        <input type="text" id="editGsm" placeholder="GSM">
        <input type="text" id="editMoq" placeholder="MOQ">
        <textarea id="editFeature" placeholder="产品描述" rows="3"></textarea>
        <input type="text" id="editVideoUrl" placeholder="视频链接">
        
        <div class="section-title" style="margin-top:15px;">🖼️ 现有图片（点击 × 删除）</div>
        <div id="existingImagesContainer" style="display:flex; flex-wrap:wrap; gap:8px; margin:10px 0; padding:10px; background:#0f1722; border-radius:8px;"></div>
        
        <div class="section-title">➕ 添加新图片</div>
        <div class="upload-box" id="editUploadBox" style="padding:12px;">📸 点击选择新图片（可多选）</div>
        <input type="file" id="editFileInput" multiple accept="image/*" style="display:none">
        <div id="editPreviewContainer" style="display:flex; flex-wrap:wrap; gap:5px; margin-top:10px;"></div>
        
        <div class="modal-buttons">
            <button id="saveEditBtn" style="background:#f59e0b;">保存修改</button>
            <button id="cancelEditBtn" style="background:#6c757d;">取消</button>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL = "https://tpcxaelljrudshchuzia.supabase.co";
const SUPABASE_KEY = "sb_publishable_c0xeymh6AnE-Ld7StbxpgA_YN3ig8qt";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 全局变量
let currentSlideFile = null;
let currentFactoryFile = null;
let currentCertFile = null;
let currentVideoFile = null;
let currentEditImages = [];      // 保留的旧图片URL数组
let currentNewImages = [];       // 新上传的图片文件数组
let editingProductId = null;

// ========== 产品上传图片预览 ==========
let productFiles = [];
document.getElementById("productUploadBox").onclick = () => document.getElementById("productFile").click();
document.getElementById("productFile").onchange = (e) => {
    productFiles = Array.from(e.target.files);
    let container = document.getElementById("productPreviewContainer");
    container.innerHTML = "";
    productFiles.forEach((f, idx) => {
        let reader = new FileReader();
        reader.onload = (ev) => { container.innerHTML += `<div class="preview-img" style="position:relative;"><img src="${ev.target.result}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;"><button onclick="removeProductFile(${idx})" style="position:absolute;top:-5px;right:-5px;background:red;border-radius:50%;width:20px;height:20px;font-size:12px;">×</button></div>`; };
        reader.readAsDataURL(f);
    });
};
function removeProductFile(idx) { productFiles.splice(idx,1); document.getElementById("productFile").value = ""; location.reload(); }

// ========== 登录 ==========
document.getElementById("loginBtn").onclick = function() {
    let pass = document.getElementById("pass").value;
    if (pass === "123456") {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("panelBox").style.display = "block";
        loadProducts();
        loadSlides();
        loadFactoryPhotos();
        loadCertificates();
        loadFactorySettings();
    } else { alert("密码错误"); }
};
document.getElementById("pass").addEventListener("keypress", (e) => { if (e.key === "Enter") document.getElementById("loginBtn").click(); });

// 标签页切换
document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.onclick = function() {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        this.classList.add("active");
        let tab = this.dataset.tab;
        document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
        if (tab === "products") document.getElementById("productsTab").classList.add("active");
        if (tab === "slides") { document.getElementById("slidesTab").classList.add("active"); loadSlides(); }
        if (tab === "factory") { document.getElementById("factoryTab").classList.add("active"); loadFactoryPhotos(); loadCertificates(); loadFactorySettings(); }
    };
});

// ========== 上传产品 ==========
document.getElementById("uploadBtn").onclick = async function() {
    let name = document.getElementById("name").value;
    if (!name) { alert("请输入产品名称"); return; }
    let btn = document.getElementById("uploadBtn");
    btn.disabled = true; btn.innerText = "上传中...";
    let imageUrls = [];
    for (let f of productFiles) {
        let fn = Date.now() + "_" + f.name.replace(/[^a-zA-Z0-9.-]/g, '_');
        let { error } = await sb.storage.from("images").upload(fn, f);
        if (!error) { let { data } = sb.storage.from("images").getPublicUrl(fn); imageUrls.push(data.publicUrl); }
    }
    let videoUrl = document.getElementById("videoUrl").value;
    let videoFile = document.getElementById("videoFile").files[0];
    if (videoFile) {
        let fn = Date.now() + "_video_" + videoFile.name;
        let { error } = await sb.storage.from("images").upload(fn, videoFile);
        if (!error) { let { data } = sb.storage.from("images").getPublicUrl(fn); videoUrl = data.publicUrl; }
    }
    let { error } = await sb.from("products").insert([{ name, category: document.getElementById("category").value, gsm: document.getElementById("gsm").value, moq: document.getElementById("moq").value, feature: document.getElementById("feature").value, image: imageUrls[0] || "", images: imageUrls, video_url: videoUrl }]);
    if (error) alert("失败：" + error.message);
    else { alert("✅ 上传成功！图片：" + imageUrls.length + "张"); location.reload(); }
    btn.disabled = false; btn.innerText = "上传产品";
};

// ========== 加载产品列表（显示图片数量） ==========
async function loadProducts() {
    let { data } = await sb.from("products").select("*").order("id", { ascending: false });
    let html = "";
    (data || []).forEach(p => {
        let imgCount = (p.images && p.images.length) || (p.image ? 1 : 0);
        let preview = "";
        if (p.images && p.images.length) { preview = p.images.slice(0,2).map(img => `<img src="${img}" class="item-img">`).join(''); if (p.images.length > 2) preview += `<span style="font-size:10px;"> +${p.images.length-2}</span>`; }
        else if (p.image) preview = `<img src="${p.image}" class="item-img">`;
        let safeName = (p.name || "").replace(/'/g, "\\'");
        html += `<div class="item">
            <b>${p.name}</b> <span style="font-size:11px; color:#666;">(${imgCount}张图片)</span><br>
            📁 ${p.category}<br>⚖️ ${p.gsm || "-"} | 📦 ${p.moq || "-"}<br>
            <div>${preview}</div>
            <div class="item-actions">
                <button class="edit-btn" onclick='openEditModal(${p.id}, "${safeName}", "${(p.category||"").replace(/'/g,"\\'")}", "${(p.gsm||"").replace(/'/g,"\\'")}", "${(p.moq||"").replace(/'/g,"\\'")}", "${(p.feature||"").replace(/'/g,"\\'")}", "${(p.video_url||"").replace(/'/g,"\\'")}", ${JSON.stringify(p.images || [])})'>✏️ 编辑</button>
                <button class="delete-btn" onclick="deleteProduct(${p.id})">🗑️ 删除</button>
            </div>
        </div>`;
    });
    document.getElementById("productList").innerHTML = html || "<div>暂无产品</div>";
}

// ========== 打开编辑弹窗 ==========
function openEditModal(id, name, category, gsm, moq, feature, videoUrl, imagesArr) {
    editingProductId = id;
    currentEditImages = imagesArr || [];
    currentNewImages = [];
    
    document.getElementById("editId").value = id;
    document.getElementById("editName").value = name;
    document.getElementById("editCategory").value = category;
    document.getElementById("editGsm").value = gsm;
    document.getElementById("editMoq").value = moq;
    document.getElementById("editFeature").value = feature;
    document.getElementById("editVideoUrl").value = videoUrl;
    
    renderExistingImages();
    renderEditPreview();
    document.getElementById("editModal").style.display = "flex";
}

function renderExistingImages() {
    let container = document.getElementById("existingImagesContainer");
    if (!currentEditImages.length) { container.innerHTML = '<div style="color:#94a3b8;">暂无图片</div>'; return; }
    container.innerHTML = currentEditImages.map((img, idx) => `
        <div class="existing-img-item">
            <img src="${img}" onerror="this.src='https://placehold.co/70x70'">
            <button class="existing-img-remove" onclick="removeExistingImage(${idx})">×</button>
        </div>
    `).join('');
}

function removeExistingImage(index) {
    currentEditImages.splice(index, 1);
    renderExistingImages();
}

// 编辑页面上传新图片
document.getElementById("editUploadBox").onclick = () => document.getElementById("editFileInput").click();
document.getElementById("editFileInput").onchange = (e) => {
    let files = Array.from(e.target.files);
    for (let f of files) { if (f.size <= 10*1024*1024) currentNewImages.push(f); else alert(`${f.name} 超过10MB`); }
    renderEditPreview();
};
function removeNewImage(index) { currentNewImages.splice(index,1); renderEditPreview(); }
function renderEditPreview() {
    let container = document.getElementById("editPreviewContainer");
    container.innerHTML = "";
    currentNewImages.forEach((f, idx) => {
        let reader = new FileReader();
        reader.onload = (ev) => { container.innerHTML += `<div class="preview-img" style="position:relative;"><img src="${ev.target.result}" style="width:70px;height:70px;object-fit:cover;border-radius:8px;"><button onclick="removeNewImage(${idx})" style="position:absolute;top:-5px;right:-5px;background:red;border-radius:50%;width:18px;height:18px;">×</button></div>`; };
        reader.readAsDataURL(f);
    });
}

// ========== 保存编辑（支持图片增删） ==========
async function saveEdit() {
    let id = editingProductId;
    // 上传新图片
    let newImageUrls = [];
    for (let f of currentNewImages) {
        let fn = Date.now() + "_edit_" + f.name.replace(/[^a-zA-Z0-9.-]/g, '_');
        let { error } = await sb.storage.from("images").upload(fn, f);
        if (!error) { let { data } = sb.storage.from("images").getPublicUrl(fn); newImageUrls.push(data.publicUrl); }
    }
    let allImages = [...currentEditImages, ...newImageUrls];
    let updateData = {
        name: document.getElementById("editName").value,
        category: document.getElementById("editCategory").value,
        gsm: document.getElementById("editGsm").value,
        moq: document.getElementById("editMoq").value,
        feature: document.getElementById("editFeature").value,
        video_url: document.getElementById("editVideoUrl").value,
        image: allImages[0] || "",
        images: allImages
    };
    let { error } = await sb.from("products").update(updateData).eq("id", id);
    if (error) alert("编辑失败：" + error.message);
    else { alert("✅ 产品已更新"); document.getElementById("editModal").style.display = "none"; loadProducts(); }
}

async function deleteProduct(id) { if (confirm("确定删除？")) { await sb.from("products").delete().eq("id", id); loadProducts(); } }

document.getElementById("saveEditBtn").onclick = saveEdit;
document.getElementById("cancelEditBtn").onclick = () => document.getElementById("editModal").style.display = "none";
window.onclick = function(e) { if (e.target === document.getElementById("editModal")) document.getElementById("editModal").style.display = "none"; };

// ========== 轮播图管理 ==========
document.getElementById("slideUploadBox").onclick = () => document.getElementById("slideFile").click();
document.getElementById("slideFile").onchange = (e) => { if (e.target.files[0]) { currentSlideFile = e.target.files[0]; let reader = new FileReader(); reader.onload = (ev) => document.getElementById("slidePreview").innerHTML = `<img src="${ev.target.result}" class="preview-img">`; reader.readAsDataURL(currentSlideFile); } };
document.getElementById("addSlideBtn").onclick = async function() {
    if (!currentSlideFile) { alert("请先选择图片"); return; }
    let fileName = "slides/" + Date.now() + "_" + currentSlideFile.name;
    let { error: uploadError } = await sb.storage.from("images").upload(fileName, currentSlideFile);
    if (uploadError) { alert("上传失败：" + uploadError.message); return; }
    let { data } = sb.storage.from("images").getPublicUrl(fileName);
    let title = document.getElementById("slideTitle").value;
    let order = parseInt(document.getElementById("slideOrder").value) || 0;
    let { error } = await sb.from("home_slides").insert([{ image_url: data.publicUrl, title: title, sort_order: order, is_active: true }]);
    if (error) alert("失败：" + error.message);
    else { alert("添加成功"); currentSlideFile = null; document.getElementById("slideFile").value = ""; document.getElementById("slidePreview").innerHTML = ""; document.getElementById("slideTitle").value = ""; document.getElementById("slideOrder").value = "0"; loadSlides(); }
};
async function loadSlides() {
    let { data } = await sb.from("home_slides").select("*").order("sort_order");
    let html = "";
    (data || []).forEach(s => { html += `<div class="media-item"><img src="${s.image_url}" class="media-img"><div>${s.title || "无标题"}</div><button onclick="deleteSlide(${s.id})" style="background:#dc2626;">删除</button></div>`; });
    document.getElementById("slidesList").innerHTML = html || "<div>暂无轮播图</div>";
}
async function deleteSlide(id) { if (confirm("删除？")) { await sb.from("home_slides").delete().eq("id", id); loadSlides(); } }

// ========== 工厂照片、证书、设置（简化版） ==========
document.getElementById("factoryUploadBox").onclick = () => document.getElementById("factoryFile").click();
document.getElementById("factoryFile").onchange = (e) => { if (e.target.files[0]) { currentFactoryFile = e.target.files[0]; let reader = new FileReader(); reader.onload = (ev) => document.getElementById("factoryPreview").innerHTML = `<img src="${ev.target.result}" class="preview-img">`; reader.readAsDataURL(currentFactoryFile); } };
document.getElementById("addFactoryBtn").onclick = async function() {
    if (!currentFactoryFile) { alert("请选择图片"); return; }
    let fn = "factory/" + Date.now() + "_" + currentFactoryFile.name;
    await sb.storage.from("images").upload(fn, currentFactoryFile);
    let { data } = sb.storage.from("images").getPublicUrl(fn);
    await sb.from("factory_photos").insert([{ image_url: data.publicUrl, title: document.getElementById("factoryTitle").value, category: document.getElementById("factoryCategory").value, sort_order: parseInt(document.getElementById("factoryOrder").value) || 0 }]);
    alert("添加成功"); location.reload();
};
async function loadFactoryPhotos() {
    let { data } = await sb.from("factory_photos").select("*").order("sort_order");
    let html = ""; (data || []).forEach(p => { html += `<div class="media-item"><img src="${p.image_url}" class="media-img"><div>${p.title || "照片"}</div><button onclick="deleteFactoryPhoto(${p.id})" style="background:#dc2626;">删除</button></div>`; });
    document.getElementById("factoryList").innerHTML = html || "<div>暂无</div>";
}
async function deleteFactoryPhoto(id) { if (confirm("删除？")) { await sb.from("factory_photos").delete().eq("id", id); loadFactoryPhotos(); } }

document.getElementById("certUploadBox").onclick = () => document.getElementById("certFile").click();
document.getElementById("certFile").onchange = (e) => { if (e.target.files[0]) { currentCertFile = e.target.files[0]; let reader = new FileReader(); reader.onload = (ev) => document.getElementById("certPreview").innerHTML = `<img src="${ev.target.result}" class="preview-img">`; reader.readAsDataURL(currentCertFile); } };
document.getElementById("addCertBtn").onclick = async function() {
    if (!currentCertFile) { alert("请选择图片"); return; }
    let fn = "certs/" + Date.now() + "_" + currentCertFile.name;
    await sb.storage.from("images").upload(fn, currentCertFile);
    let { data } = sb.storage.from("images").getPublicUrl(fn);
    await sb.from("factory_certificates").insert([{ image_url: data.publicUrl, name: document.getElementById("certName").value, sort_order: parseInt(document.getElementById("certOrder").value) || 0 }]);
    alert("添加成功"); location.reload();
};
async function loadCertificates() {
    let { data } = await sb.from("factory_certificates").select("*").order("sort_order");
    let html = ""; (data || []).forEach(c => { html += `<div class="media-item"><img src="${c.image_url}" class="media-img"><div>${c.name || "证书"}</div><button onclick="deleteCertificate(${c.id})" style="background:#dc2626;">删除</button></div>`; });
    document.getElementById("certList").innerHTML = html || "<div>暂无</div>";
}
async function deleteCertificate(id) { if (confirm("删除？")) { await sb.from("factory_certificates").delete().eq("id", id); loadCertificates(); } }

document.getElementById("videoUploadBox").onclick = () => document.getElementById("videoFileUpload").click();
document.getElementById("videoFileUpload").onchange = (e) => { if (e.target.files[0]) { currentVideoFile = e.target.files[0]; let url = URL.createObjectURL(currentVideoFile); document.getElementById("videoPreviewArea").innerHTML = `<video src="${url}" controls style="max-width:200px; border-radius:8px;"></video><button onclick="clearVideoFile()">取消</button>`; } };
function clearVideoFile() { currentVideoFile = null; document.getElementById("videoFileUpload").value = ""; document.getElementById("videoPreviewArea").innerHTML = ""; }
async function loadFactorySettings() {
    let { data } = await sb.from("factory_settings").select("*");
    let s = {}; (data || []).forEach(i => s[i.setting_key] = i.setting_value);
    document.getElementById("factoryVideoUrl").value = s.factory_video_url || "";
    document.getElementById("factoryName").value = s.factory_name || "Our Factory";
    document.getElementById("factoryDesc").value = s.factory_description || "";
}
document.getElementById("saveSettingsBtn").onclick = async function() {
    let videoUrl = document.getElementById("factoryVideoUrl").value;
    if (currentVideoFile) {
        let fn = "video/" + Date.now() + "_" + currentVideoFile.name;
        await sb.storage.from("images").upload(fn, currentVideoFile);
        let { data } = sb.storage.from("images").getPublicUrl(fn);
        videoUrl = data.publicUrl;
    }
    await sb.from("factory_settings").upsert({ setting_key: "factory_video_url", setting_value: videoUrl }, { onConflict: "setting_key" });
    await sb.from("factory_settings").upsert({ setting_key: "factory_name", setting_value: document.getElementById("factoryName").value }, { onConflict: "setting_key" });
    await sb.from("factory_settings").upsert({ setting_key: "factory_description", setting_value: document.getElementById("factoryDesc").value }, { onConflict: "setting_key" });
    alert("设置已保存"); location.reload();
};

window.openEditModal = openEditModal;
window.deleteProduct = deleteProduct;
window.deleteSlide = deleteSlide;
window.deleteFactoryPhoto = deleteFactoryPhoto;
window.deleteCertificate = deleteCertificate;
window.removeNewImage = removeNewImage;
window.removeExistingImage = removeExistingImage;
window.clearVideoFile = clearVideoFile;
window.removeProductFile = removeProductFile;
</script>

</body>
</html>
