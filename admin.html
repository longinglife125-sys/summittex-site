<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>SummitTex 后台管理系统</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; }
body { margin:0; font-family:Arial; background:#0b1220; color:white; }
#loginBox { max-width:360px; margin:120px auto; background:white; color:black; padding:24px; border-radius:16px; }
#panelBox { display:none; padding:20px; }
.box { background:#111827; padding:15px; border-radius:12px; margin-bottom:15px; }
h3 { margin-bottom: 15px; color: #e2e8f0; }
.tab-buttons { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.tab-btn { flex:1; background:#1e293b; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer; font-size:14px; }
.tab-btn.active { background:#2563eb; }
.tab-content { display: none; }
.tab-content.active { display: block; }
input,select,textarea { width:100%; padding:10px; margin-top:8px; margin-bottom:8px; border-radius:8px; border:none; background:#1f2a3e; color:white; }
button { padding:12px; margin-top:10px; background:#2563eb; color:white; border:none; border-radius:10px; cursor:pointer; }
button:hover { background:#1d4ed8; }
.item { background:white; color:black; padding:10px; border-radius:10px; margin-top:10px; }
.item-img { max-width:50px; max-height:50px; border-radius:5px; margin:2px; }
.edit-btn, .delete-btn { padding:6px 12px; font-size:12px; width:auto; margin-top:0; border-radius:6px; }
.edit-btn { background:#f59e0b; }
.delete-btn { background:#dc2626; }
.upload-box { border:2px dashed #4b5563; border-radius:12px; padding:20px; text-align:center; margin:10px 0; cursor:pointer; background:#1e293b; }
.upload-box:hover { border-color:#2563eb; background:#334155; }
.preview-img { width:80px; height:80px; object-fit:cover; border-radius:8px; margin-top:10px; }
.preview-video { width:200px; border-radius:8px; margin-top:10px; }
.media-item { background:#1e293b; border-radius:8px; padding:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
.media-img { width:60px; height:60px; object-fit:cover; border-radius:8px; }
.video-hint { font-size:11px; color:#94a3b8; margin-top:5px; }
</style>
</head>

<body>

<div id="loginBox">
<h3>管理员登录</h3>
<input type="password" id="pass" placeholder="请输入密码">
<button id="loginBtn">登录</button>
<div style="font-size:12px;margin-top:10px;text-align:center;">密码：123456</div>
</div>

<div id="panelBox">

<div class="tab-buttons">
    <button class="tab-btn active" data-tab="products">📦 产品管理</button>
    <button class="tab-btn" data-tab="slides">🖼️ 轮播图管理</button>
    <button class="tab-btn" data-tab="factory">🏭 工厂管理</button>
</div>

<!-- 产品管理 -->
<div id="productsTab" class="tab-content active">
    <div class="box">
        <h3>📤 上传产品</h3>
        <input id="name" placeholder="产品名称">
        <select id="category">
            <option>Outdoor Functional Fabrics</option>
            <option>Sports & Activewear Fabrics</option>
            <option>Recycled & Sustainable Fabrics</option>
            <option>Stretch Fabrics</option>
            <option>Nylon & Polyester Fabrics</option>
            <option>Others</option>
        </select>
        <input id="gsm" placeholder="GSM">
        <input id="moq" placeholder="MOQ">
        <textarea id="feature" placeholder="产品描述"></textarea>
        <input type="file" id="productImage" accept="image/*">
        <input id="videoUrl" placeholder="视频链接 (YouTube)">
        <button id="uploadBtn">上传产品</button>
    </div>
    <div class="box">
        <h3>📦 产品列表</h3>
        <button id="refreshBtn">刷新</button>
        <div id="productList"></div>
    </div>
</div>

<!-- 轮播图管理 -->
<div id="slidesTab" class="tab-content">
    <div class="box">
        <h3>🖼️ 轮播图管理</h3>
        <div class="upload-box" id="slideUploadBox">📸 点击选择轮播图图片</div>
        <input type="file" id="slideFile" accept="image/*" style="display:none">
        <div id="slidePreview"></div>
        <input type="text" id="slideTitle" placeholder="图片标题">
        <input type="number" id="slideOrder" placeholder="排序" value="0">
        <button id="addSlideBtn">添加轮播图</button>
        <div id="slidesList" style="margin-top:20px;"></div>
    </div>
</div>

<!-- 工厂管理 -->
<div id="factoryTab" class="tab-content">
    <div class="box">
        <h3>🏭 工厂照片管理</h3>
        <div style="margin-bottom:20px;">
            <h4>➕ 添加工厂照片</h4>
            <div class="upload-box" id="factoryUploadBox">📸 点击选择照片</div>
            <input type="file" id="factoryFile" accept="image/*" style="display:none">
            <div id="factoryPreview"></div>
            <input type="text" id="factoryTitle" placeholder="照片标题（如：织造车间）">
            <select id="factoryCategory">
                <option value="facility">工厂设施</option>
                <option value="production">生产线</option>
            </select>
            <input type="number" id="factoryOrder" placeholder="排序" value="0">
            <button id="addFactoryBtn">添加工厂照片</button>
        </div>
        <h4>📋 工厂照片列表</h4>
        <div id="factoryList"></div>
    </div>
    <div class="box">
        <h3>📜 证书管理</h3>
        <div style="margin-bottom:20px;">
            <h4>➕ 添加证书</h4>
            <div class="upload-box" id="certUploadBox">📸 点击选择证书图片</div>
            <input type="file" id="certFile" accept="image/*" style="display:none">
            <div id="certPreview"></div>
            <input type="text" id="certName" placeholder="证书名称（如：OEKO-TEX®）">
            <input type="number" id="certOrder" placeholder="排序" value="0">
            <button id="addCertBtn">添加证书</button>
        </div>
        <h4>📋 证书列表</h4>
        <div id="certList"></div>
    </div>
    <div class="box">
        <h3>⚙️ 工厂设置</h3>
        
        <div style="margin-bottom:15px;">
            <label>📹 工厂视频（二选一）</label>
            <div class="upload-box" id="videoUploadBox">📹 点击上传 MP4 视频文件（本地上传）</div>
            <input type="file" id="videoFileUpload" accept="video/mp4,video/webm" style="display:none">
            <div id="videoPreviewArea"></div>
            <div class="video-hint">或</div>
            <input type="text" id="factoryVideoUrl" placeholder="粘贴 YouTube/Vimeo 链接">
            <div class="video-hint">💡 支持 YouTube: https://youtu.be/xxxxx 或 https://www.youtube.com/embed/xxxxx</div>
        </div>
        
        <label>🏭 工厂页面标题</label>
        <input type="text" id="factoryName" placeholder="Our Factory">
        
        <label>📝 工厂描述</label>
        <textarea id="factoryDesc" placeholder="描述文字" rows="2"></textarea>
        
        <button id="saveSettingsBtn">保存设置</button>
        <div id="settingsStatus" style="margin-top:10px; font-size:12px; color:#4ade80;"></div>
    </div>
</div>

</div>

<script>
const SUPABASE_URL = "https://tpcxaelljrudshchuzia.supabase.co";
const SUPABASE_KEY = "sb_publishable_c0xeymh6AnE-Ld7StbxpgA_YN3ig8qt";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 当前选择的文件
let currentSlideFile = null;
let currentFactoryFile = null;
let currentCertFile = null;
let currentVideoFile = null;

// ========== 登录 ==========
document.getElementById("loginBtn").onclick = function() {
    let pass = document.getElementById("pass").value;
    if (pass === "123456") {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("panelBox").style.display = "block";
        loadProducts();
        loadSlides();
        loadFactoryPhotos();
        loadCertificates();
        loadFactorySettings();
    } else { alert("密码错误"); }
};
document.getElementById("pass").addEventListener("keypress", (e) => { if (e.key === "Enter") document.getElementById("loginBtn").click(); });

// 标签页切换
document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.onclick = function() {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        this.classList.add("active");
        let tab = this.dataset.tab;
        document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
        if (tab === "products") document.getElementById("productsTab").classList.add("active");
        if (tab === "slides") { document.getElementById("slidesTab").classList.add("active"); loadSlides(); }
        if (tab === "factory") { document.getElementById("factoryTab").classList.add("active"); loadFactoryPhotos(); loadCertificates(); loadFactorySettings(); }
    };
});

// ========== 产品管理 ==========
document.getElementById("uploadBtn").onclick = async function() {
    let name = document.getElementById("name").value;
    if (!name) { alert("请输入产品名称"); return; }
    let imageUrl = "";
    let imageFile = document.getElementById("productImage").files[0];
    if (imageFile) {
        let fileName = Date.now() + "_" + imageFile.name;
        let { error } = await sb.storage.from("images").upload(fileName, imageFile);
        if (!error) { let { data } = sb.storage.from("images").getPublicUrl(fileName); imageUrl = data.publicUrl; }
    }
    let videoUrl = document.getElementById("videoUrl").value;
    let { error } = await sb.from("products").insert([{ name, category: document.getElementById("category").value, gsm: document.getElementById("gsm").value, moq: document.getElementById("moq").value, feature: document.getElementById("feature").value, image: imageUrl, video_url: videoUrl }]);
    if (error) alert("失败：" + error.message);
    else { alert("上传成功"); location.reload(); }
};
async function loadProducts() {
    let { data } = await sb.from("products").select("*").order("id", { ascending: false });
    let html = "";
    (data || []).forEach(p => {
        html += `<div class="item"><b>${p.name}</b><br>📁 ${p.category}<br>⚖️ ${p.gsm || "-"} | 📦 ${p.moq || "-"}<br>${p.image ? `<img src="${p.image}" class="item-img">` : ""}
        <div style="margin-top:10px;"><button class="edit-btn" onclick='editProduct(${p.id}, "${p.name}", "${p.category || ""}", "${p.gsm || ""}", "${p.moq || ""}", "${(p.feature || "").replace(/'/g, "\\'")}", "${p.video_url || ""}")'>✏️ 编辑</button>
        <button class="delete-btn" onclick="deleteProduct(${p.id})">🗑️ 删除</button></div></div>`;
    });
    document.getElementById("productList").innerHTML = html || "<div>暂无产品</div>";
}
function editProduct(id, name, category, gsm, moq, feature, videoUrl) {
    let modal = document.getElementById("editModal");
    if (!modal) {
        let div = document.createElement("div");
        div.id = "editModal";
        div.className = "modal";
        div.innerHTML = `<div class="modal-content"><h3>编辑产品</h3><input type="hidden" id="editId"><input type="text" id="editName" placeholder="产品名称"><select id="editCategory"><option>Outdoor Functional Fabrics</option><option>Sports & Activewear Fabrics</option><option>Recycled & Sustainable Fabrics</option><option>Stretch Fabrics</option><option>Others</option></select><input type="text" id="editGsm" placeholder="GSM"><input type="text" id="editMoq" placeholder="MOQ"><textarea id="editFeature" placeholder="产品描述"></textarea><input type="text" id="editVideoUrl" placeholder="视频链接"><div class="modal-buttons"><button id="saveEditBtn">保存</button><button id="cancelEditBtn">取消</button></div></div>`;
        document.body.appendChild(div);
        document.getElementById("saveEditBtn").onclick = saveEdit;
        document.getElementById("cancelEditBtn").onclick = () => document.getElementById("editModal").style.display = "none";
    }
    document.getElementById("editId").value = id;
    document.getElementById("editName").value = name;
    document.getElementById("editCategory").value = category;
    document.getElementById("editGsm").value = gsm;
    document.getElementById("editMoq").value = moq;
    document.getElementById("editFeature").value = feature;
    document.getElementById("editVideoUrl").value = videoUrl;
    document.getElementById("editModal").style.display = "flex";
}
async function saveEdit() {
    let id = document.getElementById("editId").value;
    let { error } = await sb.from("products").update({ name: document.getElementById("editName").value, category: document.getElementById("editCategory").value, gsm: document.getElementById("editGsm").value, moq: document.getElementById("editMoq").value, feature: document.getElementById("editFeature").value, video_url: document.getElementById("editVideoUrl").value }).eq("id", id);
    if (error) alert("失败：" + error.message);
    else { alert("已更新"); document.getElementById("editModal").style.display = "none"; loadProducts(); }
}
async function deleteProduct(id) { if (confirm("确定删除？")) { await sb.from("products").delete().eq("id", id); loadProducts(); } }

// ========== 轮播图管理 ==========
document.getElementById("slideUploadBox").onclick = () => document.getElementById("slideFile").click();
document.getElementById("slideFile").onchange = (e) => { if (e.target.files[0]) { currentSlideFile = e.target.files[0]; let reader = new FileReader(); reader.onload = (ev) => document.getElementById("slidePreview").innerHTML = `<img src="${ev.target.result}" class="preview-img">`; reader.readAsDataURL(currentSlideFile); } };
document.getElementById("addSlideBtn").onclick = async function() {
    if (!currentSlideFile) { alert("请先选择图片"); return; }
    let fileName = "slides/" + Date.now() + "_" + currentSlideFile.name;
    let { error: uploadError } = await sb.storage.from("images").upload(fileName, currentSlideFile);
    if (uploadError) { alert("上传失败：" + uploadError.message); return; }
    let { data } = sb.storage.from("images").getPublicUrl(fileName);
    let title = document.getElementById("slideTitle").value;
    let order = parseInt(document.getElementById("slideOrder").value) || 0;
    let { error } = await sb.from("home_slides").insert([{ image_url: data.publicUrl, title: title, sort_order: order, is_active: true }]);
    if (error) alert("失败：" + error.message);
    else { alert("添加成功"); currentSlideFile = null; document.getElementById("slideFile").value = ""; document.getElementById("slidePreview").innerHTML = ""; document.getElementById("slideTitle").value = ""; document.getElementById("slideOrder").value = "0"; loadSlides(); }
};
async function loadSlides() {
    let { data } = await sb.from("home_slides").select("*").order("sort_order");
    let html = "";
    (data || []).forEach(s => { html += `<div class="media-item"><img src="${s.image_url}" class="media-img"><div>${s.title || "无标题"}</div><button onclick="deleteSlide(${s.id})" style="background:#dc2626;padding:4px 12px;">删除</button></div>`; });
    document.getElementById("slidesList").innerHTML = html || "<div>暂无轮播图</div>";
}
async function deleteSlide(id) { if (confirm("删除这张轮播图？")) { await sb.from("home_slides").delete().eq("id", id); loadSlides(); } }

// ========== 工厂照片管理 ==========
document.getElementById("factoryUploadBox").onclick = () => document.getElementById("factoryFile").click();
document.getElementById("factoryFile").onchange = (e) => { if (e.target.files[0]) { currentFactoryFile = e.target.files[0]; let reader = new FileReader(); reader.onload = (ev) => document.getElementById("factoryPreview").innerHTML = `<img src="${ev.target.result}" class="preview-img">`; reader.readAsDataURL(currentFactoryFile); } };
document.getElementById("addFactoryBtn").onclick = async function() {
    if (!currentFactoryFile) { alert("请先选择图片"); return; }
    let fileName = "factory/" + Date.now() + "_" + currentFactoryFile.name;
    let { error: uploadError } = await sb.storage.from("images").upload(fileName, currentFactoryFile);
    if (uploadError) { alert("上传失败：" + uploadError.message); return; }
    let { data } = sb.storage.from("images").getPublicUrl(fileName);
    let title = document.getElementById("factoryTitle").value;
    let category = document.getElementById("factoryCategory").value;
    let order = parseInt(document.getElementById("factoryOrder").value) || 0;
    let { error } = await sb.from("factory_photos").insert([{ image_url: data.publicUrl, title: title, category: category, sort_order: order, is_active: true }]);
    if (error) alert("失败：" + error.message);
    else { alert("添加成功"); currentFactoryFile = null; document.getElementById("factoryFile").value = ""; document.getElementById("factoryPreview").innerHTML = ""; document.getElementById("factoryTitle").value = ""; document.getElementById("factoryOrder").value = "0"; loadFactoryPhotos(); }
};
async function loadFactoryPhotos() {
    let { data } = await sb.from("factory_photos").select("*").order("sort_order");
    let html = "";
    (data || []).forEach(p => { html += `<div class="media-item"><img src="${p.image_url}" class="media-img"><div><b>${p.title || "无标题"}</b><br><small>${p.category || "未分类"}</small></div><button onclick="deleteFactoryPhoto(${p.id})" style="background:#dc2626;padding:4px 12px;">删除</button></div>`; });
    document.getElementById("factoryList").innerHTML = html || "<div>暂无工厂照片</div>";
}
async function deleteFactoryPhoto(id) { if (confirm("删除这张照片？")) { await sb.from("factory_photos").delete().eq("id", id); loadFactoryPhotos(); } }

// ========== 证书管理 ==========
document.getElementById("certUploadBox").onclick = () => document.getElementById("certFile").click();
document.getElementById("certFile").onchange = (e) => { if (e.target.files[0]) { currentCertFile = e.target.files[0]; let reader = new FileReader(); reader.onload = (ev) => document.getElementById("certPreview").innerHTML = `<img src="${ev.target.result}" class="preview-img">`; reader.readAsDataURL(currentCertFile); } };
document.getElementById("addCertBtn").onclick = async function() {
    if (!currentCertFile) { alert("请先选择图片"); return; }
    let fileName = "certificates/" + Date.now() + "_" + currentCertFile.name;
    let { error: uploadError } = await sb.storage.from("images").upload(fileName, currentCertFile);
    if (uploadError) { alert("上传失败：" + uploadError.message); return; }
    let { data } = sb.storage.from("images").getPublicUrl(fileName);
    let name = document.getElementById("certName").value;
    let order = parseInt(document.getElementById("certOrder").value) || 0;
    let { error } = await sb.from("factory_certificates").insert([{ image_url: data.publicUrl, name: name, sort_order: order, is_active: true }]);
    if (error) alert("失败：" + error.message);
    else { alert("添加成功"); currentCertFile = null; document.getElementById("certFile").value = ""; document.getElementById("certPreview").innerHTML = ""; document.getElementById("certName").value = ""; document.getElementById("certOrder").value = "0"; loadCertificates(); }
};
async function loadCertificates() {
    let { data } = await sb.from("factory_certificates").select("*").order("sort_order");
    let html = "";
    (data || []).forEach(c => { html += `<div class="media-item"><img src="${c.image_url}" class="media-img"><div>${c.name || "证书"}</div><button onclick="deleteCertificate(${c.id})" style="background:#dc2626;padding:4px 12px;">删除</button></div>`; });
    document.getElementById("certList").innerHTML = html || "<div>暂无证书</div>";
}
async function deleteCertificate(id) { if (confirm("删除这张证书？")) { await sb.from("factory_certificates").delete().eq("id", id); loadCertificates(); } }

// ========== 工厂视频上传（本地上传MP4） ==========
document.getElementById("videoUploadBox").onclick = () => document.getElementById("videoFileUpload").click();
document.getElementById("videoFileUpload").onchange = (e) => {
    if (e.target.files[0]) {
        currentVideoFile = e.target.files[0];
        let videoURL = URL.createObjectURL(currentVideoFile);
        document.getElementById("videoPreviewArea").innerHTML = `
            <video src="${videoURL}" controls class="preview-video" style="max-width:100%; max-height:150px; border-radius:8px; margin-top:10px;"></video>
            <button onclick="clearVideoFile()" style="padding:4px 8px; font-size:12px; margin-left:10px;">取消选择</button>
            <div style="font-size:12px; color:#4ade80; margin-top:5px;">✅ 已选择: ${currentVideoFile.name}</div>
        `;
    }
};
function clearVideoFile() {
    currentVideoFile = null;
    document.getElementById("videoFileUpload").value = "";
    document.getElementById("videoPreviewArea").innerHTML = "";
}

// ========== 工厂设置加载与保存 ==========
async function loadFactorySettings() {
    let { data } = await sb.from("factory_settings").select("*");
    let settings = {};
    (data || []).forEach(s => { settings[s.setting_key] = s.setting_value; });
    document.getElementById("factoryVideoUrl").value = settings.factory_video_url || "";
    document.getElementById("factoryName").value = settings.factory_name || "Our Factory";
    document.getElementById("factoryDesc").value = settings.factory_description || "Professional Functional Fabric Manufacturing Facility in China";
}
document.getElementById("saveSettingsBtn").onclick = async function() {
    let statusDiv = document.getElementById("settingsStatus");
    statusDiv.innerHTML = "⏳ 保存中...";
    
    let videoUrl = document.getElementById("factoryVideoUrl").value.trim();
    
    // 如果上传了本地视频文件
    if (currentVideoFile) {
        statusDiv.innerHTML = "⏳ 上传视频中...";
        let fileName = "factory_video/" + Date.now() + "_" + currentVideoFile.name;
        let { error: uploadError } = await sb.storage.from("images").upload(fileName, currentVideoFile);
        if (uploadError) {
            statusDiv.innerHTML = "❌ 视频上传失败：" + uploadError.message;
            return;
        }
        let { data } = sb.storage.from("images").getPublicUrl(fileName);
        videoUrl = data.publicUrl;
        statusDiv.innerHTML = "✅ 视频上传成功，保存设置中...";
    }
    
    // 保存设置
    let updates = [
        { setting_key: "factory_video_url", setting_value: videoUrl },
        { setting_key: "factory_name", setting_value: document.getElementById("factoryName").value },
        { setting_key: "factory_description", setting_value: document.getElementById("factoryDesc").value }
    ];
    
    let allSuccess = true;
    for (let item of updates) {
        let { error } = await sb.from("factory_settings").upsert(item, { onConflict: "setting_key" });
        if (error) { allSuccess = false; statusDiv.innerHTML = "❌ 保存失败：" + error.message; break; }
    }
    
    if (allSuccess) {
        statusDiv.innerHTML = "✅ 所有设置已保存！";
        currentVideoFile = null;
        document.getElementById("videoFileUpload").value = "";
        document.getElementById("videoPreviewArea").innerHTML = "";
        setTimeout(() => { statusDiv.innerHTML = ""; }, 3000);
    }
};

// 暴露全局函数
window.editProduct = editProduct;
window.deleteProduct = deleteProduct;
window.deleteSlide = deleteSlide;
window.deleteFactoryPhoto = deleteFactoryPhoto;
window.deleteCertificate = deleteCertificate;
window.clearVideoFile = clearVideoFile;
</script>

</body>
</html>
