<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>SummitTex 后台管理系统</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* {
    box-sizing: border-box;
}

body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

#loginBox{
    max-width:360px;
    margin:120px auto;
    background:white;
    color:black;
    padding:24px;
    border-radius:16px;
}

#panelBox{
    display:none;
    padding:20px;
}

.box{
    background:#111827;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
}

h3 {
    margin-bottom: 15px;
    color: #e2e8f0;
}

.tab-buttons {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.tab-btn {
    flex: 1;
    background: #1e293b;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
}

.tab-btn.active {
    background: #2563eb;
}

.tab-content {
    display: none;
}

.tab-content.active {
    display: block;
}

input,select,textarea{
    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:8px;
    border-radius:8px;
    border:none;
    box-sizing:border-box;
    background:#1f2a3e;
    color:white;
}

input::placeholder, textarea::placeholder {
    color: #9ca3af;
}

select {
    background: #1f2a3e;
    color: white;
}

select option {
    background: #1f2a3e;
    color: white;
}

button{
    padding:12px;
    margin-top:10px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.item{
    background:white;
    color:black;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
    position:relative;
}

.item-img{
    max-width:50px;
    max-height:50px;
    border-radius:5px;
    margin:2px;
    object-fit:cover;
}

.item-actions {
    display: flex;
    gap: 10px;
    margin-top: 10px;
    justify-content: flex-end;
}

.edit-btn, .delete-btn {
    padding: 6px 12px;
    font-size: 12px;
    width: auto;
    margin-top: 0;
    border-radius: 6px;
}

.edit-btn {
    background: #f59e0b;
}

.edit-btn:hover {
    background: #d97706;
}

.delete-btn {
    background: #dc2626;
}

.delete-btn:hover {
    background: #b91c1c;
}

.hint {
    font-size: 11px;
    color: #9ca3af;
    margin-top: 5px;
}

.section-title {
    margin-top: 15px;
    margin-bottom: 5px;
    font-size: 13px;
    color: #9ca3af;
    border-left: 3px solid #2563eb;
    padding-left: 8px;
}

.drop-area {
    border: 2px dashed #4b5563;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    margin-top: 10px;
    cursor: pointer;
    transition: all 0.2s;
    background: #1e293b;
}

.drop-area:hover {
    border-color: #2563eb;
    background: #334155;
}

.drop-area.dragover {
    border-color: #2563eb;
    background: #1e3a5f;
}

.preview-container {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 15px;
}

.preview-item {
    position: relative;
    width: 80px;
    height: 80px;
    border-radius: 8px;
    overflow: hidden;
    background: #1e293b;
    border: 1px solid #4b5563;
}

.preview-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.remove-btn {
    position: absolute;
    top: 2px;
    right: 2px;
    background: rgba(220,38,38,0.8);
    color: white;
    border: none;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

.img-count {
    font-size: 12px;
    color: #4ade80;
    margin-top: 5px;
}

.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #1e293b;
    border-radius: 16px;
    padding: 24px;
    width: 90%;
    max-width: 500px;
    max-height: 85vh;
    overflow-y: auto;
}

.modal-content h3 {
    margin-bottom: 20px;
}

.modal-buttons {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}

.modal-buttons button {
    flex: 1;
    margin-top: 0;
}

.slide-item {
    background: #1e293b;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.slide-img {
    width: 60px;
    height: 60px;
    object-fit: cover;
    border-radius: 8px;
}

.slide-info {
    flex: 1;
    margin-left: 12px;
}

.slide-title {
    font-weight: bold;
    margin-bottom: 4px;
}

.slide-url {
    font-size: 10px;
    color: #94a3b8;
    word-break: break-all;
}

.slide-actions {
    display: flex;
    gap: 8px;
}

.slide-actions button {
    padding: 4px 8px;
    font-size: 11px;
    margin: 0;
}

.slide-form {
    background: #0f1722;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
}

.slide-form input {
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div id="loginBox">
<h3>管理员登录</h3>
<input type="password" id="pass" placeholder="请输入密码">
<button id="loginBtn">登录</button>
<div style="font-size:12px;margin-top:10px;text-align:center;">密码：123456</div>
</div>

<div id="panelBox">

<!-- 标签页切换 -->
<div class="tab-buttons">
    <button class="tab-btn active" data-tab="products">📦 产品管理</button>
    <button class="tab-btn" data-tab="slides">🖼️ 轮播图管理</button>
</div>

<!-- ========== 产品管理标签页 ========== -->
<div id="productsTab" class="tab-content active">

<div class="box">
<h3>📤 上传产品</h3>
<input id="name" placeholder="产品名称 *">
<select id="category">
    <option value="">请选择产品分类</option>
    <option>Outdoor Functional Fabrics</option>
    <option>Sports & Activewear Fabrics</option>
    <option>Recycled & Sustainable Fabrics</option>
    <option>Stretch Fabrics</option>
    <option>Nylon & Polyester Fabrics</option>
    <option>Jacquard & Textured Fabrics</option>
    <option>Printed Fabrics</option>
    <option>Swimwear Fabrics</option>
    <option>Underwear Fabrics</option>
    <option>Workwear Fabrics</option>
    <option>Fashion Fabrics</option>
    <option>Others</option>
</select>
<input id="gsm" placeholder="GSM (例: 180)">
<input id="moq" placeholder="MOQ (例: 1000 meters)">
<textarea id="feature" placeholder="产品描述"></textarea>

<div class="section-title">🖼️ 产品图片（支持多选/拖拽）</div>
<div class="drop-area" id="dropArea">
    📸 点击或拖拽图片到此处上传<br>
    <small>支持 JPG、PNG、WEBP，可同时选择多张</small>
</div>
<div class="preview-container" id="previewContainer"></div>
<div class="img-count" id="imgCount">已选择 0 张图片</div>
<input type="file" id="imageInput" multiple accept="image/jpeg,image/jpg,image/png,image/webp" style="display:none">

<div class="section-title">📹 视频（二选一即可）</div>
<input id="videoUrl" placeholder="方式一：粘贴视频链接 (YouTube/Vimeo)">
<div class="hint">💡 支持 YouTube: https://youtu.be/xxxxx</div>
<input type="file" id="videoFile" accept="video/mp4,video/webm">
<div class="hint">📁 方式二：直接上传 MP4 视频（小于50MB）</div>

<button id="uploadBtn">上传产品</button>
</div>

<div class="box">
<h3>📦 产品列表</h3>
<button id="refreshBtn">刷新产品</button>
<div id="list"></div>
</div>

</div>

<!-- ========== 轮播图管理标签页 ========== -->
<div id="slidesTab" class="tab-content">

<div class="box">
<h3>🖼️ 首页轮播图管理</h3>
<p style="color:#94a3b8; font-size:12px; margin-bottom:15px;">轮播图会显示在首页右侧，支持自动轮播。</p>

<div class="slide-form">
    <h4>➕ 添加新轮播图</h4>
    <input type="text" id="slideImageUrl" placeholder="图片URL * (必填)">
    <input type="text" id="slideTitle" placeholder="图片标题 (选填)">
    <input type="text" id="slideLink" placeholder="点击跳转链接 (选填)">
    <input type="number" id="slideOrder" placeholder="排序 (数字越小越靠前)" value="0">
    <button id="addSlideBtn">添加轮播图</button>
</div>

<div id="slidesList" style="margin-top:20px;">
    <div style="text-align:center; color:#94a3b8;">加载中...</div>
</div>

</div>

</div>

</div>

<!-- 编辑模态框 -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>✏️ 编辑产品</h3>
        <input type="hidden" id="editId">
        <input type="text" id="editName" placeholder="产品名称">
        <select id="editCategory">
            <option value="">请选择产品分类</option>
            <option>Outdoor Functional Fabrics</option>
            <option>Sports & Activewear Fabrics</option>
            <option>Recycled & Sustainable Fabrics</option>
            <option>Stretch Fabrics</option>
            <option>Nylon & Polyester Fabrics</option>
            <option>Jacquard & Textured Fabrics</option>
            <option>Printed Fabrics</option>
            <option>Swimwear Fabrics</option>
            <option>Underwear Fabrics</option>
            <option>Workwear Fabrics</option>
            <option>Fashion Fabrics</option>
            <option>Others</option>
        </select>
        <input type="text" id="editGsm" placeholder="GSM">
        <input type="text" id="editMoq" placeholder="MOQ">
        <textarea id="editFeature" placeholder="产品描述"></textarea>
        <input type="text" id="editVideoUrl" placeholder="视频链接">
        <div class="modal-buttons">
            <button id="saveEditBtn" style="background:#f59e0b;">保存修改</button>
            <button id="cancelEditBtn" style="background:#6c757d;">取消</button>
        </div>
    </div>
</div>

<script>

const SUPABASE_URL = "https://tpcxaelljrudshchuzia.supabase.co";
const SUPABASE_KEY = "sb_publishable_c0xeymh6AnE-Ld7StbxpgA_YN3ig8qt";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ========== 全局变量 ==========
let selectedImages = [];
let currentDeleteId = null;
let currentDeleteName = '';

// ========== 标签页切换 ==========
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const tabId = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        if (tabId === 'products') {
            document.getElementById('productsTab').classList.add('active');
            loadProducts();
        } else {
            document.getElementById('slidesTab').classList.add('active');
            loadSlides();
        }
    });
});

// ========== 登录 ==========
function login() {
    const pass = document.getElementById("pass").value.trim();
    if (pass === "123456") {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("panelBox").style.display = "block";
        loadProducts();
        loadSlides();
    } else {
        alert("密码错误");
    }
}

// ========== 产品管理 ==========
const dropArea = document.getElementById('dropArea');
const imageInput = document.getElementById('imageInput');
const previewContainer = document.getElementById('previewContainer');
const imgCountSpan = document.getElementById('imgCount');

dropArea.addEventListener('click', () => imageInput.click());
dropArea.addEventListener('dragover', (e) => { e.preventDefault(); dropArea.classList.add('dragover'); });
dropArea.addEventListener('dragleave', () => { dropArea.classList.remove('dragover'); });
dropArea.addEventListener('drop', (e) => {
    e.preventDefault();
    dropArea.classList.remove('dragover');
    addImages(Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/')));
});
imageInput.addEventListener('change', (e) => { addImages(Array.from(e.target.files)); imageInput.value = ''; });

function addImages(files) {
    for (const file of files) {
        if (file.size > 10 * 1024 * 1024) { alert(`图片 ${file.name} 超过10MB，已跳过`); continue; }
        selectedImages.push(file);
    }
    refreshPreview();
}
function removeImage(index) { selectedImages.splice(index, 1); refreshPreview(); }
function refreshPreview() {
    previewContainer.innerHTML = '';
    selectedImages.forEach((file, idx) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const div = document.createElement('div'); div.className = 'preview-item';
            div.innerHTML = `<img src="${e.target.result}"><button class="remove-btn" onclick="removeImage(${idx})">×</button>`;
            previewContainer.appendChild(div);
        };
        reader.readAsDataURL(file);
    });
    imgCountSpan.innerText = `已选择 ${selectedImages.length} 张图片`;
}

async function uploadProduct() {
    try {
        const name = document.getElementById("name").value.trim();
        if (!name) { alert("请填写产品名称"); return; }
        const uploadBtn = document.getElementById("uploadBtn");
        uploadBtn.disabled = true; uploadBtn.innerText = "上传中...";
        const imageUrls = [];
        for (let i = 0; i < selectedImages.length; i++) {
            const file = selectedImages[i];
            const fileName = Date.now() + "_" + i + "_" + file.name.replace(/[^a-zA-Z0-9.-]/g, '_');
            const { error } = await sb.storage.from("images").upload(fileName, file);
            if (!error) {
                const { data: urlData } = sb.storage.from("images").getPublicUrl(fileName);
                imageUrls.push(urlData.publicUrl);
            }
        }
        let videoUrl = document.getElementById("videoUrl").value.trim();
        const videoFile = document.getElementById("videoFile").files[0];
        if (videoFile) {
            const fileName = Date.now() + "_video_" + videoFile.name.replace(/[^a-zA-Z0-9.-]/g, '_');
            const { error } = await sb.storage.from("images").upload(fileName, videoFile);
            if (!error) {
                const { data: urlData } = sb.storage.from("images").getPublicUrl(fileName);
                videoUrl = urlData.publicUrl;
            }
        }
        const productData = {
            name: name,
            category: document.getElementById("category").value,
            gsm: document.getElementById("gsm").value,
            moq: document.getElementById("moq").value,
            feature: document.getElementById("feature").value,
            image: imageUrls[0] || "",
            images: imageUrls,
            video_url: videoUrl || null
        };
        const { error } = await sb.from("products").insert([productData]);
        if (error) { alert("上传失败：" + error.message); }
        else {
            alert(`✅ 上传成功！图片：${imageUrls.length}张`);
            document.getElementById("name").value = "";
            document.getElementById("gsm").value = "";
            document.getElementById("moq").value = "";
            document.getElementById("feature").value = "";
            document.getElementById("videoUrl").value = "";
            document.getElementById("videoFile").value = "";
            document.getElementById("category").value = "";
            selectedImages = [];
            refreshPreview();
            loadProducts();
        }
    } catch(e) { alert("错误：" + e.message); }
    finally { const btn = document.getElementById("uploadBtn"); btn.disabled = false; btn.innerText = "上传产品"; }
}

async function loadProducts() {
    const { data, error } = await sb.from("products").select("*").order("id", { ascending: false });
    if (error) { console.error(error); return; }
    let html = "";
    if (!data || data.length === 0) { html = "<div class='item'>暂无产品</div>"; }
    else {
        data.forEach(p => {
            const imgCount = p.images ? p.images.length : (p.image ? 1 : 0);
            let preview = "";
            if (p.images && p.images.length) {
                preview = p.images.slice(0, 2).map(img => `<img src="${img}" class="item-img">`).join('');
                if (p.images.length > 2) preview += `<span style="font-size:10px;"> +${p.images.length-2}</span>`;
            } else if (p.image) { preview = `<img src="${p.image}" class="item-img">`; }
            const safeName = escapeHtml(p.name || "").replace(/'/g, "\\'");
            html += `
            <div class="item">
                <b>${escapeHtml(p.name || "")}</b><br>
                📁 ${escapeHtml(p.category || "")}<br>
                ⚖️ GSM: ${escapeHtml(p.gsm || "-")} | 📦 MOQ: ${escapeHtml(p.moq || "-")}<br>
                🖼️ ${imgCount}张图片 | 🎬 ${p.video_url ? '有视频' : '无视频'}<br>
                <div style="margin:5px 0;">${preview}</div>
                <div class="item-actions">
                    <button class="edit-btn" onclick='editProduct(${p.id}, "${safeName}", "${escapeHtml(p.category || "").replace(/'/g, "\\'")}", "${escapeHtml(p.gsm || "").replace(/'/g, "\\'")}", "${escapeHtml(p.moq || "").replace(/'/g, "\\'")}", "${escapeHtml(p.feature || "").replace(/'/g, "\\'")}", "${p.video_url || ""}")'>✏️ 编辑</button>
                    <button class="delete-btn" onclick='deleteProductConfirm(${p.id}, "${safeName}")'>🗑️ 删除</button>
                </div>
            </div>`;
        });
    }
    document.getElementById("list").innerHTML = html;
}

function editProduct(id, name, category, gsm, moq, feature, videoUrl) {
    document.getElementById("editId").value = id;
    document.getElementById("editName").value = name;
    document.getElementById("editCategory").value = category;
    document.getElementById("editGsm").value = gsm;
    document.getElementById("editMoq").value = moq;
    document.getElementById("editFeature").value = feature;
    document.getElementById("editVideoUrl").value = videoUrl;
    document.getElementById("editModal").style.display = "flex";
}

async function saveEdit() {
    const id = document.getElementById("editId").value;
    const updateData = {
        name: document.getElementById("editName").value,
        category: document.getElementById("editCategory").value,
        gsm: document.getElementById("editGsm").value,
        moq: document.getElementById("editMoq").value,
        feature: document.getElementById("editFeature").value,
        video_url: document.getElementById("editVideoUrl").value || null
    };
    const { error } = await sb.from("products").update(updateData).eq("id", id);
    if (error) { alert("编辑失败：" + error.message); }
    else { alert("✅ 已更新"); document.getElementById("editModal").style.display = "none"; loadProducts(); }
}

function deleteProductConfirm(id, name) {
    if (confirm(`确定要删除产品 "${name}" 吗？此操作不可恢复！`)) {
        deleteProduct(id);
    }
}

async function deleteProduct(id) {
    const { error } = await sb.from("products").delete().eq("id", id);
    if (error) { alert("删除失败：" + error.message); }
    else { alert("✅ 已删除"); loadProducts(); }
}

// ========== 轮播图管理 ==========
async function loadSlides() {
    const { data, error } = await sb.from("home_slides").select("*").order("sort_order", { ascending: true });
    const container = document.getElementById("slidesList");
    if (error) { container.innerHTML = `<div style="color:red;">加载失败：${error.message}</div>`; return; }
    if (!data || data.length === 0) {
        container.innerHTML = `<div style="text-align:center; color:#94a3b8;">暂无轮播图，请在上方添加</div>`;
        return;
    }
    let html = `<div style="margin-bottom:15px;"><strong>共 ${data.length} 张轮播图</strong></div>`;
    data.forEach(slide => {
        html += `
        <div class="slide-item">
            <img src="${slide.image_url}" class="slide-img" onerror="this.src='https://placehold.co/60x60?text=Error'">
            <div class="slide-info">
                <div class="slide-title">${escapeHtml(slide.title || '无标题')}</div>
                <div class="slide-url">${slide.image_url.substring(0, 50)}...</div>
                <div style="font-size:10px; color:#60a5fa;">排序: ${slide.sort_order} | ${slide.is_active ? '✓ 启用' : '✗ 禁用'}</div>
            </div>
            <div class="slide-actions">
                <button onclick="toggleSlideStatus(${slide.id}, ${!slide.is_active})" style="background:#2563eb;">${slide.is_active ? '禁用' : '启用'}</button>
                <button onclick="deleteSlide(${slide.id})" style="background:#dc2626;">删除</button>
            </div>
        </div>`;
    });
    container.innerHTML = html;
}

async function addSlide() {
    const imageUrl = document.getElementById("slideImageUrl").value.trim();
    if (!imageUrl) { alert("请填写图片URL"); return; }
    const title = document.getElementById("slideTitle").value.trim();
    const link = document.getElementById("slideLink").value.trim();
    const sortOrder = parseInt(document.getElementById("slideOrder").value) || 0;
    const { error } = await sb.from("home_slides").insert([{
        image_url: imageUrl,
        title: title || null,
        link: link || null,
        sort_order: sortOrder,
        is_active: true
    }]);
    if (error) { alert("添加失败：" + error.message); }
    else {
        alert("✅ 轮播图已添加");
        document.getElementById("slideImageUrl").value = "";
        document.getElementById("slideTitle").value = "";
        document.getElementById("slideLink").value = "";
        document.getElementById("slideOrder").value = "0";
        loadSlides();
    }
}

async function toggleSlideStatus(id, newStatus) {
    const { error } = await sb.from("home_slides").update({ is_active: newStatus }).eq("id", id);
    if (error) { alert("操作失败：" + error.message); }
    else { loadSlides(); }
}

async function deleteSlide(id) {
    if (confirm("确定要删除这张轮播图吗？")) {
        const { error } = await sb.from("home_slides").delete().eq("id", id);
        if (error) { alert("删除失败：" + error.message); }
        else { alert("✅ 已删除"); loadSlides(); }
    }
}

// ========== 辅助函数 ==========
function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}
